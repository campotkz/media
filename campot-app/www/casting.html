<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АНКЕТА УЧАСТНИКА КАСТИНГА</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #f45925;
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.6);
            --stroke: rgba(255, 255, 255, 0.15);
            --error: #ff3b30;
            --success: #4cd964;
            --radius: 20px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000 70%);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1.5;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container { position: relative; z-index: 10; width: 100%; max-width: 500px; padding: 20px; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 22px; font-weight: 700; margin: 0; text-transform: uppercase; text-shadow: 0 0 20px rgba(244, 89, 37, 0.4); }
        .header p { font-size: 13px; color: var(--muted); }

        .block {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 24px; margin-bottom: 16px;
            backdrop-filter: blur(25px) saturate(1.2);
        }

        .block-title {
            font-size: 11px; font-weight: 700; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .block-title::after { content: ''; height: 1px; background: linear-gradient(to right, var(--accent), transparent); flex: 1; opacity: 0.5; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; }
        label span { color: var(--error); }

        input, textarea, select {
            width: 100%; background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 14px; color: #fff; outline: none;
        }
        input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15); border-radius: 16px;
            padding: 30px; text-align: center; cursor: pointer; background: rgba(255, 255, 255, 0.02);
        }
        .file-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
        .file-item { aspect-ratio: 1; border-radius: 12px; background-size: cover; position: relative; background-color: #222; }
        .progress-bar { position: absolute; bottom: 0; height: 4px; background: var(--accent); width: 0; transition: width 0.3s; }

        .submit-btn {
            width: 100%; background: var(--accent); color: #fff; border: none;
            border-radius: 16px; padding: 18px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 30px rgba(244, 89, 37, 0.3); text-transform: uppercase;
        }

        /* Остальные стили (welcome-screen, radio-group и т.д.) сохранены из оригинала */
        .radio-group { display: flex; flex-direction: column; gap: 10px; }
        .radio-item { display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255, 255, 255, 0.03); padding: 14px; border-radius: 12px; }
        .radio-item input { display: none; }
        .radio-item:has(input:checked) { background: rgba(244, 89, 37, 0.1); border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="container" id="welcomeContainer">
        <div class="header">
            <h1>АНКЕТА УЧАСТНИКА КАСТИНГА</h1>
            <p>Sklad Productions • Casting Management</p>
        </div>
        <div class="block">
            <p>Вы заполняете анкету на кастинг. Актуальные фото и видеовизитка повышают шансы.</p>
            <button class="submit-btn" id="startNewBtn">Я заполняю первый раз</button>
            <button class="submit-btn" style="margin-top:10px; background: #333;" id="reentryStartBtn">Я уже заполнял ранее</button>
        </div>
    </div>

    <div class="container" id="formContainer" style="display: none;">
        <form id="castingForm">
            <div class="block">
                <div class="block-title">Проект и Роль</div>
                <div class="form-group">
                    <label>На какой кастинг вы подаетесь?<span>*</span></label>
                    <div id="castingChecklist" class="radio-group"></div>
                    <input type="hidden" name="casting_target" id="casting_target_hidden" required>
                </div>
                <div class="form-group">
                    <label>Полное имя<span>*</span></label>
                    <input type="text" name="full_name" required>
                </div>
            </div>

            <div class="block">
                <div class="block-title">Медиа</div>
                <div class="upload-area" id="photoUpload">
                    <span>Нажмите для выбора фото (min 3)</span>
                    <input type="file" id="photoInput" multiple accept="image/*" style="display:none">
                </div>
                <div class="file-list" id="photoList"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">ОТПРАВИТЬ АНКЕТУ</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = "https://waekzofajzqcpoeldhkt.supabase.co";
        const SUPABASE_KEY = "sb_publishable_XVByRUkaKbM-11ChwOd2Aw_y24CSb4V";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let uploadedPhotos = [];
        let uploadedVideo = null;

        // Навигация
        document.getElementById('startNewBtn').onclick = () => {
            document.getElementById('welcomeContainer').style.display = 'none';
            document.getElementById('formContainer').style.display = 'block';
        };

        // Логика загрузки фото
        document.getElementById('photoUpload').onclick = () => document.getElementById('photoInput').click();
        document.getElementById('photoInput').onchange = async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                const id = Math.random().toString(36).substr(2, 9);
                const path = `photos/${Date.now()}_${id}.jpg`;
                
                // Здесь должна быть ваша функция сжатия (compressImage)
                const { data, error } = await sb.storage.from('casting_media').upload(path, file);
                if (!error) {
                    const { data: { publicUrl } } = sb.storage.from('casting_media').getPublicUrl(path);
                    uploadedPhotos.push({ id, url: publicUrl });
                    
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.style.backgroundImage = `url(${publicUrl})`;
                    document.getElementById('photoList').appendChild(item);
                }
            }
        };

        // ОТПРАВКА ФОРМЫ (ИСПРАВЛЕНО)
        document.getElementById('castingForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const results = Object.fromEntries(formData.entries());

            try {
                // 1. Сохранение в Supabase
                const finalData = {
                    ...results,
                    photo_urls: uploadedPhotos.map(p => p.url),
                    video_audition_url: uploadedVideo,
                    created_at: new Date()
                };

                const { data: inserted, error } = await sb.from('casting_applications').insert([finalData]).select();
                if (error) throw error;

                // 2. Уведомление Бота (ИСПОЛЬЗУЕМ ПОЛНЫЙ URL)
                const resp = await fetch('https://media-seven-eta.vercel.app/api/casting', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        ...finalData, 
                        application_id: inserted[0].id 
                    })
                });

                if (resp.ok) {
                    alert("Анкета успешно отправлена!");
                    location.reload();
                }

            } catch (err) {
                alert("Ошибка: " + err.message);
            }
        };
    </script>
</body>
</html>
