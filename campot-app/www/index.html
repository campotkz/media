<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GULYWOOD ERP</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <style>
    /* ПОЛНОСТЬЮ ТВОИ ОРИГИНАЛЬНЫЕ СТИЛИ */
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      --fs-title: 17px;
      --fs-subtitle: 15px;
      --fs-body: 13px;
      --fs-callout: 12px;
      --fs-caption: 11px;
      --lh-tight: 1.25;
      --lh-normal: 1.38;
      --lh-relaxed: 1.45;
      --w-regular: 400;
      --w-medium: 500;
      --w-semibold: 600;
      --w-bold: 700;
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 24px;
      --s-6: 32px;
      --hit: 44px;
      --r-1: 12px;
      --r-2: 16px;
      --r-3: 20px;
      --r-pill: 999px;
      --text: rgba(255, 255, 255, .92);
      --muted: rgba(255, 255, 255, .68);
      --muted2: rgba(255, 255, 255, .52);
      --accent: rgba(122, 162, 255, 1);
      --accent-fill: rgba(122, 162, 255, .20);
      --accent-stroke: rgba(122, 162, 255, .62);
      --warn-stroke: rgba(255, 204, 102, .55);
      --bg-0: #070812;
      --bg-1: #0a0b10;
      --glass: rgba(20, 22, 30, .38);
      --glass2: rgba(20, 22, 30, .26);
      --stroke: rgba(255, 255, 255, .12);
      --stroke2: rgba(255, 255, 255, .09);
      --sep: rgba(255, 255, 255, .08);
      --shadow: 0 18px 60px rgba(0, 0, 0, .45);
      --inset: inset 0 1px 0 rgba(255, 255, 255, .07);
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      font-family: inherit;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      color: var(--text);
      background: #101116;
      font-family: var(--font-sans);
      overflow-x: hidden;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: var(--s-4);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: var(--s-4);
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }

    .card {
      position: relative;
      border-radius: var(--r-3);
      overflow: hidden;
      border: 1px solid var(--stroke);
      background: var(--glass);
      box-shadow: var(--shadow), var(--inset);
      transform: translateZ(0);
      backdrop-filter: blur(18px) saturate(1.1);
    }

    .head {
      padding: var(--s-3) var(--s-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s-3);
      background: var(--glass2);
      border-bottom: 1px solid var(--sep);
    }

    .title {
      font-size: var(--fs-title);
      font-weight: var(--w-semibold);
    }

    .seg {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, .06);
    }

    .seg button {
      min-height: var(--hit);
      padding: 0 var(--s-3);
      border: 0;
      border-radius: var(--r-pill);
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .seg button.isActive {
      background: rgba(122, 162, 255, .20);
    }

    button {
      min-height: var(--hit);
      padding: 0 var(--s-3);
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, .06);
      color: var(--text);
      font: inherit;
      font-weight: var(--w-semibold);
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent-stroke);
      background: var(--accent-fill);
    }

    .calendar {
      padding: var(--s-4);
    }

    .monthBar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--s-3);
    }

    .month {
      font-size: var(--fs-title);
      font-weight: var(--w-semibold);
      text-transform: capitalize;
    }

    .hint {
      color: var(--muted);
      font-size: var(--fs-callout);
    }

    .dow,
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--s-2);
    }

    .dow {
      margin-bottom: var(--s-2);
      color: var(--muted2);
      font-size: var(--fs-caption);
      font-weight: var(--w-semibold);
      text-transform: uppercase;
      text-align: center;
      /* Center align headers */
    }

    .day {
      min-height: 76px;
      padding: var(--s-3);
      border-radius: var(--r-2);
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .05);
      cursor: pointer;
      position: relative;
    }

    .day.sel {
      border-color: rgba(122, 162, 255, .82);
      background: radial-gradient(160px 120px at 30% 20%, rgba(122, 162, 255, .18), transparent 58%), rgba(255, 255, 255, .05);
    }

    .day.out {
      opacity: .45;
    }

    .day.today {
      outline: 2px dashed var(--warn-stroke);
      outline-offset: 2px;
    }

    .num {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: var(--w-semibold);
      margin-bottom: 4px;
      /* Space for dots */
    }

    .dots {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .dot.done {
      background: #4cd964;
      box-shadow: 0 0 4px rgba(76, 217, 100, 0.6);
    }

    .dot.pending {
      background: #ffcc00;
      box-shadow: 0 0 4px rgba(255, 204, 0, 0.6);
    }

    .task-lines {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 4px;
    }

    .task-line {
      height: 3px;
      border-radius: 2px;
      width: 100%;
      opacity: 0.8;
    }

    .task-line.done {
      background: #4cd964;
    }

    .task-line.pending {
      background: #ffcc00;
    }

    .task-line.overdue {
      background: #ff3b30;
    }

    /* Unified Header Buttons */
    .header-actions {
      display: flex;
      gap: 8px;
    }

    .mini-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }

    .mini-btn.task-btn {
      color: #ffcc00;
      background: rgba(255, 204, 0, 0.1);
    }


    .dot.overdue {
      background: #ff3b30;
      box-shadow: 0 0 4px rgba(255, 59, 48, 0.6);
    }

    .side {
      padding: var(--s-4);
      display: flex;
      flex-direction: column;
      gap: var(--s-4);
    }

    .list {
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: var(--r-3);
      overflow: hidden;
      background: rgba(255, 255, 255, .04);
    }

    .item {
      padding: var(--s-3) var(--s-4);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      cursor: pointer;
      background: rgba(255, 255, 255, .03);
      border-left: 3px solid transparent;
      /* Status indicator */
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item.done {
      border-left-color: #4cd964;
    }

    .item.pending {
      border-left-color: #ffcc00;
    }

    .item.overdue {
      border-left-color: #ff3b30;
    }

    .item-content {
      flex: 1;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 0;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    input:focus,
    textarea:focus {
      border-color: rgba(122, 162, 255, .50);
    }

    .icon-btn.done-btn {
      color: #4cd964;
    }

    .icon-btn.resched-btn {
      color: #ff3b30;
    }

    form {
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: var(--r-3);
      padding: var(--s-4);
      background: rgba(255, 255, 255, .04);
      display: grid;
      gap: 20px;
      /* Increased gap for better alignment */
    }

    label {
      display: grid;
      gap: 6px;
      font-size: var(--fs-caption);
      font-weight: var(--w-semibold);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input,
    textarea,
    .multi-select-wrap {
      width: 100%;
      box-sizing: border-box;
      border-radius: var(--r-2);
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .18);
      color: var(--text);
      padding: 10px var(--s-3);
      font: inherit;
      outline: none;
      min-height: var(--hit);
      /* Unified height for perfect alignment */
      position: relative;
    }

    /* specific for multi-select display */
    .multi-select-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    #deliverables,
    #notes {
      min-height: 160px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-3);
    }

    /* Timing Grid DnD Styles */
    .drag-handle {
      cursor: grab;
      color: var(--muted2);
      padding: 0 4px;
      user-select: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .sortable-ghost {
      opacity: 0.4;
      background: var(--accent-fill) !important;
    }

    .sortable-drag {
      background: var(--bg-1) !important;
      box-shadow: var(--shadow);
      opacity: 0.9;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      padding-top: var(--s-4);
      border-top: 1px solid var(--sep);
      margin-top: var(--s-3);
    }

    .actions button {
      font-size: 11px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .footer {
      padding: var(--s-3) var(--s-4);
      border-top: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .03);
      display: flex;
      justify-content: space-between;
    }

    pre {
      margin: 0;
      padding: var(--s-4);
      border-radius: var(--r-3);
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(0, 0, 0, .18);
      color: rgba(255, 255, 255, .78);
      font-family: var(--font-sans);
      /* Changed from mono for better stylized look */
      font-size: 12px;
      white-space: pre-wrap;
    }

    .hl-label {
      color: #ff6b6b;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .hl-time {
      color: #ff6b6b;
      font-weight: 700;
      font-size: 13px;
    }

    @media (max-width: 600px) {

      /* Mobile Calendar Fixes */
      .calendar {
        padding: 4px;
      }

      .grid,
      .dow {
        gap: 2px;
      }

      .day {
        min-height: 60px;
        padding: 2px;
        font-size: 10px;
      }

      .num {
        margin-bottom: 2px;
      }

      .item {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .item-actions {
        justify-content: flex-end;
      }

      /* Maximize horizontal width on mobile */
      .wrap {
        padding: 8px 6px;
        /* Even tighter for narrow devices */
      }

      form {
        padding: 10px;
        gap: 12px;
        /* Tighter vertical gap */
        padding-bottom: 80px;
      }

      /* Keep 2-column layout but make it very compact */
      .row2 {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        /* Small gap to prevent overflow */
      }

      label {
        font-size: 10px;
        /* Smaller labels */
        gap: 4px;
      }

      input,
      textarea,
      .multi-select-wrap {
        padding: 6px 8px;
        /* Tighter input padding */
        font-size: 12px;
        /* Smaller input text */
        min-height: 38px;
        /* Lower height for compactness */
      }

      .tag {
        padding: 2px 6px;
        font-size: 10px;
      }

      button {
        min-height: 38px;
        font-size: 12px;
      }
    }

    /* Autocomplete Styles */
    .input-wrap,
    .multi-select-wrap {
      position: relative;
    }

    .day.today {
      background: #333;
      border: 1px solid #666;
    }

    .day.sel {
      border: 2px solid #fff;
    }

    .day.has-pending {
      background: rgba(255, 204, 0, 0.08);
    }

    .tags {
      display: contents;
    }

    .tag {
      background: rgba(122, 162, 255, .20);
      color: #fff;
      padding: 2px 6px;
      border-radius: var(--r-pill);
      font-size: 10px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid rgba(122, 162, 255, .3);
    }

    .tag-remove {
      cursor: pointer;
      opacity: 0.6;
      font-weight: bold;
      font-size: 14px;
      line-height: 1;
    }

    .tag-remove:hover {
      opacity: 1;
      color: #ff6b6b;
    }

    #crewInput {
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
      flex: 1;
      min-width: 80px;
      height: 30px;
      outline: none;
    }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #15161c;
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: var(--r-2);
      max-height: 250px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      margin-top: 4px;
    }

    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      font-size: 13px;
    }

    .dropdown-item:hover {
      background: rgba(122, 162, 255, .15);
    }

    .dropdown-item small {
      opacity: 0.5;
      font-size: 10px;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-content {
      background: #1c1d24;
      border: 1px solid var(--stroke);
      border-radius: var(--r-3);
      padding: 24px;
      width: 90%;
      max-width: 360px;
      box-shadow: var(--shadow);
    }

    .checklist-container {
      max-height: 280px;
      overflow-y: auto;
      margin: 12px 0;
      padding-right: 5px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: var(--r-1);
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .check-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .check-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .check-item label {
      margin: 0;
      cursor: pointer;
      flex: 1;
      font-size: 14px;
    }

    /* Tabs */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
      padding: 0 10px;
    }

    .nav-btn {
      flex: 1;
      max-width: 200px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      border-radius: 8px;
    }

    .nav-btn.active {
      background: var(--accent-fill);
      border-color: var(--accent-stroke);
      color: white;
      box-shadow: 0 0 10px rgba(122, 162, 255, 0.3);
    }

    /* Timing Table */
    .timing-wrap {
      margin-top: var(--s-3);
      border: 1px solid var(--stroke);
      border-radius: var(--r-2);
      overflow-x: auto;
      background: rgba(255, 255, 255, .03);
      position: relative;
    }

    /* Scroll indicator fade */
    .timing-wrap::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 30px;
      background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.3));
      pointer-events: none;
    }

    .timing-table {
      min-width: 800px;
      display: flex;
      flex-direction: column;
    }

    .timing-row {
      display: grid;
      grid-template-columns: 30px 85px 85px 120px 120px 120px 120px 1fr 40px;
      gap: 1px;
      background: var(--stroke);
      border-bottom: 1px solid var(--stroke);
      min-width: 890px;
      /* Adjusted for wider time cells */
    }

    .timing-row:last-child {
      border-bottom: none;
    }

    .timing-header {
      background: rgba(255, 255, 255, .07);
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .timing-cell {
      background: #15161c;
      padding: 2px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .timing-cell.drag-handle {
      justify-content: center;
      color: var(--muted);
      cursor: grab;
      font-size: 14px;
      user-select: none;
    }

    .timing-cell input,
    .timing-cell select {
      width: 100%;
      min-width: 0;
      background: transparent;
      border: none;
      color: white;
      font-size: 11px;
      padding: 6px 4px;
      outline: none;
      overflow-x: auto;
    }

    /* Equipment Table Columns */
    .gear-row {
      display: grid;
      grid-template-columns: 80px 1fr 40px 80px 28px;
      gap: 1px;
      background: var(--stroke);
      border-bottom: 2px solid var(--stroke);
    }

    #gearTable {
      min-width: 0;
    }

    .gear-header {
      background: rgba(122, 162, 255, 0.1);
      font-weight: bold;
      font-size: 10px;
      text-transform: uppercase;
    }

    /* Hide native time picker indicator to give more room for text */
    .timing-cell input[type="time"]::-webkit-calendar-picker-indicator {
      display: none;
      -webkit-appearance: none;
    }

    .timing-cell select option {
      background: #15161c;
      color: white;
    }

    .timing-add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: rgba(122, 162, 255, 0.1);
      color: var(--accent);
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      border-top: 1px solid var(--stroke);
    }

    .timing-add-btn:hover {
      background: rgba(122, 162, 255, 0.2);
    }

    .timing-remove,
    .timing-del-btn {
      color: rgba(255, 107, 107, 0.5);
      cursor: pointer;
      font-weight: bold;
      text-align: center;
      width: 100%;
      background: transparent;
      border: none;
      font-size: 16px;
      transition: color 0.2s;
    }

    .timing-del-btn:hover {
      color: #ff6b6b;
    }

    /* Shared Timing Dropdown */
    #timingDropdown {
      position: fixed;
      /* Fixed to avoid containment issues */
      background: #1c1d24;
      border: 1px solid var(--stroke);
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 10001;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: none;
    }
  </style>
</head>

<body>
  <datalist id="taskOptions">
    <option value="Подготовка"></option>
    <option value="Перестановка"></option>
    <option value="Перерыв"></option>
    <option value="Обед"></option>
    <option value="Тех. перерыв"></option>
    <option value="Переезд"></option>
  </datalist>
  <datalist id="locationOptions"></datalist>
  <datalist id="actorOptions"></datalist>
  <datalist id="linkOptions"></datalist>

  <div id="timingDropdown" class="dropdown"></div>


  <div class="wrap">
    <!-- CALENDAR VIEW -->
    <div class="card" id="calendarView">

      };

      // Match Shoot Logic: Use Upsert

        // Ideally we should preserve status if we are just editing details,

        payload.created_at = new Date(selectedDate).toISOString();

        payload.created_at = new Date(selectedDate).toISOString();
      }

    const projDropdown = document.getElementById('projectDropdown');

    const renderProjects = () => {
      const val = projInput.value.toLowerCase();
      projDropdown.innerHTML = '';
      const matches = clientsData.filter(c =>
        (c.category || 'media') === 'media' &&
        !c.is_hidden &&
        (val ? c.name.toLowerCase().includes(val) : true)
      );
      if (!matches.length) { projDropdown.style.display = 'none'; return; }
      matches.forEach(c => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerHTML = `<span>${c.name}</span> <small style="background:#4cd96433; color:#4cd964; padding:2px 6px; border-radius:4px; font-size:9px">MEDIA</small>`;
        div.onclick = () => {
          projInput.value = c.name;
          projDropdown.style.display = 'none';
          updateDatalists();
        };
        projDropdown.appendChild(div);
      });
      projDropdown.style.display = 'block';
    };

    const castInput = document.getElementById('casting_project');
    const castDropdown = document.getElementById('castingDropdown');

    const renderCastingProjects = () => {
      const val = castInput.value.toLowerCase();
      castDropdown.innerHTML = '';
      const matches = clientsData.filter(c =>
        c.category === 'casting' &&
        !c.is_hidden &&
        (val ? c.name.toLowerCase().includes(val) : true)
      );
      if (!matches.length) { castDropdown.style.display = 'none'; return; }
      matches.forEach(c => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerHTML = `<span>${c.name}</span> <small style="background:#7aa2ff33; color:#7aa2ff; padding:2px 6px; border-radius:4px; font-size:9px">CASTING</small>`;
        div.onclick = () => {
          castInput.value = c.name;
          castDropdown.style.display = 'none';
          updateDatalists();
        };
        castDropdown.appendChild(div);
      });
      castDropdown.style.display = 'block';
    };

    projInput.addEventListener('input', renderProjects);
    projInput.addEventListener('focus', renderProjects);
    castInput.addEventListener('input', renderCastingProjects);
    castInput.addEventListener('focus', renderCastingProjects);
    castInput.addEventListener('click', (e) => { e.stopPropagation(); renderCastingProjects(); });

    // Location Dropdown
    const locInput = document.getElementById('location');
    const locDropdown = document.getElementById('locationDropdown');

    const renderLocations = () => {
      const val = locInput.value.toLowerCase();
      locDropdown.innerHTML = '';

      // 1. Get Project Specific Locations
      const mProj = clientsData.find(c => c.name === f.project.value.trim());
      let pLocs = [];
      if (mProj) {
        pLocs = projectLocationsData.filter(pl => String(pl.project_id) === String(mProj.id)).map(pl => ({ name: pl.name, isProjectSpecific: true }));
      }

      // 2. Combine with General
      let allLocs = [...pLocs, ...locationsData.filter(l => !pLocs.some(p => p.name === l.name))];

      const matches = val
        ? allLocs.filter(l => l.name.toLowerCase().includes(val))
        : allLocs;

      if (!matches.length) { locDropdown.style.display = 'none'; return; }
      matches.forEach(l => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerHTML = l.isProjectSpecific ? `📌 ${l.name} <small>(Проект)</small>` : l.name;
        div.onclick = () => {
          locInput.value = l.name;
          locDropdown.style.display = 'none';

          // Auto-fill address for studio locations
          const studioAddress = "Comfort Residencies, Улица Иванилова, 63з";
          // Check if it's one of ours (excluding 'Студия Campot' itself which might be broader, but inclusion is fine)
          const isStudio = ["Бали", "Экспертный кабинет", "Классический", "Ванная комната", "Кухня", "Кофейня", "Minimalistic", "Циклорама", "Лестница", "Студия Campot"].includes(l.name);
          if (isStudio) {
            const addrInt = document.getElementById('address');
            const sAddr = "Comfort Residencies, Улица Иванилова, 63з";
            const sLink = "https://go.2gis.com/bd4n9";
            addrInt.value = sAddr;
            addrInt.dataset.full = `${sAddr} | ${sLink}`; // Update hidden data too!

            // Auto-add Roman (Administrator) to crew
            const roman = teamData.find(t => t.username === 'magnate71k' || t.full_name === 'Roman');
            if (roman) {
              addTag('crew', 'crewTags', 'crewInput', 'crewDropdown', roman.full_name);
            }
          }
          updateDatalists(); // Refresh suggestions!
        };
        locDropdown.appendChild(div);
      });
      locDropdown.style.display = 'block';
    };

    locInput.addEventListener('input', () => {
      renderLocations();
      updateDatalists(); // Update timing grid suggestions when location changes
    });
    locInput.addEventListener('change', updateDatalists);
    locInput.addEventListener('focus', renderLocations);
    locInput.addEventListener('click', (e) => {
      e.stopPropagation();
      renderLocations();
    });

    // Address Search Dropdown
    const addrInput = document.getElementById('address');
    const addrDropdown = document.getElementById('addressDropdown');
    let addrTimeout = null;

    const renderAddresses = (results) => {
      addrDropdown.innerHTML = '';
      if (!results || !results.length) { addrDropdown.style.display = 'none'; return; }

      results.forEach(res => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.style.fontSize = '11px';
        div.style.padding = '8px 12px';
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';

        const isBuilding = res.address && (res.address.house_number || res.type === 'house' || res.class === 'building');
        const icon = isBuilding ? '🏠' : '📍';

        div.innerHTML = `<span>${icon} ${res.display_name}</span>`;

        div.onclick = () => {
          // Store as: Plain Address | 2GIS Link
          const link = `https://2gis.kz/geo/${res.lon},${res.lat}`;
          addrInput.value = res.display_name;
          addrInput.dataset.full = `${res.display_name} | ${link}`;
          addrDropdown.style.display = 'none';
        };
        addrDropdown.appendChild(div);
      });
      addrDropdown.style.display = 'block';
    };

    addrInput.addEventListener('input', () => {
      clearTimeout(addrTimeout);
      const val = addrInput.value.trim();

      // Clear hidden data as soon as user starts typing manually
      addrInput.dataset.full = '';

      if (val.length < 3) { addrDropdown.style.display = 'none'; return; }

      addrTimeout = setTimeout(async () => {
        try {
          // Viewbox for Almaty biasing + addressdetails for house numbers
          const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&addressdetails=1&limit=6&viewbox=76.6,43.4,77.1,43.1&dedupe=1`);
          const data = await res.json();
          renderAddresses(data);
        } catch (e) { console.error(e); }
      }, 500);
    });

    function updateDatalists() {
      const locList = document.getElementById('locationOptions');
      const actList = document.getElementById('actorOptions');
      const linkList = document.getElementById('linkOptions');

      if (locList) {
        const mainLocInput = document.getElementById('location');
        const mainProjInput = document.getElementById('project');
        if (!mainLocInput || !mainProjInput) return;

        const mainLoc = (mainLocInput.value || '').trim();
        const mainLocLC = mainLoc.toLowerCase();
        const mainProjName = (mainProjInput.value || '').trim();

        const studioRooms = ["Бали", "Экспертный кабинет", "Классический", "Ванная комната", "Кухня", "Кофейня", "Minimalistic", "Циклорама", "Лестница", "Студия Campot"];
        const studioRoomsLC = studioRooms.map(r => r.toLowerCase());

        let filtered = [];
        const mainProj = clientsData.find(c => c.name === mainProjName);
        const pLocs = mainProj ? projectLocationsData.filter(pl => pl.project_id === mainProj.id).map(pl => pl.name) : [];

        if (mainLocLC === "студия campot") {
          // If Studio Campot - show all studio rooms + project-specific ones
          const studio = locationsData.filter(l => studioRoomsLC.includes(l.name.toLowerCase())).map(l => l.name);
          filtered = [...new Set([...studio, ...pLocs])];
        } else if (mainLoc) {
          // If specific location - show only that + project-specific ones as secondary
          filtered = [...new Set([mainLoc, ...pLocs])];
        } else {
          // Default: all locations + project-specific ones
          filtered = [...new Set([...locationsData.map(l => l.name), ...pLocs])];
        }

        // Final fallback to ensure current mainLoc is always there if set
        if (mainLoc && !filtered.some(f => f.toLowerCase() === mainLocLC)) filtered.unshift(mainLoc);

        locList.innerHTML = filtered.map(name => `<option value="${name}">${name}</option>`).join('');
      }
      if (actList) {
        updateContactPool();
        const actors = teamData.filter(t => t.roles && t.roles.includes('actor')).map(t => t.full_name);
        const casting = currentCastingContacts.map(c => c.name);
        const media = currentMediaContacts.map(c => c.name);
        const pool = [...new Set([...actors, ...casting, ...media])].filter(n => n).sort();
        actList.innerHTML = pool.map(a => `<option value="${a}">${a}</option>`).join('');
      }
      if (linkList) {
        const mProj = clientsData.find(c => c.name === f.project.value.trim());
        if (mProj) {
          const links = resourcesData.filter(r => String(r.chat_id) === String(mProj.chat_id) && String(r.thread_id) === String(mProj.thread_id));
          linkList.innerHTML = links.map(l => `<option value="${l.url}">${l.username}: ${l.url}</option>`).join('');
        } else {
          linkList.innerHTML = '';
        }
      }
    }

    projInput.addEventListener('click', (e) => {
      e.stopPropagation();
      renderProjects();
    });

    // Generic Tags Logic
    function renderTags(fieldId, tagsId) {
      const hidden = document.getElementById(fieldId);
      const tagsContainer = document.getElementById(tagsId);
      if (!hidden || !tagsContainer) return;
      const val = hidden.value;
      const names = val ? val.split(',').map(s => s.trim()).filter(s => s) : [];
      tagsContainer.innerHTML = '';
      names.forEach(name => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.innerHTML = `<span>${name}</span> <span class="tag-remove">×</span>`;
        tag.querySelector('.tag-remove').onclick = () => {
          const newNames = names.filter(n => n !== name);
          hidden.value = newNames.join(', ');
          renderTags(fieldId, tagsId);
        };
        tagsContainer.appendChild(tag);
      });
    }

    function addTag(fieldId, tagsId, inputId, dropdownId, name) {
      const hidden = document.getElementById(fieldId);
      const val = hidden.value;
      const names = val ? val.split(',').map(s => s.trim()).filter(s => s) : [];
      if (!names.includes(name)) {
        names.push(name);
        hidden.value = names.join(', ');
        renderTags(fieldId, tagsId);
      }
      document.getElementById(inputId).value = '';
      document.getElementById(dropdownId).style.display = 'none';
    }

    function renderCrewTags() { renderTags('crew', 'crewTags'); }
    function renderPostTags() { renderTags('post_production', 'postTags'); }
    function renderActorsTags() { renderTags('actors', 'actorsTags'); }
    function renderTaskActorsTags() { renderTags('t_actors', 't_actorsTags'); }

    function setupTagInput(inputId, dropdownId, fieldId, tagsId, requiredRole = null) {
      const inp = document.getElementById(inputId);
      const drop = document.getElementById(dropdownId);
      const renderDrop = () => {
        updateContactPool(); // Ensure pools are fresh
        const val = inp.value.toLowerCase();
        drop.innerHTML = '';

        let pool = [...teamData];
        if (requiredRole) {
          pool = teamData.filter(t => t.roles && t.roles.includes(requiredRole));
        }

        // SPECIAL CASE: Actors should ALSO include project-specific contacts 
        // AND all contacts from 'casting' category
        if (fieldId === 'actors') {
          const mediaContacts = currentMediaContacts.map(c => ({
            full_name: c.name, position: 'Контакт (Media)', roles: ['actor']
          }));
          const castingContacts = currentCastingContacts.map(c => ({
            full_name: c.name, position: 'Актер (Casting)', roles: ['actor']
          }));
          // Also include ALL contacts with category 'casting' regardless of selected project?
          // The user said: "фильтровать по топику кастинг ... ПЛЮС клиенты из проекта"
          // So let's stick to the selected projects' contacts.
          pool = [...pool, ...mediaContacts, ...castingContacts];
          pool = pool.filter((v, i, a) => a.findIndex(t => t.full_name === v.full_name) === i);
        }

        let matches = val
          ? pool.filter(t => (t.full_name && t.full_name.toLowerCase().includes(val)) || (t.username && t.username.toLowerCase().includes(val)))
          : pool;

        matches = matches.slice(0, 20);
        if (!matches.length) { drop.style.display = 'none'; return; }
        matches.forEach(m => {
          const div = document.createElement('div');
          div.className = 'dropdown-item';
          div.innerHTML = `${m.full_name} <small style="opacity:0.6">${m.position || ''}</small>`;
          div.onclick = () => addTag(fieldId, tagsId, inputId, dropdownId, m.full_name);
          drop.appendChild(div);
        });
        drop.style.display = 'block';
      };
      inp.addEventListener('input', renderDrop);
      inp.addEventListener('focus', renderDrop);
      inp.addEventListener('click', (e) => { e.stopPropagation(); renderDrop(); });
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !inp.value) {
          const hidden = document.getElementById(fieldId);
          const names = hidden.value.split(',').map(s => s.trim()).filter(s => s);
          if (names.length) {
            names.pop();
            hidden.value = names.join(', ');
            renderTags(fieldId, tagsId);
          }
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          const val = inp.value.trim();
          if (val) addTag(fieldId, tagsId, inputId, dropdownId, val);
        }
      });
    }

    setupTagInput('crewInput', 'crewDropdown', 'crew', 'crewTags', 'production');
    setupTagInput('postInput', 'postDropdown', 'post_production', 'postTags', 'post');
    setupTagInput('assigneeInput', 'assigneeDropdown', 't_assignees', 'assigneeTags', null);
    function closeActorChecklist() {
      document.getElementById('actorChecklistModal').style.display = 'none';
    }

    document.getElementById("gear").addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    let currentChecklistTarget = null; // 'grid', 'main', or 'task'

    function openActorChecklist(target = 'grid', rowId = null) {
      currentChecklistTarget = { target, rowId };
      document.getElementById('actorChecklistModal').style.display = 'flex';
      document.getElementById('checklistSearch').value = '';
      renderChecklist();
    }

    function renderChecklist() {
      const container = document.getElementById('checklistItems');
      const search = document.getElementById('checklistSearch').value.toLowerCase();
      container.innerHTML = '';

      updateContactPool();
      let pool = [];
      if (currentChecklistTarget.target === 'grid') {
        const mainActors = document.getElementById("actors").value;
        pool = mainActors ? mainActors.split(",").map(s => s.trim()).filter(s => s) : [];
        if (!pool.length) {
          container.innerHTML = "<div style='padding:10px; opacity:0.6; text-align:center;'>Сначала добавьте актеров в общую ячейку 'Актеры'</div>";
          return;
        }
      } else {
        pool = [...new Set([
          ...teamData.filter(t => t.roles && t.roles.includes('actor')).map(t => t.full_name),
          ...currentCastingContacts.map(c => c.name),
          ...currentMediaContacts.map(c => c.name)
        ])].filter(n => n).sort();
      }

      let selectedStr = "";
      if (currentChecklistTarget.target === 'grid') {
        const row = document.querySelector(`.timing-row[data-id="${currentChecklistTarget.rowId}"]`);
        selectedStr = row ? row.querySelector(".t-act").value : "";
      } else if (currentChecklistTarget.target === 'main') {
        selectedStr = document.getElementById("actors").value;
      } else if (currentChecklistTarget.target === 'task') {
        selectedStr = document.getElementById("t_actors").value;
      }
      const currentVals = selectedStr.split(",").map(s => s.trim()).filter(s => s);

      pool.forEach(name => {
        if (search && !name.toLowerCase().includes(search)) return;
        const isChecked = currentVals.includes(name);
        const div = document.createElement('div');
        div.className = 'check-item';
        div.innerHTML = `
          <input type="checkbox" id="chk_${name}" ${isChecked ? 'checked' : ''} value="${name}">
          <label for="chk_${name}">${name}</label>
        `;
        div.onclick = (e) => {
          if (e.target.tagName !== 'INPUT') {
            const chk = div.querySelector('input');
            chk.checked = !chk.checked;
          }
        };
        container.appendChild(div);
      });
    }

    document.getElementById('checklistSearch').oninput = renderChecklist;

    function confirmActorChecklist() {
      const selected = Array.from(document.querySelectorAll("#checklistItems input:checked")).map(i => i.value).join(", ");
      const { target, rowId } = currentChecklistTarget;

      if (target === 'grid') {
        const row = document.querySelector(`.timing-row[data-id="${rowId}"]`);
        if (row) row.querySelector(".t-act").value = selected;
      } else if (target === 'main') {
        document.getElementById("actors").value = selected;
        renderActorsTags();
      } else if (target === 'task') {
        document.getElementById("t_actors").value = selected;
        renderTaskActorsTags();
      }
      closeActorChecklist();
    }

    function updateContactPool() {
      // 1. Media Pool
      const mProj = clientsData.find(c => c.name === f.project.value.trim());
      currentMediaContacts = mProj ? contactsData.filter(ct => String(ct.thread_id) === String(mProj.thread_id)) : [];

      // 2. Casting Pool
      const cProj = clientsData.find(c => c.name === f.casting_project.value.trim());
      currentCastingContacts = cProj ? contactsData.filter(ct => String(ct.thread_id) === String(cProj.thread_id)) : [];
    }

    // Contact Logic
    const contactInput = document.getElementById('contact');
    const contactDropdown = document.getElementById('contactDropdown');

    function renderContactDropdown() {
      const val = contactInput.value.toLowerCase();
      contactDropdown.innerHTML = '';

      let pool = currentMediaContacts;
      let matches = val
        ? pool.filter(c => c.name.toLowerCase().includes(val) || c.phone.includes(val))
        : pool;

      if (!matches.length) { contactDropdown.style.display = 'none'; return; }

      matches.forEach(m => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerHTML = `${m.name} <small style="opacity:0.6">${m.phone}</small>`;
        div.onclick = () => {
          contactInput.value = `${m.name} (${m.phone})`;
          contactDropdown.style.display = 'none';
        }
        contactDropdown.appendChild(div);
      });
      contactDropdown.style.display = 'block';
    }

    contactInput.addEventListener('input', renderContactDropdown);
    contactInput.addEventListener('focus', () => {
      updateContactPool();
      renderContactDropdown();
    });

    contactInput.addEventListener('click', (e) => {
      e.stopPropagation();
      updateContactPool();
      renderContactDropdown();
    });

    // Copy Single Shoot
    document.getElementById('copyBtn').onclick = () => {
      const scheduleData = getTimingData();
      const currentShoot = {
        project: f.project.value.trim(),
        location: f.location.value.trim(),
        callTime: f.callTime.value,
        wrapTime: f.wrapTime.value,
        address: f.address.dataset.full || f.address.value.trim(),
        contact: f.contact.value.trim(),
        deliverables: f.deliverables.value.trim(),
        crew: f.crew.value.trim(),
        post_production: f.post_production.value.trim(),
        casting_project: f.casting_project.value.trim(),
        actors: f.actors.value.trim(),
        schedule: JSON.stringify(scheduleData),
        gear: f.gear.value.trim(),
        notes: f.notes.value.trim(),
        report_link: f.report_link.value.trim(),
        date: toISO(selectedDate)
      };

      const txt = buildSingleShootExport(currentShoot);
      navigator.clipboard.writeText(txt);
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      const originalBtnText = document.getElementById('copyBtn').textContent;
      document.getElementById('copyBtn').textContent = "Скопировано!";
      setTimeout(() => document.getElementById('copyBtn').textContent = originalBtnText, 1500);
    };

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.input-wrap')) {
        projDropdown.style.display = 'none';
        tProjDropdown.style.display = 'none';
        tCastProjDropdown.style.display = 'none';
        locDropdown.style.display = 'none';
        addrDropdown.style.display = 'none';
        castDropdown.style.display = 'none';
        contactDropdown.style.display = 'none';
      }
      if (!e.target.closest('.multi-select-wrap')) {
        crewDropdown.style.display = 'none';
        document.getElementById('postDropdown').style.display = 'none';
        document.getElementById('actorsDropdown').style.display = 'none';
        document.getElementById('t_actorsDropdown').style.display = 'none';
        document.getElementById('assigneeDropdown').style.display = 'none';
      }
    });

    // Mouseleave logic REMOVED due to UX issues (closing too fast).
    // relying on click-outside (implemented above) for closing.

    // Focus wrapper clicks
    document.getElementById('crewWrapper').onclick = (e) => {
      if (e.target === document.getElementById('crewWrapper')) crewInput.focus();
    };







    loadFromCloud();
  </script>
