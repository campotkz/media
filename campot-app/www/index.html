<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GULYWOOD ERP</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    /* ПОЛНОСТЬЮ ТВОИ ОРИГИНАЛЬНЫЕ СТИЛИ */
    :root {
      --font-sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      --fs-title: 17px;
      --fs-subtitle: 15px;
      --fs-body: 13px;
      --fs-callout: 12px;
      --fs-caption: 11px;
      --lh-tight: 1.25;
      --lh-normal: 1.38;
      --lh-relaxed: 1.45;
      --w-regular: 400;
      --w-medium: 500;
      --w-semibold: 600;
      --w-bold: 700;
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 24px;
      --s-6: 32px;
      --hit: 44px;
      --r-1: 8px;
      --r-2: 12px;
      --r-3: 20px;
      --r-pill: 999px;
      --text: rgba(255, 255, 255, .92);
      --muted: rgba(255, 255, 255, .68);
      --muted2: rgba(255, 255, 255, .52);
      --accent: #f45925;
      --accent-fill: rgba(244, 89, 37, .15);
      --accent-stroke: rgba(244, 89, 37, .4);
      --warn-stroke: rgba(255, 204, 102, .55);
      --bg-0: #000000;
      --bg-1: #161616;
      --glass: rgba(255, 255, 255, 0.03);
      --glass2: rgba(255, 255, 255, 0.02);
      --stroke: rgba(255, 255, 255, 0.1);
      --stroke2: rgba(255, 255, 255, 0.15);
      --sep: rgba(255, 255, 255, .05);
      --shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      --inset: inset 0 0.5px 0 rgba(255, 255, 255, .08);
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      font-family: inherit;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      color: var(--text);
      background: black;
      background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000 70%);
      font-family: var(--font-sans);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(0deg,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 1px,
          transparent 2px);
      background-size: 100% 2px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: var(--s-4);
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: var(--s-4);
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }

    .card {
      position: relative;
      border-radius: var(--r-3);
      overflow: hidden;
      border: 1px solid var(--stroke);
      background: var(--glass);
      box-shadow: var(--shadow), var(--inset);
      transform: translateZ(0);
      backdrop-filter: blur(25px) saturate(1.2);
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      border-radius: inherit;
      box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.03);
    }

    .head {
      padding: var(--s-3) var(--s-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s-3);
      background: var(--glass2);
      border-bottom: 1px solid var(--sep);
    }

    .title {
      font-size: var(--fs-title);
      font-weight: var(--w-semibold);
    }

    .seg {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, .06);
    }

    .seg button {
      min-height: var(--hit);
      padding: 0 var(--s-3);
      border: 0;
      border-radius: var(--r-pill);
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .seg button.isActive {
      background: rgba(122, 162, 255, .20);
    }

    button {
      min-height: var(--hit);
      padding: 0 var(--s-3);
      border-radius: var(--r-pill);
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, .06);
      color: var(--text);
      font: inherit;
      font-weight: var(--w-semibold);
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent-stroke);
      background: var(--accent-fill);
    }

    .calendar {
      padding: var(--s-4);
    }

    .monthBar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--s-3);
    }

    .month {
      font-size: var(--fs-title);
      font-weight: var(--w-semibold);
      text-transform: capitalize;
    }

    .hint {
      color: var(--muted);
      font-size: var(--fs-callout);
    }

    .dow,
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--s-2);
    }

    .dow {
      margin-bottom: var(--s-2);
      color: var(--muted2);
      font-size: var(--fs-caption);
      font-weight: var(--w-semibold);
      text-transform: uppercase;
      text-align: center;
      /* Center align headers */
    }

    .day {
      min-height: 76px;
      padding: var(--s-3);
      border-radius: var(--r-2);
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .05);
      cursor: pointer;
      position: relative;
    }

    .day.sel {
      border-color: rgba(122, 162, 255, .82);
      background: radial-gradient(160px 120px at 30% 20%, rgba(122, 162, 255, .18), transparent 58%), rgba(255, 255, 255, .05);
    }

    .day.out {
      opacity: .45;
    }

    .day.today {
      outline: 2px dashed var(--warn-stroke);
      outline-offset: 2px;
    }

    .num {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: var(--w-semibold);
      margin-bottom: 4px;
      /* Space for dots */
    }

    .dots {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .dot.done {
      background: #4cd964;
      box-shadow: 0 0 4px rgba(76, 217, 100, 0.6);
    }

    .dot.pending {
      background: #ffcc00;
      box-shadow: 0 0 4px rgba(255, 204, 0, 0.6);
    }

    .task-lines {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 4px;
    }

    .task-line {
      height: 3px;
      border-radius: 2px;
      width: 100%;
      opacity: 0.8;
    }

    .task-line.done {
      background: #4cd964;
    }

    .task-line.pending {
      background: #ffcc00;
    }

    .task-line.overdue {
      background: #ff3b30;
    }

    /* Unified Header Buttons */
    .header-actions {
      display: flex;
      gap: 8px;
    }

    .mini-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }

    .mini-btn.task-btn {
      color: #ffcc00;
      background: rgba(255, 204, 0, 0.1);
    }


    .dot.overdue {
      background: #ff3b30;
      box-shadow: 0 0 4px rgba(255, 59, 48, 0.6);
    }

    .side {
      padding: var(--s-4);
      display: flex;
      flex-direction: column;
      gap: var(--s-4);
    }

    .list {
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: var(--r-3);
      overflow: hidden;
      background: rgba(255, 255, 255, .04);
    }

    .item {
      padding: var(--s-3) var(--s-4);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      cursor: pointer;
      background: rgba(255, 255, 255, .03);
      border-left: 3px solid transparent;
      /* Status indicator */
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item.done {
      border-left-color: #4cd964;
    }

    .item.pending {
      border-left-color: #ffcc00;
    }

    .item.overdue {
      border-left-color: #ff3b30;
    }

    .item-content {
      flex: 1;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 0;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    input:focus,
    textarea:focus {
      border-color: rgba(122, 162, 255, .50);
    }

    .icon-btn.done-btn {
      color: #4cd964;
    }

    .icon-btn.resched-btn {
      color: #ff3b30;
    }

    form {
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: var(--r-3);
      padding: var(--s-4);
      background: rgba(255, 255, 255, .04);
      display: grid;
      gap: 20px;
      /* Increased gap for better alignment */
    }

    label {
      display: grid;
      gap: 6px;
      font-size: var(--fs-caption);
      font-weight: var(--w-semibold);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input,
    textarea,
    .multi-select-wrap {
      width: 100%;
      box-sizing: border-box;
      border-radius: var(--r-2);
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .18);
      color: var(--text);
      padding: 10px var(--s-3);
      font: inherit;
      outline: none;
      min-height: var(--hit);
      /* Unified height for perfect alignment */
      position: relative;
    }

    /* specific for multi-select display */
    .multi-select-wrap {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    #deliverables,
    #notes {
      min-height: 160px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-3);
    }

    /* Timing Grid DnD Styles */
    .drag-handle {
      cursor: grab;
      color: var(--muted2);
      padding: 0 4px;
      user-select: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .sortable-ghost {
      opacity: 0.4;
      background: var(--accent-fill) !important;
    }

    .sortable-drag {
      background: var(--bg-1) !important;
      box-shadow: var(--shadow);
      opacity: 0.9;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      padding-top: var(--s-4);
      border-top: 1px solid var(--sep);
      margin-top: var(--s-3);
    }

    .actions button {
      font-size: 11px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .footer {
      padding: var(--s-3) var(--s-4);
      border-top: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .03);
      display: flex;
      justify-content: space-between;
    }

    pre {
      margin: 0;
      padding: var(--s-4);
      border-radius: var(--r-3);
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(0, 0, 0, .18);
      color: rgba(255, 255, 255, .78);
      font-family: var(--font-sans);
      /* Changed from mono for better stylized look */
      font-size: 12px;
      white-space: pre-wrap;
    }

    .hl-label {
      color: #ff6b6b;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .hl-time {
      color: #ff6b6b;
      font-weight: 700;
      font-size: 13px;
    }

    @media (max-width: 600px) {

      /* Mobile Calendar Fixes */
      .calendar {
        padding: 4px;
      }

      .grid,
      .dow {
        gap: 2px;
      }

      .day {
        min-height: 60px;
        padding: 2px;
        font-size: 10px;
      }

      .num {
        margin-bottom: 2px;
      }

      .item {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .item-actions {
        justify-content: flex-end;
      }

      /* Maximize horizontal width on mobile */
      .wrap {
        padding: 8px 6px;
        /* Even tighter for narrow devices */
      }

      form {
        padding: 10px;
        gap: 12px;
        /* Tighter vertical gap */
        padding-bottom: 80px;
      }

      /* Keep 2-column layout but make it very compact */
      .row2 {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        /* Small gap to prevent overflow */
      }

      label {
        font-size: 10px;
        /* Smaller labels */
        gap: 4px;
      }

      input,
      textarea,
      .multi-select-wrap {
        padding: 6px 8px;
        /* Tighter input padding */
        font-size: 12px;
        /* Smaller input text */
        min-height: 38px;
        /* Lower height for compactness */
      }

      .tag {
        padding: 2px 6px;
        font-size: 10px;
      }

      button {
        min-height: 38px;
        font-size: 12px;
      }
    }

    /* Autocomplete Styles */
    .input-wrap,
    .multi-select-wrap {
      position: relative;
    }

    .day.today {
      background: #333;
      border: 1px solid #666;
    }

    .day.sel {
      border: 2px solid #fff;
    }

    .day.has-pending {
      background: rgba(255, 204, 0, 0.08);
    }

    .tags {
      display: contents;
    }

    .tag {
      background: rgba(122, 162, 255, .20);
      color: #fff;
      padding: 2px 6px;
      border-radius: var(--r-pill);
      font-size: 10px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid rgba(122, 162, 255, .3);
    }

    .tag-remove {
      cursor: pointer;
      opacity: 0.6;
      font-weight: bold;
      font-size: 14px;
      line-height: 1;
    }

    .tag-remove:hover {
      opacity: 1;
      color: #ff6b6b;
    }

    #crewInput {
      border: none !important;
      background: transparent !important;
      padding: 0 !important;
      margin: 0 !important;
      flex: 1;
      min-width: 80px;
      height: 30px;
      outline: none;
    }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #15161c;
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: var(--r-2);
      max-height: 250px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      margin-top: 4px;
    }

    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      font-size: 13px;
    }

    .dropdown-item:hover {
      background: rgba(122, 162, 255, .15);
    }

    .dropdown-item small {
      opacity: 0.5;
      font-size: 10px;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-content {
      background: #1c1d24;
      border: 1px solid var(--stroke);
      border-radius: var(--r-3);
      padding: 24px;
      width: 90%;
      max-width: 360px;
      box-shadow: var(--shadow);
    }

    .checklist-container {
      max-height: 280px;
      overflow-y: auto;
      margin: 12px 0;
      padding-right: 5px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: var(--r-1);
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .check-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .check-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .check-item label {
      margin: 0;
      cursor: pointer;
      flex: 1;
      font-size: 14px;
    }

    /* Tabs */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
      padding: 0 10px;
    }

    .nav-btn {
      flex: 1;
      max-width: 200px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      border-radius: 8px;
    }

    .nav-btn.active {
      background: var(--accent-fill);
      border-color: var(--accent-stroke);
      color: white;
      box-shadow: 0 0 10px rgba(122, 162, 255, 0.3);
    }

    /* Timing Table */
    .timing-wrap {
      margin-top: var(--s-3);
      border: 1px solid var(--stroke);
      border-radius: var(--r-2);
      overflow-x: auto;
      background: rgba(255, 255, 255, .03);
      position: relative;
    }

    /* Scroll indicator fade */
    .timing-wrap::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 30px;
      background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.3));
      pointer-events: none;
    }

    .timing-table {
      min-width: 800px;
      display: flex;
      flex-direction: column;
    }

    .timing-row {
      display: grid;
      grid-template-columns: 30px 85px 85px 120px 120px 120px 120px 1fr 40px;
      gap: 1px;
      background: var(--stroke);
      border-bottom: 1px solid var(--stroke);
      min-width: 890px;
      /* Adjusted for wider time cells */
    }

    .timing-row:last-child {
      border-bottom: none;
    }

    .timing-header {
      background: rgba(255, 255, 255, .07);
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .timing-cell {
      background: #15161c;
      padding: 2px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .timing-cell.drag-handle {
      justify-content: center;
      color: var(--muted);
      cursor: grab;
      font-size: 14px;
      user-select: none;
    }

    .timing-cell input,
    .timing-cell select {
      width: 100%;
      min-width: 0;
      background: transparent;
      border: none;
      color: white;
      font-size: 11px;
      padding: 6px 4px;
      outline: none;
      overflow-x: auto;
    }

    /* Equipment Table Columns */
    .gear-row {
      display: grid;
      grid-template-columns: 80px 1fr 40px 80px 28px;
      gap: 1px;
      background: var(--stroke);
      border-bottom: 2px solid var(--stroke);
    }

    #gearTable {
      min-width: 0;
    }

    .gear-header {
      background: rgba(122, 162, 255, 0.1);
      font-weight: bold;
      font-size: 10px;
      text-transform: uppercase;
    }

    /* Hide native time picker indicator to give more room for text */
    .timing-cell input[type="time"]::-webkit-calendar-picker-indicator {
      display: none;
      -webkit-appearance: none;
    }

    .timing-cell select option {
      background: #15161c;
      color: white;
    }

    .timing-add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: rgba(122, 162, 255, 0.1);
      color: var(--accent);
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      border-top: 1px solid var(--stroke);
    }

    .timing-add-btn:hover {
      background: rgba(122, 162, 255, 0.2);
    }

    .timing-remove,
    .timing-del-btn {
      color: rgba(255, 107, 107, 0.5);
      cursor: pointer;
      font-weight: bold;
      text-align: center;
      width: 100%;
      background: transparent;
      border: none;
      font-size: 16px;
      transition: color 0.2s;
    }

    .timing-del-btn:hover {

    // 1. КОНФИГУРАЦИЯ SUPABASE
    const S_URL = "https://waekzofajzqcpoeldhkt.supabase.co";
    const S_KEY = "sb_publishable_XVByRUkaKbM-11ChwOd2Aw_y24CSb4V";
    const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

    // Telegram Init
    const tg = window?.Telegram?.WebApp;
    if (tg) tg.expand();

    // ПЕРЕМЕННЫЕ
    let allEvents = [];
    let allTasks = []; // New
    let currentTab = 'calendar'; // 'calendar' or 'tasks'
    let selectedDate = new Date();
    let currentMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
    let selectedId = null; // For Shoots
    let selectedTaskId = null; // For Tasks (Re-introduced for stability)

    const pad2 = n => String(n).padStart(2, "0");
    const toISO = d => `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    const startMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
    const niceDate = d => d.toLocaleDateString("ru-RU", { day: "2-digit", month: "long", year: "numeric" });
    const weekday = d => d.toLocaleDateString("ru-RU", { weekday: "long" });
    const monthName = d => d.toLocaleDateString("ru-RU", { month: "long", year: "numeric" });
    const niceDateShort = d => d.toLocaleDateString("ru-RU", { day: "numeric", month: "short" }); // New helper

    // --- OFFLINE SYNC CONFIG ---
    const CACHE_KEYS = { EVENTS: 'campot_events', TASKS: 'campot_tasks', SYNC: 'campot_sync_queue' };

    function getCache(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch (e) { return []; } }
    function setCache(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

    function addToSyncQueue(type, payload) {
      let queue = getCache(CACHE_KEYS.SYNC);
      // Remove previous pending update for same ID to avoid duplicates
      queue = queue.filter(item => item.payload.id !== payload.id);
      queue.push({ type, payload, timestamp: Date.now() });
      setCache(CACHE_KEYS.SYNC, queue);
      console.log(`Added to sync queue: ${type} ${payload.id}`);
    }

    async function processSyncQueue() {
      if (!navigator.onLine) return;
      let queue = getCache(CACHE_KEYS.SYNC);
      if (queue.length === 0) return;

      console.log(`Processing sync queue (${queue.length} items)...`);
      const remaining = [];

      for (const item of queue) {
        try {
          let res;
          if (item.type === 'delete_shoots') {
            res = await supabaseClient.from('shoots').delete().eq('id', item.payload.id);
          } else if (item.type === 'delete_tasks') {
            res = await supabaseClient.from('tasks').delete().eq('id', item.payload.id);
          } else {
            res = await supabaseClient.from(item.type).upsert(item.payload);
          }
          if (res.error) throw res.error;
        } catch (err) {
          console.error(`Sync error for ${item.payload.id}:`, err);
          remaining.push(item);
        }
      }

      setCache(CACHE_KEYS.SYNC, remaining);
      if (remaining.length === 0) console.log("Sync complete!");
    }

    window.addEventListener('online', processSyncQueue);
    setInterval(processSyncQueue, 30000); // Heartbeat sync

    // Helpers for Status
    const todayISO = toISO(new Date());
    const getStatus = (e) => {
      if (e.status === 'done') return 'done';
      if (e.date < todayISO) return 'overdue';
      return 'pending';
    };

    async function toggleTaskStatus(id, status) {
      // 1. Optimistic
      const t = allTasks.find(x => x.id === id);
      if (t) t.status = status;
      setCache(CACHE_KEYS.TASKS, allTasks);
      render();

      // 2. Cloud or Queue
      if (navigator.onLine) {
        const { error } = await supabaseClient.from('tasks').update({ status }).eq('id', id);
        if (!error) return;
      }
      addToSyncQueue('tasks', t);
    }

    async function deleteTask(id) {
      if (!confirm('Удалить задачу?')) return;
      // 1. Optimistic
      allTasks = allTasks.filter(x => x.id !== id);
      setCache(CACHE_KEYS.TASKS, allTasks);
      render();

      // 2. Cloud or Queue
      if (navigator.onLine) {
        const { error } = await supabaseClient.from('tasks').delete().eq('id', id);
        if (!error) return;
      }
      addToSyncQueue('delete_tasks', { id });
    }

      const form = document.getElementById('taskForm');

      // console.log('Open Task Form. Task:', task); // Debug

      if (task) {

        form.style.borderColor = '#ffcc00'; // Yellow/Red border for EDIT
        document.querySelector('#taskForm h3').textContent = 'РЕДАКТИРОВАНИЕ ЗАДАЧИ';
        // document.getElementById('debug_id_disp').textContent = 'ID: ' + task.id; // Visible Debug

      const type = document.getElementById('t_type').value;
      const assignees = document.getElementById('t_assignees').value.split(',').map(s => s.trim()).filter(s => s);
      const casting_project = document.getElementById('t_casting_project').value.trim() || null;
      const actors = document.getElementById('t_actors').value.trim() || null;

      const payload = {
        title, description: desc, deadline, type,
        assignee_ids: assignees,
        project_id: project,
        casting_project,
        actors,
        status: 'pending'
      };

      // Match Shoot Logic: Use Upsert
      if (selectedTaskId) {
        payload.id = selectedTaskId;
        // Ideally we should preserve status if we are just editing details, 
        // but upsert might overwrite status to 'pending' if we don't fetch first.
        // Let's fetch the existing status from local array to be safe.
        const existing = allTasks.find(t => t.id === selectedTaskId);
        if (existing) payload.status = existing.status;

        // Preserve start date (created_at) if editing? 
        // User says: "выбран день на календаре это начало задачи".
        // If I edit a task, should I move the start date to the NEW selected date?
        // Probably yes, if I'm "rescheduling" the start.
        // But usually editing title/desc shouldn't move start date.
        // However, if I didn't change Selected Date, it updates to the same date.
        // If I clicked a new date and then clicked Edit Task, `selectedDate` is the new date.
        // Let's assume user wants to set start date to current `selectedDate`.
        payload.created_at = new Date(selectedDate).toISOString();
      } else {
        // New Task: Start Date is the selected date on calendar
        payload.created_at = new Date(selectedDate).toISOString();
      }

      // 1. Optimistic Local
      const idx = allTasks.findIndex(t => t.id === payload.id);
      if (idx !== -1) allTasks[idx] = payload; else allTasks.push(payload);

          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
          document.getElementById('taskForm').style.display = 'none';
          selectedTaskId = null;
          if (btn) btn.innerHTML = 'Сохранить';
          return;

        // SPECIAL CASE: Actors should ALSO include project-specific contacts 
        // AND all contacts from 'casting' category
        if (fieldId === 'actors') {
          const mediaContacts = currentMediaContacts.map(c => ({
            full_name: c.name, position: 'Контакт (Media)', roles: ['actor']

          const castingContacts = currentCastingContacts.map(c => ({

          // The user said: "фильтровать по топику кастинг ... ПЛЮС клиенты из проекта"
          // So let's stick to the selected projects' contacts.
          pool = [...pool, ...mediaContacts, ...castingContacts];
          pool = pool.filter((v, i, a) => a.findIndex(t => t.full_name === v.full_name) === i);
        }

        let matches = val
          ? pool.filter(t => (t.full_name && t.full_name.toLowerCase().includes(val)) || (t.username && t.username.toLowerCase().includes(val)))
          : pool;

        matches = matches.slice(0, 20);
        if (!matches.length) { drop.style.display = 'none'; return; }
        matches.forEach(m => {
          const div = document.createElement('div');
          div.className = 'dropdown-item';
          div.innerHTML = `${m.full_name} <small style="opacity:0.6">${m.position || ''}</small>`;
          div.onclick = () => addTag(fieldId, tagsId, inputId, dropdownId, m.full_name);
          drop.appendChild(div);
        });
        drop.style.display = 'block';
      };
      inp.addEventListener('input', renderDrop);
      inp.addEventListener('focus', renderDrop);
      inp.addEventListener('click', (e) => { e.stopPropagation(); renderDrop(); });
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !inp.value) {
          const hidden = document.getElementById(fieldId);
          const names = hidden.value.split(',').map(s => s.trim()).filter(s => s);
          if (names.length) {
            names.pop();
            hidden.value = names.join(', ');
            renderTags(fieldId, tagsId);
          }
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          const val = inp.value.trim();
          if (val) addTag(fieldId, tagsId, inputId, dropdownId, val);
        }
      });
    }

      allEvents = getCache(CACHE_KEYS.EVENTS);

      if (!navigator.onLine) {
        if (syncBtn) { syncBtn.textContent = "📡"; setTimeout(() => syncBtn.textContent = "☁️", 2000); }

      try {

          allEvents = shoots.data;
          setCache(CACHE_KEYS.EVENTS, allEvents);

        if (tasks.data) {
          allTasks = tasks.data;

        }

        render();

        if (syncBtn) {
          syncBtn.textContent = "✅";

    // --- EXCEL LOGIC ---
    function exportShootToExcel(event) {
      const e = {
        project: document.getElementById("project").value,
        location: document.getElementById("location").value,
        date: document.getElementById("selectedLabel").textContent,
        callTime: document.getElementById("callTime").value,
        wrapTime: document.getElementById("wrapTime").value,
        address: document.getElementById("address").value,
        contact: document.getElementById("contact").value,
        deliverables: document.getElementById("deliverables").value,
        notes: document.getElementById("notes").value,
        crew: document.getElementById("crew").value,
        actors: document.getElementById("actors").value,
      };

      const timing = [];
      document.querySelectorAll("#timingRows .timing-row").forEach(row => {
        timing.push({
          START: row.querySelector(".t-start").value,
          END: row.querySelector(".t-end").value,
          LOC: row.querySelector(".t-loc").value,
          TASK: row.querySelector(".t-task").value,
          ACTORS: row.querySelector(".t-act").value,
          NOTES: row.querySelector(".t-notes").value,
          LINK: row.querySelector(".t-link") ? row.querySelector(".t-link").value : ''
        });
      });

      const gear = [];
      document.querySelectorAll("#gearRows .gear-row").forEach(row => {
        gear.push({
          CAT: row.querySelector(".g-cat").value,
          MODEL: row.querySelector(".g-model").value,
          QTY: row.querySelector(".g-qty").value,
          NOTES: row.querySelector(".g-note").value
        });
      });

      const wb = XLSX.utils.book_new();

      // --- Helper: add borders + col widths to a sheet ---
      function formatSheet(ws, colWidths) {
        const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
        const border = {
          top: { style: 'thin', color: { rgb: '999999' } },
          bottom: { style: 'thin', color: { rgb: '999999' } },
          left: { style: 'thin', color: { rgb: '999999' } },
          right: { style: 'thin', color: { rgb: '999999' } }
        };
        for (let R = range.s.r; R <= range.e.r; R++) {
          for (let C = range.s.c; C <= range.e.c; C++) {
            const addr = XLSX.utils.encode_cell({ r: R, c: C });
            if (!ws[addr]) ws[addr] = { v: '', t: 's' };
            if (!ws[addr].s) ws[addr].s = {};
            ws[addr].s.border = border;
            // Bold header row
            if (R === 0) {
              ws[addr].s.font = { bold: true, sz: 12 };
              ws[addr].s.fill = { fgColor: { rgb: 'E8E8E8' } };
            }
            ws[addr].s.alignment = { vertical: 'center', wrapText: true };
          }
        }
        if (colWidths) ws['!cols'] = colWidths.map(w => ({ wch: w }));
      }

      // ИНФО sheet
      const infoData = [
        ["ПОЛЕ", "ЗНАЧЕНИЕ"],
        ["ПРОЕКТ", e.project], ["ДАТА", e.date], ["ЛОКАЦИЯ", e.location],
        ["АДРЕС", e.address], ["КОНТАКТ", e.contact], ["CALL", e.callTime], ["WRAP", e.wrapTime],
        [""], ["ТЗ", e.deliverables], ["ПРИМЕЧАНИЯ", e.notes], ["КОМАНДА", e.crew], ["АКТЕРЫ", e.actors]
      ];
      const wsInfo = XLSX.utils.aoa_to_sheet(infoData);
      formatSheet(wsInfo, [16, 50]);
      XLSX.utils.book_append_sheet(wb, wsInfo, "ИНФО");

      // ТАЙМИНГ sheet
      if (timing.length) {
        const wsTiming = XLSX.utils.json_to_sheet(timing);
        formatSheet(wsTiming, [10, 10, 18, 22, 18, 22, 30]);
        XLSX.utils.book_append_sheet(wb, wsTiming, "ТАЙМИНГ");
      }

      // ТЕХНИКА sheet
      if (gear.length) {
        const wsGear = XLSX.utils.json_to_sheet(gear);
        formatSheet(wsGear, [14, 30, 8, 25]);
        XLSX.utils.book_append_sheet(wb, wsGear, "ТЕХНИКА");
      }

      const fileName = `Shoot_${e.project.replace(/\s+/g, '_')}_${e.date.replace(/[^\d.]/g, '')}.xlsx`;

      // 1. Try local download (might be blocked in TG browser)
      try { XLSX.writeFile(wb, fileName); } catch (ex) { console.warn("Local DL failed", ex); }

      // 2. Telegram Send (Reliable)
      const base64Data = XLSX.write(wb, { type: 'base64', bookType: 'xlsx' });
      const exportBtn = (event && event.target) ? (event.target.tagName === 'BUTTON' ? event.target : event.target.closest('button')) : null;

      if (exportBtn) {
        exportBtn.disabled = true;
        exportBtn.innerHTML = "⌛...";
      }

      fetch('/api/send_excel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          project_name: e.project,
          filename: fileName,
          base64_data: base64Data
        })
      })
        .then(res => res.json())
        .then(res => {
          if (res.status === 'ok') {
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            if (exportBtn) {
              exportBtn.innerHTML = "✅ В ТГ";
              setTimeout(() => { exportBtn.innerHTML = "📊 Excel"; exportBtn.disabled = false; }, 2000);
            }
          } else {
            alert("Ошибка TG: " + res.error);
            if (exportBtn) { exportBtn.innerHTML = "❌"; exportBtn.disabled = false; }
          }
        })
        .catch(err => {
          console.error("Fetch Error:", err);
          if (exportBtn) { exportBtn.innerHTML = "⚠️"; exportBtn.disabled = false; }
        });
    }

    function handleExcelImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (re) => {
        const data = new Uint8Array(re.target.result);
        const wb = XLSX.read(data, { type: 'array' });

        const wsInfo = wb.Sheets["ИНФО"];
        if (wsInfo) {
          const info = XLSX.utils.sheet_to_json(wsInfo, { header: 1 });
          info.forEach(r => {
            if (!r[0]) return;
            const k = r[0].toString().toUpperCase(); const v = r[1] || "";
            if (k === "ПРОЕКТ") document.getElementById("project").value = v;
            if (k === "ЛОКАЦИЯ") document.getElementById("location").value = v;
            if (k === "АДРЕС") document.getElementById("address").value = v;
            if (k === "КОНТАКТ") document.getElementById("contact").value = v;
            if (k === "CALL") document.getElementById("callTime").value = v;
            if (k === "WRAP") document.getElementById("wrapTime").value = v;
            if (k === "ТЗ") document.getElementById("deliverables").value = v;
            if (k === "ПРИМЕЧАНИЯ") document.getElementById("notes").value = v;
            if (k === "КОМАНДА") { document.getElementById("crew").value = v; renderCrewTags(); }
            if (k === "АКТЕРЫ") { document.getElementById("actors").value = v; renderActorsTags(); }
          });
        }
        const wsTiming = wb.Sheets["ТАЙМИНГ"];
        if (wsTiming) {
          const rows = XLSX.utils.sheet_to_json(wsTiming);
          document.getElementById('timingRows').innerHTML = '';
          rows.forEach(r => addTimingRow({ start: r.START || '', end: r.END || '', loc: r.LOC || '', task: r.TASK || '', act: r.ACTORS || '', notes: r.NOTES || '', link: r.LINK || '' }));

      };
      reader.readAsArrayBuffer(file);
    }

    function setupTimingInput(input, type) {
      const dropdown = document.getElementById('timingDropdown');

      const render = () => {
        const val = input.value.toLowerCase();
        let options = [];

        if (type === 'loc') {
          // Parse data from locationOptions datalist
          options = Array.from(document.querySelectorAll('#locationOptions option')).map(o => o.value);
        } else if (type === 'task') {
          options = Array.from(document.querySelectorAll('#taskOptions option')).map(o => o.value);
        } else if (type === 'link') {
          options = Array.from(document.querySelectorAll('#linkOptions option')).map(o => o.value);
        }

        const matches = val ? options.filter(o => o.toLowerCase().includes(val)) : options;

        if (!matches.length) { dropdown.style.display = 'none'; return; }

        dropdown.innerHTML = '';
        matches.forEach(m => {
          const div = document.createElement('div');
          div.className = 'dropdown-item';
          div.style.fontSize = '11px';
          div.style.padding = '8px 10px';
          div.textContent = m;

            const preview = document.getElementById('preview');
            if (preview) preview.innerHTML = buildExportText(true);
          };
          dropdown.appendChild(div);
        });

        // Position dropdown (it's fixed, so use viewport coords)
        const rect = input.getBoundingClientRect();
        dropdown.style.left = rect.left + 'px';
        dropdown.style.top = rect.bottom + 'px';
        dropdown.style.width = rect.width + 'px';
        dropdown.style.display = 'block';
      };

      input.onfocus = render;
      input.oninput = render;
      input.onclick = (e) => { e.stopPropagation(); render(); };
    }

    let timingSortable = null;

    function initTimingSortable() {
      const container = document.getElementById('timingRows');
      if (!container) return;
      if (timingSortable) timingSortable.destroy();

      timingSortable = Sortable.create(container, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        dragClass: 'sortable-drag',
        onStart: () => {
          // Capture current times at their fixed indices
          const rows = Array.from(container.querySelectorAll('.timing-row'));
          originalTimeSlots = rows.map(r => ({
            start: r.querySelector('.t-start').value,
            end: r.querySelector('.t-end').value
          }));
        },
        onEnd: () => {
          const rows = Array.from(container.querySelectorAll('.timing-row'));
          // Re-apply original times to the rows based on their NEW index
          // so that the 1st row always has the 1st time slot, etc.
          rows.forEach((row, i) => {
            if (originalTimeSlots[i]) {
              row.querySelector('.t-start').value = originalTimeSlots[i].start;
              row.querySelector('.t-end').value = originalTimeSlots[i].end;
            }
          });
          // Update preview immediately
          const preview = document.getElementById('preview');
          if (preview) preview.innerHTML = buildExportText(true);
        }
      });
    }

        const link = row.querySelector('.t-link').value;

        if (start || end || loc || task || act || notes || link) {
          let num = null;
          const taskLower = (task || '').trim().toLowerCase();

          if (taskLower && !techTasks.includes(taskLower)) {
            taskCounter++;
            num = taskCounter;
          }

          data.push({ start, end, loc, task, act, notes, link, num });
        }
      });
      return data;
    }

    function getGearData() {
      const rows = document.querySelectorAll('#gearRows .gear-row');
      const data = [];
      rows.forEach(row => {
        const cat = row.querySelector('.g-cat').value;
        const model = row.querySelector('.g-model').value.trim();
        const qty = row.querySelector('.g-qty').value;
        const note = row.querySelector('.g-note').value.trim();
        if (model) {
          data.push({ cat, model, qty, note });
        }
      });
      return data;
    }

    function removeTimingRow(btn, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }
      btn.closest('.timing-row').remove();
      const preview = document.getElementById('preview');
      if (preview) preview.innerHTML = buildExportText(true);
    }

    function setTimingData(raw) {
      const container = document.getElementById('timingRows');
      container.innerHTML = '';
      try {
        const data = JSON.parse(raw);
        if (Array.isArray(data)) {
          data.forEach(d => addTimingRow(d));
        }
      } catch (e) {
        // Fallback for old text-based schedule
        if (raw) addTimingRow({ task: raw });
      }
      // Ensure at least 4 rows for new or empty
      while (container.children.length < 4) {
        addTimingRow();
      }
    }

    function setGearData(raw) {
      const container = document.getElementById('gearRows');
      container.innerHTML = '';
      if (!raw) {
        addGearRow(); return;
      }
      try {
        const data = JSON.parse(raw);
        if (Array.isArray(data)) {
          data.forEach(d => addGearRow(d));
        } else if (raw.trim()) {
          // Migration for old plain text
          addGearRow({ cat: 'Другое', model: raw.trim(), qty: 1 });
        }
      } catch (e) {
        // Fallback or migration
        if (raw.trim()) addGearRow({ cat: 'Другое', model: raw.trim(), qty: 1 });
      }
      if (container.children.length === 0) addGearRow();
    }

    // 3. СОХРАНЕНИЕ В ОБЛАКО
    document.getElementById("form").onsubmit = async (ev) => {
      ev.preventDefault();
      await saveShootData();
    };

    async function saveShootData(isAutoSave = false) {
      const scheduleData = getTimingData();
      const gearData = getGearData();
      const payload = {
        id: selectedId || Math.random().toString(36).substring(2, 15),
        date: toISO(selectedDate),
        project: f.project.value.trim(),
        location: f.location.value.trim(),
        callTime: f.callTime.value,
        wrapTime: f.wrapTime.value,
        address: f.address.dataset.full || f.address.value.trim(),
        contact: f.contact.value.trim(),
        deliverables: f.deliverables.value.trim(),
        crew: f.crew.value.trim(),
        post_production: f.post_production.value.trim(),
        casting_project: f.casting_project.value.trim(),
        actors: f.actors.value.trim(),
        schedule: JSON.stringify(scheduleData),
        gear: JSON.stringify(gearData),
        notes: f.notes.value.trim(),
        report_link: f.report_link.value.trim(),
        status: 'pending'
      };

      if (selectedId) {
        const existing = allEvents.find(e => e.id === selectedId);
        if (existing) payload.status = existing.status;
      }

      // 1. Optimistic Local Save
      const idx = allEvents.findIndex(e => e.id === payload.id);
      if (idx >= 0) allEvents[idx] = payload; else allEvents.push(payload);
      setCache(CACHE_KEYS.EVENTS, allEvents);
      render();

      const saveBtn = document.querySelector('#form button[type="submit"]');
      if (saveBtn) saveBtn.innerHTML = '⌛...';

      // 2. Cloud Save (or Queue)
      if (navigator.onLine) {
        const { error } = await supabaseClient.from('shoots').upsert(payload);
        if (!error) {
          if (!selectedId) selectedId = payload.id;
          if (tg && tg.HapticFeedback && !isAutoSave) tg.HapticFeedback.notificationOccurred('success');
          if (saveBtn) {
            saveBtn.innerHTML = '✅';
            setTimeout(() => { saveBtn.innerHTML = 'Сохранить'; }, 1500);
          }
          if (!isAutoSave) toggleForm(false);
          return;
        }
      }

      // Offline or error -> Add to queue
      addToSyncQueue('shoots', payload);
      if (saveBtn) {
        saveBtn.innerHTML = '💾'; // Saved locally
        setTimeout(() => { saveBtn.innerHTML = 'Сохранить'; }, 1500);
      }
      if (!isAutoSave) toggleForm(false);
    }

    // --- AUTOSAVE ---
    let autoSaveTimer = null;
    function triggerAutoSave() {
      if (!selectedId) return; // Only autosave existing shoots
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => saveShootData(true), 1500);
    }

    // Attach autosave to all form fields
    document.getElementById('form').addEventListener('input', triggerAutoSave);
    document.getElementById('form').addEventListener('change', triggerAutoSave);

    // 4. УДАЛЕНИЕ
    document.getElementById("deleteBtn").onclick = async () => {
      if (!selectedId || !confirm("Удалить съемку?")) return;

      // 1. Optimistic
      allEvents = allEvents.filter(e => e.id !== selectedId);
      setCache(CACHE_KEYS.EVENTS, allEvents);
      render();
      toggleForm(false);

      // 2. Cloud or Queue
      if (navigator.onLine) {
        const { error } = await supabaseClient.from('shoots').delete().eq('id', selectedId);
        if (!error) return;
      }
      addToSyncQueue('delete_shoots', { id: selectedId });
    };

    // STATUS TOGGLE & RESCHEDULE
    async function toggleStatus(id, newStatus) {
      // Optimistic update
      const ev = allEvents.find(e => e.id === id);
      if (ev) ev.status = newStatus;
      render();

      const { error } = await supabaseClient.from('shoots').update({ status: newStatus }).eq('id', id);
      if (error) await loadFromCloud(); // Revert on error
    }

    async function rescheduleTask(id) {
      const reason = prompt("Причина переноса?");
      if (!reason) return;

      // Simple prompt for new date (mockup flow, ideally a date picker)
      // For now, just open the form and let user pick date, but pre-fill note
      const ev = allEvents.find(e => e.id === id);
      if (!ev) return;

      selectedId = id;
      // Populate form
      f.project.value = ev.project; f.location.value = ev.location;
      f.callTime.value = ev.callTime; f.wrapTime.value = ev.wrapTime;
      f.address.value = ev.address; f.contact.value = ev.contact;
      f.deliverables.value = ev.deliverables; f.crew.value = ev.crew;
      f.schedule.value = ev.schedule; f.gear.value = ev.gear;
      // Append reason to notes
      f.notes.value = (ev.notes ? ev.notes + "\n" : "") + `[Перенос с ${ev.date}: ${reason}]`;

      document.getElementById("deleteBtn").style.display = "block";
      toggleForm(true);
      // User manually changes date and saves
      alert("Выберите новую дату и нажмите Сохранить");

    // 5. ЛОГИКА КАЛЕНДАРЯ
    function render() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      const today = new Date();

      document.getElementById("monthLabel").textContent = monthName(currentMonth);
      document.getElementById("selectedLabel").textContent = `${niceDate(selectedDate)} (${weekday(selectedDate)})`;

      const monEvents = allEvents.filter(e => {
        const d = new Date(e.date);

        // Filter by ACTIVE projects
        const proj = clientsData.find(c => c.name === e.project);
        if (proj && !proj.is_active) return false;

        return d.getFullYear() === currentMonth.getFullYear() && d.getMonth() === currentMonth.getMonth();
      });

      // Calculate Stats
      const done = monEvents.filter(e => e.status === 'done').length;
      const pending = monEvents.filter(e => e.status === 'pending').length;
      const overdue = monEvents.filter(e => e.status === 'overdue').length;

      // Update Header with Icons
      const statHtml = `
        <span style="color:#4cd964">✅ ${done}</span>
        <span style="color:#ffcc00; margin-left:8px">🟡 ${pending}</span>
        <span style="color:#ff3b30; margin-left:8px">🔥 ${overdue}</span>
      `;
      document.getElementById("monthStat").innerHTML = statHtml;

      const first = startMonth(currentMonth);
      const offset = (first.getDay() + 6) % 7;
      const start = new Date(first);
      start.setDate(first.getDate() - offset);

      for (let i = 0; i < 42; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const iso = toISO(d);

        // Dot Logic (Shoots)
        const dayEvents = allEvents.filter(e => e.date === iso);
        let dotsHtml = "";
        dayEvents.forEach(e => {
          const st = getStatus(e);
          dotsHtml += `<div class="dot ${st}"></div>`;
        });

        // Line Logic (Tasks)
        const dayTasks = allTasks.filter(t => {
          if (t.status === 'done') return false;
          if (!t.deadline) return false;

          // Hide tasks for INACTIVE projects
          const p = clientsData.find(c => c.name === t.project_id);
          const cp = clientsData.find(c => c.name === t.casting_project);
          if (p && !p.is_active) return false;
          if (cp && !cp.is_active) return false;

          // Startdate: created_at or fallback to deadline if missing
          // We want to show line from start to deadline
          // If created_at is missing, we assume it's a single day task (deadline)
          let start = t.created_at ? t.created_at.split('T')[0] : t.deadline;
          if (start > t.deadline) start = t.deadline; // Safety

          return iso >= start && iso <= t.deadline;
        });

        let linesHtml = "";
        if (dayTasks.length > 0) {
          linesHtml += `<div class="task-lines">`;
          dayTasks.forEach(t => {
            const start = t.created_at ? t.created_at.split('T')[0] : t.deadline;
            const isStart = (start === iso);
            const isEnd = (t.deadline === iso);

            // Style for rounded ends
            let style = '';

            // GRADIENT COLOR CALCULATION
            const startDate = new Date(start);
            const endDate = new Date(t.deadline);
            const currDate = new Date(iso);

            // Total duration in ms
            const total = endDate - startDate;
            // Elapsed in ms
            const elapsed = currDate - startDate;

            // Ratio (0 to 1)
            let ratio = 0;
            if (total > 0) ratio = Math.max(0, Math.min(1, elapsed / total));

            // Interpolate color from #FFCC00 (Yellow) to #FF3B30 (Red)
            // Yellow: 255, 204, 0
            // Red:    255, 59,  48
            const r = Math.round(255 + ratio * (255 - 255));
            const g = Math.round(204 + ratio * (59 - 204));
            const b = Math.round(0 + ratio * (48 - 0));
            const color = `rgb(${r}, ${g}, ${b})`;

            // Apply styles
            if (isStart && isEnd) { style = 'border-radius: 2px; margin: 0 2px;'; }
            else if (isStart) { style = 'border-radius: 2px 0 0 2px; margin-right:-4px;'; }
            else if (isEnd) { style = 'border-radius: 0 2px 2px 0; margin-left:-4px;'; }
            else { style = 'border-radius: 0; margin: 0 -4px;'; }

            const stClass = (t.deadline < todayISO) ? 'overdue' : 'pending';

            // Override background color if pending/overdue (completed is green usually, but let's stick to gradient for active)
            if (t.status !== 'done') {
              style += ` background-color: ${color} !important;`;
            }

            linesHtml += `<div class="task-line ${stClass}" style="${style}"></div>`;
          });
          linesHtml += `</div>`;
        }

        // Highlight Logic
        const isPast = iso < todayISO;
        const hasPendingShoot = dayEvents.some(e => getStatus(e) === 'pending');

        const cell = document.createElement("div");
        let cellClasses = "day" + (d.getMonth() !== currentMonth.getMonth() ? " out" : "") + (iso === toISO(selectedDate) ? " sel" : "") + (iso === toISO(today) ? " today" : "");
        if (hasPendingShoot) cellClasses += " has-pending";

        cell.className = cellClasses;

        // Gray out past days numbers
        const numStyle = isPast ? 'style="color:#444;"' : '';

        cell.innerHTML = `<div class="num" ${numStyle}><span>${d.getDate()}</span></div><div class="dots">${dotsHtml}</div>${linesHtml}`;
        cell.onclick = () => {
          selectedDate = d;
          selectedId = null;
          selectedTaskId = null; // Clear Task editing state too
          toggleForm(false);
          document.getElementById('taskForm').style.display = 'none';
          render();
        };
        grid.appendChild(cell);
      }

      // Список проектов дня (Shoots + Tasks)
      const listDiv = document.getElementById("eventList");
      const dayShoots = allEvents.filter(e => {
        const proj = clientsData.find(c => c.name === e.project);
        if (proj && !proj.is_active) return false;
        return e.date === toISO(selectedDate);
      }).sort((a, b) => a.callTime.localeCompare(b.callTime));

      const dayTasksList = allTasks.filter(t => {
        const p = clientsData.find(c => c.name === t.project_id);
        const cp = clientsData.find(c => c.name === t.casting_project);
        if (p && !p.is_active) return false;
        if (cp && !cp.is_active) return false;
        return t.deadline === toISO(selectedDate);
      });

      let html = "";
      if (!dayShoots.length && !dayTasksList.length) html = '<div class="item" style="color:gray">Нет событий</div>';

      // Render Shoots
      dayShoots.forEach(e => {
        const st = getStatus(e);
        // ... (Buttons logic same as before)
        let buttons = "";
        if (st === 'pending' || st === 'overdue') buttons += `<button class="icon-btn done-btn" onclick="event.stopPropagation(); toggleStatus('${e.id}', 'done')">✅</button>`;
        if (st === 'done') buttons += `<button class="icon-btn" onclick="event.stopPropagation(); toggleStatus('${e.id}', 'pending')">↩️</button>`;
        if (st === 'overdue') buttons += `<button class="icon-btn resched-btn" onclick="event.stopPropagation(); rescheduleTask('${e.id}')">📅</button>`;

        html += `
            <div class="item ${st}" onclick="editShoot('${e.id}')">
                <div class="item-content">
                    <b>${e.project || "Без названия"}</b><br>
                    <small>🎥 ${e.callTime || "--:--"}—${e.wrapTime || "--:--"} • ${e.location || ""}</small><br>
                    ${e.crew ? `<small style="opacity:0.7">👥 ${e.crew}</small><br>` : ''}
                    ${e.post_production ? `<small style="color:var(--accent)">✂️ ${e.post_production}</small>` : ''}
                </div>
                <div class="item-actions">${buttons}</div>
            </div>
        `;
      });

      // Render Tasks
      dayTasksList.forEach(t => {
        const st = t.status === 'done' ? 'done' : (t.deadline < todayISO ? 'overdue' : 'pending');
        // Task Buttons
        let buttons = "";
        if (t.status !== 'done') buttons += `<button class="icon-btn done-btn" onclick="event.stopPropagation(); toggleTaskStatus('${t.id}', 'done')">✅</button>`;
        else buttons += `<button class="icon-btn" onclick="event.stopPropagation(); toggleTaskStatus('${t.id}', 'pending')">↩️</button>`;
        buttons += `<button class="icon-btn resched-btn" onclick="event.stopPropagation(); deleteTask('${t.id}')">🗑</button>`;

        html += `
            <div class="item ${st}" style="border-left: 2px solid ${st === 'done' ? '#4cd964' : '#ffcc00'};" onclick="editTask('${t.id}')">
                <div class="item-content">
                    <b>${t.title}</b><br>
                    <small>📌 ${t.project ? t.project + ' • ' : ''}${t.type}</small>
                </div>
                <div class="item-actions">${buttons}</div>
            </div>
         `;
      });

      listDiv.innerHTML = html;
      document.getElementById("preview").innerHTML = buildExportText(true);
    }

    // ... (rest of helper functions: buildExportText, toggleForm, etc.) ...

    // STARTUP
    function buildSingleShootExport(e, i = null, isHtml = false, fullDetails = true) {
      const hlL = (txt, html) => html ? `<span class="hl-label">${txt}</span>` : txt;
      const hlT = (txt, html) => html ? `<span class="hl-time">${txt}</span>` : txt;

      const stat = getStatus(e) === 'done' ? '✅ ' : '';
      const studioAddress = "Comfort Residencies, Улица Иванилова, 63з";
      const studioLink = "https://go.2gis.com/bd4n9";
      let displayAddr = e.address || '';

      if (displayAddr.includes(' | ')) {
        const parts = displayAddr.split(' | ');
        displayAddr = (parts[0] === studioAddress) ? `[${studioAddress}](${studioLink})` : `[${parts[0]}](${parts[1]})`;
      } else if (displayAddr.includes("Иванилова, 63з") || displayAddr === studioAddress) {
        displayAddr = `[${studioAddress}](${studioLink})`;
      }

      const shiftTime = `${e.callTime || '--:--'}—${e.wrapTime || '--:--'}`;
      let lines = [];
      const header = i !== null ? `🎥 ${hlL(`ПРОЕКТ #${i + 1}`, isHtml)}` : `🎥 ${hlL(e.project || 'ПРОЕКТ', isHtml)}`;

      lines.push(`${stat}${header}`);
      if (i !== null) lines.push(`${hlL('ПРОЕКТ:', isHtml)} ${e.project}`);
      lines.push(`${hlL('СМЕНА:', isHtml)} ${hlT(shiftTime, isHtml)}`);
      lines.push(`${hlL('ЛОКАЦИЯ:', isHtml)} ${e.location}`);
      lines.push(`${hlL('АДРЕС:', isHtml)} ${displayAddr}`);
      lines.push(`${hlL('КОМАНДА:', isHtml)} ${e.crew}`);

      if (e.post_production) lines.push(`${hlL('ПОСТ/МОНТАЖ:', isHtml)} ${e.post_production}`);
      if (e.casting_project || e.actors) {
        lines.push(`${hlL('КАСТИНГ:', isHtml)} ${e.casting_project || '—'}`);
        if (e.actors) lines.push(`${hlL('🎬 АКТЕРЫ:', isHtml)} ${e.actors}`);
      }

      if (fullDetails && e.schedule) {
        try {
          const sch = JSON.parse(e.schedule);
          if (Array.isArray(sch) && sch.some(r => r.start || r.task || r.loc || r.act || r.link)) {
            lines.push(`\n${hlL('🕒 ТАЙМИНГ:', isHtml)}`);
            sch.forEach(row => {
              const timeStr = row.start ? (row.end ? `${row.start}—${row.end}` : row.start) : '';
              const task = row.task || '';
              const obj = row.loc ? ` (${row.loc})` : '';
              const acts = row.act ? ` — 👤 ${row.act}` : '';
              const link = row.link ? ` [🔗](${row.link})` : '';
              const num = row.num ? `№${row.num} ` : '';
              if (timeStr || task || obj || row.act || row.link) {
                lines.push(`  ${timeStr ? hlT(timeStr, isHtml) + ' ' : ''}${num}${task}${obj}${acts}${link}`);
              }
            });
          }
        } catch (ex) { }
      }

      if (fullDetails && e.deliverables) lines.push(`\n${hlL('📝 ЗАДАЧИ:', isHtml)}\n${e.deliverables}`);
      if (e.gear) {
        try {
          const gd = JSON.parse(e.gear);
          if (Array.isArray(gd) && gd.length > 0) {
            lines.push(`\n${hlL('⚙️ ТЕХНИКА:', isHtml)}`);
            gd.forEach(g => {
              lines.push(`  • ${g.cat}: ${g.model}${g.qty > 1 ? ` (x${g.qty})` : ''}${g.note ? ` — ${g.note}` : ''}`);
            });
          } else if (typeof e.gear === 'string' && e.gear.trim()) {
            lines.push(`\n${hlL('⚙️ ТЕХНИКА:', isHtml)}\n${e.gear}`);
          }
        } catch (ex) {
          if (e.gear && e.gear.trim()) lines.push(`\n${hlL('⚙️ ТЕХНИКА:', isHtml)}\n${e.gear}`);
        }
      }
      if (e.notes) lines.push(`\n${hlL('⚠️ ИНФО:', isHtml)}\n${e.notes}`);
      if (e.contact) lines.push(`${hlL('📞 КОНТАКТ:', isHtml)} ${e.contact}`);
      if (e.report_link) lines.push(`${hlL('📊 ОТЧЕТ:', isHtml)} ${e.report_link}`);

      return lines.join("\n");
    }

    function buildExportText(isHtml = false) {
      const list = allEvents.filter(e => e.date === toISO(selectedDate));
      if (!list.length) return "Смен нет.";

      let lines = [`📅 **СЪЁМОЧНЫЙ ДЕНЬ — ${niceDate(selectedDate)}**`];
      list.forEach((e, i) => {
        lines.push(`\n— — — — — — — — —\n`);
        lines.push(buildSingleShootExport(e, i, isHtml, false)); // No details in daily export
      });
      return lines.join("\n");
    }

    // NAVIGATION & MODULES
    function openModule(mod) {
      document.getElementById('splashScreen').style.display = 'none';
      document.querySelector('.wrap').style.display = 'none';
      document.getElementById('castingView').style.display = 'none';

      if (mod === 'calendar') {

      } else if (mod === 'timer') {
        window.location.href = 'timer.html';
      } else if (mod === 'casting') {
        document.getElementById('castingView').style.display = 'block';
        fetchCastingApplications();
      }
    }

    function goBackToMenu() {
      document.getElementById('splashScreen').style.flexDirection = 'column';
      document.getElementById('splashScreen').style.display = 'flex';
      document.querySelector('.wrap').style.display = 'none';
      document.getElementById('castingView').style.display = 'none';
    }

    function openTimer() {
      window.location.href = 'timer.html';
    }

    // CASTING HUB LOGIC
    let castingApps = [];
    let currentCastingProject = null;

    async function fetchCastingApplications() {
      const { data, error } = await supabaseClient.from('casting_applications').select('*').order('created_at', { ascending: false });
      if (error) {
        console.error("Error fetching casting:", error);
      } else {
        castingApps = data || [];
      }

      if (castingApps.length === 0) {
        castingApps = [
          { id: 'mock1', project_name: 'Реклама Сока', full_name: 'Анна Смирнова', dob: 25, city: 'Москва', photo_url: 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&q=80&w=200&h=200', is_selected: false },
          { id: 'mock2', project_name: 'Реклама Сока', full_name: 'Михаил Иванов', dob: 31, city: 'Санкт-Петербург', photo_url: 'https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=200&h=200', is_selected: true },
          { id: 'mock3', project_name: 'Фильм "Лето"', full_name: 'София Ким', dob: 22, city: 'Казань', photo_url: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200&h=200', is_selected: false },
          { id: 'mock4', project_name: 'Фильм "Лето"', full_name: 'Алексей Петров', dob: 28, city: 'Екатеринбург', photo_url: 'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=200&h=200', is_selected: false }
        ];
      }
      renderCastingHub();
    }

    function renderCastingHub() {
      const tabsDiv = document.getElementById('projectTabs');
      const grid = document.getElementById('actorsGrid');

      const projects = [...new Set(castingApps.map(a => a.project_name || 'Без проекта'))];
      if (!currentCastingProject && projects.length > 0) currentCastingProject = projects[0];

      tabsDiv.innerHTML = projects.map(p => `
        <div class="p-tab ${p === currentCastingProject ? 'active' : ''}" onclick="selectCastingProject('${p}')">${p}</div>
      `).join('');

      const currentActors = castingApps.filter(a => (a.project_name || 'Без проекта') === currentCastingProject);
      if (currentActors.length === 0) {
        grid.innerHTML = '<div style="color:#666; padding: 20px;">Нет заявок</div>';
        return;
      }

      grid.innerHTML = currentActors.map(a => {
        let photos = [];
        if (Array.isArray(a.photo_urls)) {
          photos = a.photo_urls;
        } else if (typeof a.photos === 'string') {
          try { photos = JSON.parse(a.photos || '[]'); } catch (e) { }
        } else if (Array.isArray(a.photos)) {
          photos = a.photos;
        }
        let photoUrl = photos.length > 0 ? photos[0] : '';
        if (!photoUrl && typeof a.photo_urls === 'string') photoUrl = a.photo_urls;
        if (!photoUrl && a.photo_url) photoUrl = a.photo_url;

        return `
          <div class="actor-card">
            ${photoUrl ? `<img src="${photoUrl}" alt="${a.full_name}" />` : `<div style="height:200px;background:#333;display:flex;align-items:center;justify-content:center;color:#666;">Нет фото</div>`}
            <div class="actor-info">
              <div class="actor-name">${a.full_name}</div>
              <div class="actor-meta">${a.dob ? a.dob + ' лет, ' : ''}${a.city || ''}</div>
              <div class="actor-actions">
                <button class="btn-select ${a.is_selected ? 'selected' : ''}" onclick="toggleActorSelection('${a.id}', ${!a.is_selected})">${a.is_selected ? 'Выбран' : 'Выбрать'}</button>
                <button class="btn-delete" onclick="deleteActorApplication('${a.id}')">Удалить</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectCastingProject(p) {
      currentCastingProject = p;
      renderCastingHub();
    }

    async function toggleActorSelection(id, is_selected) {
      if (String(id).startsWith('mock')) {
        const app = castingApps.find(a => a.id === id);
        if (app) app.is_selected = is_selected;
        renderCastingHub();
        return;
      }
      const { error } = await supabaseClient.from('casting_applications').update({ is_selected }).eq('id', id);
      if (!error) {
        const app = castingApps.find(a => a.id === id);
        if (app) app.is_selected = is_selected;
        renderCastingHub();
      }
    }

    async function deleteActorApplication(id) {
      if (!confirm("Удалить анкету?")) return;
      if (String(id).startsWith('mock')) {
        castingApps = castingApps.filter(a => a.id !== id);
        if (castingApps.filter(a => a.project_name === currentCastingProject).length === 0) {
          currentCastingProject = null;
        }
        renderCastingHub();
        return;
      }
      const { error } = await supabaseClient.from('casting_applications').delete().eq('id', id);
      if (!error) {
        castingApps = castingApps.filter(a => a.id !== id);
        renderCastingHub();
      }
    }

    // STARTUP
    document.querySelector('.wrap').style.display = 'none';
    document.getElementById("form").style.display = "none";
    render();
    // Cleaned up duplicate loadFromCloud
    async function loadFromCloud() {
      if (!navigator.onLine) return;
      try {
        const { data, error } = await supabaseClient.from('shoots').select('*').order('date', { ascending: false });
        if (data && !error) {
          allEvents = data;
          setCache(CACHE_KEYS.EVENTS, allEvents);
          render();
        }

        const { data: tasks, error: tErr } = await supabaseClient.from('tasks').select('*');
        if (tasks && !tErr) {
          allTasks = tasks;
          setCache(CACHE_KEYS.TASKS, allTasks);
          render();
        }
        await fetchAutocompleteData();
      } catch (e) {
        console.warn("Load from cloud failed:", e);
      }
    }

    async function fetchAutocompleteData() {
      try {
        const { data: clients, error: cErr } = await supabaseClient.from('clients').select('name, is_active');
        if (!cErr && clients) clientsData = clients;
        // ... (other fetch logic if any)
      } catch (e) {
        console.warn("Autocomplete fetch failed:", e);
      }
    }

  </script>
</body>
