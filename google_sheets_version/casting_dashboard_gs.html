<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GULYWOOD CASTING ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050608; --card: #111218; --accent: #ff5722; --text: #eee; --muted: #888; --border: rgba(255,255,255,0.1); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 25px; background: #0f1016; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        input, select { background: #1a1b23; border: 1px solid var(--border); padding: 8px; color: white; border-radius: 6px; font-size: 12px; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .photo-container { width: 100%; height: 380px; background: #222; position: relative; }
        .photo { width: 100%; height: 100%; object-fit: cover; }
        .rating-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 4px 10px; border-radius: 20px; color: #ffd700; font-weight: bold; border: 1px solid #ffd700; font-size: 14px; }
        .sent-badge { position: absolute; top: 10px; right: 10px; background: #24A1DE; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .info { padding: 15px; flex-grow: 1; }
        .name { font-size: 17px; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
        .meta { font-size: 11px; color: var(--muted); display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
        .btn-action { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; margin-top: 8px; text-decoration: none; text-align: center; font-size: 12px; }
        .btn-tg { background: #24A1DE; }
        .btn-video { background: #ff0000; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 20px;">GULYWOOD <span style="color:var(--accent)">CASTING</span></h1>
    <button onclick="syncAll()" id="syncBtn" style="padding:8px 15px; background:var(--accent); border:none; border-radius:6px; color:white; cursor:pointer; font-weight:bold;">ОБНОВИТЬ ВСЁ</button>
</div>

<div class="controls">
    <div><label style="font-size:10px;color:#888">Вес (от)</label><input type="number" id="fWMin" oninput="render()"></div>
    <div><label style="font-size:10px;color:#888">Вес (до)</label><input type="number" id="fWMax" oninput="render()"></div>
    <div><label style="font-size:10px;color:#888">ФИО</label><input type="text" id="fName" oninput="render()"></div>
    <div><label style="font-size:10px;color:#888">Пол</label><select id="fGen" onchange="render()"><option value="">Все</option><option value="Мужской">Мужской</option><option value="Женский">Женский</option></select></div>
    <div><label style="font-size:10px;color:#888">Проект</label><input type="text" id="fPrj" oninput="render()"></div>
</div>

<div id="actorGrid" class="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOZprF0d6DAsO50Vng0OOnuPw-ZS79sVIOe3ZqlX9r7RKm4eWX5u6AA5gHQ8xb30vT28kQr2F8WRxm/pub?gid=1424975507&single=true&output=csv";
    const RATINGS_API = "https://script.google.com/macros/s/AKfycbxA3xs799pc5MHjgbVAxXc1uPqLyF9k_XLLUoCfEiLx30OOvqA4xv7SrnQP3OEVF-k/exec";
    const BOT_TOKEN = "8534227633:AAEqULwA8rypkF-BW87G_9ACmKWNEoGZFI4";
    const CHAT_ID = "-1003738942785";

    let actors = [];
    let cloudData = {};

    async function syncAll() {
        const btn = document.getElementById('syncBtn');
        btn.innerText = "⏳ ЗАГРУЗКА...";
        try {
            // Кэш-бастинг (nocache) и заголовок чтобы гугл не врал
            const r = await fetch(RATINGS_API + "?action=get&nocache=" + Date.now(), {
                cache: "no-store",
                headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' }
            });
            const text = await r.text();
            try { 
                cloudData = JSON.parse(text); 
                console.log("Stars loaded:", cloudData);
            } catch(e) { 
                cloudData = {}; 
                console.error("JSON parse error, check GAS output");
            }
            
            Papa.parse(CSV_URL + "&cb=" + Date.now(), {
                download: true, header: true,
                complete: function(res) {
                    actors = res.data.filter(a => Object.values(a).some(v => v)).map((a, i) => ({...a, _row: i + 2}));
                    render();
                    btn.innerText = "ОБНОВИТЬ ВСЁ";
                }
            });
        } catch(e) { 
            console.error("Sync error:", e);
            btn.innerText = "ОШИБКА"; 
        }
    }

    function setCloudValue(id, val) {
        cloudData[id] = val; render();
        const url = `${RATINGS_API}?action=set&id=${id}&score=${encodeURIComponent(val)}&t=${Date.now()}`;
        new Image().src = url; fetch(url, { mode: 'no-cors' });
    }

    function getDirectLink(url) {
        if (!url || typeof url !== 'string') return "";
        let id = (url.match(/id=([^&]+)/) || url.match(/\/d\/([^/]+)/) || [])[1];
        return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
    }

    function render() {
        const grid = document.getElementById('actorGrid');
        const fName = document.getElementById('fName').value.toLowerCase();
        const fGen = document.getElementById('fGen').value;
        const fPrj = document.getElementById('fPrj').value.toLowerCase();
        const fWMin = parseInt(document.getElementById('fWMin').value) || 0;
        const fWMax = parseInt(document.getElementById('fWMax').value) || 999;

        const filtered = actors.filter(a => {
            let n = "", g = "", pr = "", w = 0;
            for (let k in a) {
                const key = k.toLowerCase();
                const v = (a[k]||"").toString().trim();
                if (key.includes("фио")) n = v.toLowerCase();
                if (key === "пол") g = v;
                if (key.includes("проект")) pr = v.toLowerCase();
                if (key.includes("вес")) w = parseInt(v) || 0;
            }
            return n.includes(fName) && (!fGen || g === fGen) && pr.includes(fPrj) && w >= fWMin && w <= fWMax;
        });

        filtered.sort((a,b) => (parseInt(cloudData[b._row])||0) - (parseInt(cloudData[a._row])||0));

        grid.innerHTML = filtered.map(a => {
            const id = a._row;
            const name = a["ФИО (Полностью)"] || a["ФИО"] || a["Ваше ФИО"] || "Без имени";
            const val = cloudData[id] || "0";
            const r = parseInt(val) || 0;
            const sent = val.includes("_SENT");
            
            let photo = "", video = "";
            for (let k in a) {
                if (k.toLowerCase().includes("фото")) photo = a[k];
                if (k.toLowerCase().includes("видео")) video = a[k];
            }

            return `<div class="card">
                <div class="photo-container">
                    ${r > 0 ? `<div class="rating-badge">★ ${r}</div>` : ''}
                    ${sent ? `<div class="sent-badge">В ЧАТЕ ✅</div>` : ''}
                    <img class="photo" src="${getDirectLink(photo)}" onerror="this.src='https://via.placeholder.com/300x400'">
                </div>
                <div class="info">
                    <div class="name">${name}</div>
                    <div class="meta"><span class="tag">${a["Пол"]}</span><span class="tag">${a["Возраст"]}л</span><span class="tag">${a["Рост"]}см</span></div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <label>Оценка:</label>
                        <select style="width:60px" onchange="setCloudValue('${id}', this.value + '${sent ? "_SENT" : ""}')">
                            ${[...Array(11).keys()].map(n => `<option value="${n}" ${r == n ? 'selected' : ''}>${n || '—'}</option>`).join('')}
                        </select>
                    </div>
                    <button class="btn-action btn-tg" onclick="sendFull('${id}')">В ТЕЛЕГРАМ</button>
                    ${video ? `<button onclick="playVideo('${video}')" class="btn-action btn-video">📺 ВИДЕО</button>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function playVideo(url) {
        let id = (url.match(/id=([^&]+)/) || url.match(/\/d\/([^/]+)/) || [])[1];
        document.body.insertAdjacentHTML('beforeend', `<div id="vM" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;"><div style="width:95%;max-width:800px;position:relative;"><button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:-45px;right:0;color:white;background:none;border:none;font-size:40px;cursor:pointer;">&times;</button><iframe src="https://drive.google.com/file/d/${id}/preview" width="100%" height="450"></iframe></div></div>`);
    }

    async function sendFull(rowId) {
        const a = actors.find(act => act._row == rowId);
        const btn = event.target; btn.disabled = true; btn.innerText = "⏳...";
        let p = "", v = ""; for (let k in a) { if (k.toLowerCase().includes("фото")) p = getDirectLink(a[k]); if (k.toLowerCase().includes("видео")) v = a[k]; }
        const r = parseInt(cloudData[rowId] || 0);
        const cap = `🎭 *GULYWOOD*\n👤 *${a["ФИО (Полностью)"] || a["ФИО"] || "Без имени"}*\n⭐️ *Рейтинг:* ${r}/10\n🎬 *Проект:* ${a["Проект"] || '—'}\n🚻 *Параметры:* ${a["Возраст"]}л, ${a["Рост"]}см, ${a["Вес"]}кг\n\n🎬 [ВИДЕО](${v || '#'})`;
        try {
            const method = (p && p.length > 10) ? 'sendPhoto' : 'sendMessage';
            const body = (p && p.length > 10) ? { chat_id: CHAT_ID, photo: p, caption: cap, parse_mode: 'Markdown' } : { chat_id: CHAT_ID, text: cap, parse_mode: 'Markdown' };
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (res.ok) { setCloudValue(rowId, r + "_SENT"); btn.innerText = "В ЧАТЕ ✅"; } else { alert("Ошибка ТГ"); btn.disabled = false; btn.innerText = "В ТЕЛЕГРАМ"; }
        } catch(e) { alert("Ошибка сети"); btn.disabled = false; }
    }

    syncAll();
</script>
</body>
</html>
