<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GULYWOOD CASTING</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050608; --card: #111218; --accent: #ff5722; --text: #eee; --muted: #888; --border: rgba(255,255,255,0.1); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; background: #0f1016; padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        input, select { background: #1a1b23; border: 1px solid var(--border); padding: 12px; color: white; border-radius: 8px; font-size: 14px; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
        .card:hover { border-color: var(--accent); }
        .photo-container { width: 100%; height: 400px; background: #222; position: relative; }
        .photo { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 20px; }
        .name { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
        .meta { font-size: 14px; color: var(--muted); margin-bottom: 15px; display: flex; gap: 8px; }
        .tag { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; }
        .btn-action { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; text-decoration: none; text-align: center; }
        .btn-tg { background: #24A1DE; }
        .btn-video { background: #ff0000; }
        .status-msg { text-align: center; padding: 60px; color: var(--muted); grid-column: 1 / -1; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0">Кастинг GULYWOOD</h1>
    <button onclick="fetchData()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:8px; color:white; cursor:pointer;">ОБНОВИТЬ</button>
</div>

<div class="controls">
    <input type="text" id="searchInput" placeholder="Поиск по ФИО..." oninput="render()">
    <input type="text" id="projectInput" placeholder="Проект..." oninput="render()">
    <select id="genderSelect" onchange="render()">
        <option value="">Все полы</option>
        <option value="муж">Мужской</option>
        <option value="жен">Женский</option>
    </select>
</div>

<div id="actorGrid" class="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOZprF0d6DAsO50Vng0OOnuPw-ZS79sVIOe3ZqlX9r7RKm4eWX5u6AA5gHQ8xb30vT28kQr2F8WRxm/pub?gid=1424975507&single=true&output=csv";
    const BOT_TOKEN = "8534227633:AAEqULwA8rypkF-BW87G_9ACmKWNEoGZFI4";
    const CHAT_ID = "-1003738942785";

    let actors = [];

    async function fetchData() {
        document.getElementById('actorGrid').innerHTML = "<div class='status-msg'>Загрузка...</div>";
        Papa.parse(CSV_URL + "&cache=" + Math.random(), {
            download: true,
            header: true,
            complete: function(results) {
                actors = results.data.filter(a => Object.values(a).some(v => v && v.length > 2));
                render();
            }
        });
    }

    function render() {
        const grid = document.getElementById('actorGrid');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const project = document.getElementById('projectInput').value.toLowerCase();
        const genderFilter = document.getElementById('genderSelect').value.toLowerCase();

        const filtered = actors.filter(a => {
            let name = "", prj = "", gen = "";
            for (let key in a) {
                let k = key.toLowerCase();
                let v = (a[key] || "").toString().toLowerCase();
                if (k.includes("фио") || k.includes("имя")) name = v;
                if (k.includes("проект")) prj = v;
                if (k.includes("пол")) gen = v;
            }
            const matchGender = !genderFilter || gen.startsWith(genderFilter);
            return name.includes(search) && prj.includes(project) && matchGender;
        });

        if (filtered.length === 0) {
            grid.innerHTML = "<div class='status-msg'>Ничего не найдено</div>";
            return;
        }

        grid.innerHTML = filtered.map((a, i) => {
            let p = "", v = "";
            for (let key in a) {
                if (key.toLowerCase().includes("фото")) p = a[key];
                if (key.toLowerCase().includes("видео")) v = a[key];
            }
            const photoUrl = p.includes('id=') ? `https://lh3.googleusercontent.com/d/${p.split('id=')[1].split('&')[0]}` : 
                           (p.includes('/file/d/') ? `https://lh3.googleusercontent.com/d/${p.split('/file/d/')[1].split('/')[0]}` : p);

            return `
            <div class="card">
                <div class="photo-container">
                    <img class="photo" src="${photoUrl}" onerror="this.src='https://via.placeholder.com/400x500?text=НЕТ+ФОТО'">
                    <a href="${p}" target="_blank" style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.5); color:white; padding:4px 8px; border-radius:4px; font-size:11px; text-decoration:none;">🔍 Оригинал</a>
                </div>
                <div class="info">
                    <div class="name">${a["ФИО"] || a["Ваше ФИО"] || 'Кандидат'}</div>
                    <div class="meta"><span class="tag">${a["Пол"] || '—'}</span><span class="tag">${a["Возраст"] || '—'} лет</span></div>
                    <div style="font-size:13px; color:var(--muted); margin-bottom:15px;"><b>Проект:</b> ${a["Проект"] || '—'}<br><b>Тел:</b> ${a["Телефон"] || '—'}</div>
                    ${v ? `<button onclick="playVideo('${v}')" class="btn-action btn-video">📺 ВИДЕО</button>` : ''}
                    <button class="btn-action btn-tg" onclick="sendToTelegram('${i}')">В ЧАТ</button>
                </div>
            </div>`;
        }).join('');
    }

    function playVideo(url) {
        let id = url.includes('id=') ? url.split('id=')[1].split('&')[0] : (url.includes('/file/d/') ? url.split('/file/d/')[1].split('/')[0] : "");
        if(!id) { window.open(url, '_blank'); return; }
        document.body.insertAdjacentHTML('beforeend', `<div id="vModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; align-items:center; justify-content:center;"><div style="width:90%; max-width:800px; position:relative;"><button onclick="document.getElementById('vModal').remove()" style="position:absolute; top:-40px; right:0; color:white; background:none; border:none; font-size:40px; cursor:pointer;">&times;</button><iframe src="https://drive.google.com/file/d/${id}/preview" width="100%" height="450"></iframe></div></div>`);
    }

    async function sendToTelegram(idx) {
        const a = actors[idx]; const btn = event.target; btn.disabled = true;
        let p = "", v = ""; for (let k in a) { if (k.toLowerCase().includes("фото")) p = a[k]; if (k.toLowerCase().includes("видео")) v = a[k]; }
        const msg = `🎭 *АНКЕТА GULYWOOD*\n\n👤 *Имя:* ${a["ФИО"] || a["Ваше ФИО"]}\n🎬 *Проект:* ${a["Проект"]}\n📍 *Город:* ${a["Город"]}\n📞 *Тел:* ${a["Телефон"]}\n\n🖼 [ФОТО](${p})\n🎬 [ВИДЕО](${v})`;
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'Markdown' }) });
        btn.innerText = "✅ ОТПРАВЛЕНО";
    }

    fetchData();
</script>
</body>
</html>
