<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GULYWOOD CASTING CRM PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #090a0f; --card: #15161e; --accent: #ff5722; --text: #f0f0f0; 
            --muted: #8e92a2; --border: rgba(255,255,255,0.08); --glass: rgba(255,255,255,0.03);
            --new: #4caf50; --trash: #f44336; --archive: #9e9e9e; --interest: #ffeb3b;
        }
        
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Layout */
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        /* Header & Tabs */
        .header { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; position: sticky; top: 0; z-index: 100; background: var(--bg); padding-bottom: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .tab { 
            padding: 10px 20px; background: var(--glass); border: 1px solid var(--border); border-radius: 30px; 
            cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; transition: 0.2s; color: var(--muted);
        }
        .tab:hover { background: rgba(255,255,255,0.1); }
        .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Filters Panel */
        .filters-panel { 
            background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 12px; 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px;
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
        input, select { 
            background: #1e2029; border: 1px solid var(--border); padding: 6px 10px; color: white; border-radius: 6px; font-size: 12px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: #252833; }
        
        .search-box { grid-column: 1 / -1; margin-bottom: 5px; }
        .search-box input { width: 100%; font-size: 15px; padding: 12px 15px; background: var(--glass); }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }

        /* Card */
        .card { 
            background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); 
            display: flex; flex-direction: column; position: relative; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-3px); border-color: rgba(255,87,34,0.4); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .card-photo-wrap { width: 100%; height: 320px; background: #1a1b23; position: relative; cursor: pointer; }
        .card-photo { width: 100%; height: 100%; object-fit: cover; }
        
        /* Badges */
        .badge { position: absolute; padding: 3px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; z-index: 10; }
        .badge-new { top: 10px; left: 10px; background: var(--new); color: white; }
        .badge-rating { top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #ffd700; border: 1px solid #ffd700; }
        .badge-status { bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); color: white; border: 1px solid var(--border); }

        /* Content */
        .card-body { padding: 12px; flex-grow: 1; }
        .actor-name { font-size: 16px; font-weight: 800; color: white; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .actor-main-params { display: flex; gap: 10px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .param-item { display: flex; flex-direction: column; }
        .param-val { font-size: 14px; font-weight: 700; color: var(--accent); }
        .param-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        .actor-details { font-size: 11px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .detail-row { display: flex; flex-direction: column; gap: 1px; }
        .detail-label { font-size: 9px; color: var(--muted); }
        .detail-val { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .tags-wrap { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .tag { background: var(--glass); padding: 3px 6px; border-radius: 4px; font-size: 9px; border: 1px solid var(--border); }

        .text-block { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; font-size: 11px; line-height: 1.3; color: #999; white-space: pre-line; margin-bottom: 12px; max-height: 60px; overflow-y: auto; scrollbar-width: none; }

        /* Actions */
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }
        .btn { 
            padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: 700; 
            display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-tg { background: #24A1DE; color: white; }
        .btn-video { background: #ff0000; color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        .btn-outline:hover { background: var(--glass); color: white; border-color: white; }
        .btn-outline.active-status { background: var(--accent); color: white; border-color: var(--accent); }
        
        .status-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; grid-column: 1 / -1; position: relative; }
        
        .rating-picker {
            position: absolute; bottom: 45px; left: 0; right: 0; background: #1a1b23; border: 1px solid var(--accent);
            border-radius: 8px; display: none; grid-template-columns: repeat(5, 1fr); gap: 4px; padding: 6px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .rating-picker span { 
            padding: 5px; background: #252833; color: white; border-radius: 4px; font-size: 10px; 
            text-align: center; cursor: pointer; transition: 0.2s; 
        }
        .rating-picker span:hover { background: var(--accent); }

        /* Floating Sync */
        .sync-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 30px; background: var(--accent); color: white; border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(255,87,34,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; }
        .sync-btn:active { transform: scale(0.9); }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="logo">GULYWOOD <span>CRM</span></div>
            <div style="font-size: 12px; color: var(--muted);">IP PROOF OF CARE • v2.0 PRO</div>
        </div>
        
        <div class="tabs" id="mainTabs">
            <div class="tab active" data-tab="new">Входящие</div>
            <div class="tab" data-tab="all">Общая база</div>
            <div class="tab" data-tab="interest">Интересные</div>
            <div class="tab" data-tab="selected">Отобранные</div>
            <div class="tab" data-tab="sent">В Телеграме</div>
            <div class="tab" data-tab="archive">Архив</div>
            <div class="tab" data-tab="trash">Трэш</div>
        </div>
    </div>

    <div class="filters-panel">
        <div class="filter-group search-box">
            <label>Глобальный поиск</label>
            <input type="text" id="sQuery" placeholder="Имя, город, опыт, приметы..." oninput="render()">
        </div>
        <div class="filter-group">
            <label>Проект</label>
            <select id="fPrj" onchange="render()"><option value="">Все проекты</option></select>
        </div>
        <div class="filter-group">
            <label>Пол</label>
            <select id="fGen" onchange="render()"><option value="">Все</option><option value="Мужской">Мужской</option><option value="Женский">Женский</option></select>
        </div>
        <div class="filter-group">
            <label>Возраст (от - до)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fAgeMin" placeholder="От" oninput="render()">
                <input type="number" id="fAgeMax" placeholder="До" oninput="render()">
            </div>
        </div>
        <div class="filter-group">
            <label>Рост (см)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fHMin" placeholder="От" oninput="render()">
                <input type="number" id="fHMax" placeholder="До" oninput="render()">
            </div>
        </div>
        <div class="filter-group">
            <label>Вес (кг)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="fWMin" placeholder="От" oninput="render()">
                <input type="number" id="fWMax" placeholder="До" oninput="render()">
            </div>
        </div>
    </div>

    <div id="actorGrid" class="grid"></div>
</div>

<button class="sync-btn" id="syncBtn" onclick="syncAll()">🔄</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOZprF0d6DAsO50Vng0OOnuPw-ZS79sVIOe3ZqlX9r7RKm4eWX5u6AA5gHQ8xb30vT28kQr2F8WRxm/pub?gid=1424975507&single=true&output=csv";
    const RATINGS_API = "https://script.google.com/macros/s/AKfycbxA3xs799pc5MHjgbVAxXc1uPqLyF9k_XLLUoCfEiLx30OOvqA4xv7SrnQP3OEVF-k/exec";
    const BOT_TOKEN = "8534227633:AAEqULwA8rypkF-BW87G_9ACmKWNEoGZFI4";
    const CHAT_ID = "-1003738942785";

    let actors = [];
    let cloudData = {};
    let currentTab = "new";

    // Инициализация табов
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelector('.tab.active').classList.remove('active');
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            render();
        }
    });

    async function syncAll() {
        const btn = document.getElementById('syncBtn');
        btn.innerText = "⏳";
        try {
            const r = await fetch(RATINGS_API + "?action=get&cb=" + Math.random());
            const text = await r.text();
            try { cloudData = JSON.parse(text); } catch(e) { cloudData = {}; }

            Papa.parse(CSV_URL + "&cb=" + Date.now(), {
                download: true, header: true, skipEmptyLines: true,
                complete: function(res) {
                    actors = res.data.filter(a => Object.values(a).some(v => v)).map((a, i) => ({...a, _row: i + 2}));
                    updateProjectFilter();
                    render();
                    btn.innerText = "🔄";
                }
            });
        } catch(e) { btn.innerText = "❌"; }
    }

    function setCloudValue(id, val) {
        cloudData[id] = val;
        render();
        const url = `${RATINGS_API}?action=set&id=${id}&score=${encodeURIComponent(val)}&t=${Date.now()}`;
        new Image().src = url;
        fetch(url, { mode: 'no-cors' });
    }

    function updateProjectFilter() {
        const sel = document.getElementById('fPrj');
        const prjs = [...new Set(actors.map(a => a["Проект"] || a["Название проекта, в котором вы участвуете"] || "Не указан"))];
        sel.innerHTML = '<option value="">Все проекты</option>' + prjs.map(p => `<option value="${p}">${p}</option>`).join('');
    }

    function getDirectLink(url) {
        if (!url || typeof url !== 'string') return "";
        let id = (url.match(/id=([^&]+)/) || url.match(/\/d\/([^/]+)/) || [])[1];
        return id ? `https://lh3.googleusercontent.com/d/${id}` : url;
    }

    function render() {
        const grid = document.getElementById('actorGrid');
        const q = document.getElementById('sQuery').value.toLowerCase();
        const fPrj = document.getElementById('fPrj').value;
        const fGen = document.getElementById('fGen').value;
        const fAMin = parseInt(document.getElementById('fAgeMin').value) || 0;
        const fAMax = parseInt(document.getElementById('fAgeMax').value) || 99;
        const fHMin = parseInt(document.getElementById('fHMin').value) || 0;
        const fHMax = parseInt(document.getElementById('fHMax').value) || 250;
        const fWMin = parseInt(document.getElementById('fWMin').value) || 0;
        const fWMax = parseInt(document.getElementById('fWMax').value) || 300;

        let filtered = actors.filter(a => {
            const id = a._row;
            const val = cloudData[id] || "0";
            const score = parseInt(val) || 0;
            const status = val.includes(":") ? val.split(":")[1].replace("_SENT", "") : "Новая";
            const isSent = val.includes("_SENT");
            
            // ПРАВИЛА ВКАЛАДОК
            if (currentTab === "new") {
                if (status !== "Новая") return false;
            } else if (currentTab === "interest") {
                if (status !== "Interesting") return false;
            } else if (currentTab === "selected") {
                if (status !== "Selected") return false;
            } else if (currentTab === "sent") {
                if (!isSent) return false;
            } else if (currentTab === "archive") {
                if (status !== "Archive") return false;
            } else if (currentTab === "trash") {
                if (status !== "Trash") return false;
            } else if (currentTab === "all") {
                // Общая база: всё кроме Архива и Трэша
                if (status === "Trash" || status === "Archive") return false;
            }

            // Глобальный поиск и фильтры
            const allText = JSON.stringify(a).toLowerCase();
            const age = parseInt(a["Возраст"]) || 0;
            const height = parseInt(a["Рост"]) || 0;
            const weight = parseInt(a["Вес"]) || 0;
            const gender = a["Пол"] || "";
            const prj = a["Проект"] || a["Название проекта, в котором вы участвуете"] || "";

            return (allText.includes(q)) &&
                   (!fPrj || prj === fPrj) &&
                   (!fGen || gender === fGen) &&
                   (age >= fAMin && age <= fAMax) &&
                   (height >= fHMin && height <= fHMax) &&
                   (weight >= fWMin && weight <= fWMax);
        });

        // Умная сортировка: Новые -> Отобранные -> Интересные -> Остальные
        filtered.sort((a, b) => {
            const vA = cloudData[a._row] || "0";
            const vB = cloudData[b._row] || "0";
            const sA = vA.split(":")[1] || "Новая";
            const sB = vB.split(":")[1] || "Новая";
            
            const getPriority = (s) => {
                if (s.includes("Новая")) return 1;
                if (s.includes("Selected")) return 2;
                if (s.includes("Interesting")) return 3;
                return 4; // Main и прочие
            };

            const pA = getPriority(sA);
            const pB = getPriority(sB);

            if (pA !== pB) return pA - pB;
            
            const rA = parseInt(vA) || 0;
            const rB = parseInt(vB) || 0;
            if (rA !== rB) return rB - rA;
            
            return b._row - a._row;
        });

        grid.innerHTML = filtered.map(a => {
            const id = a._row;
            const val = cloudData[id] || "0";
            const score = parseInt(val) || 0;
            const status = val.includes(":") ? val.split(":")[1].replace("_SENT", "") : "Новая";
            const isSent = val.includes("_SENT");
            
            const name = a["ФИО (Полностью)"] || a["ФИО"] || "Без имени";
            
            // Фиксированные столбцы K и L (11-й и 12-й по счету в CSV)
            const keys = Object.keys(a);
            let photosRaw = a[keys[10]] || ""; // K
            let video = a[keys[11]] || "";    // L
            
            // Фоллбек если K/L не те
            if (!photosRaw.includes("http")) {
                for (let k in a) if (k.toLowerCase().includes("фото")) photosRaw = a[k];
            }
            if (!video.includes("http")) {
                for (let k in a) if (k.toLowerCase().includes("видео")) video = a[k];
            }

            const photoList = photosRaw.split(',').map(p => p.trim()).filter(p => p.length > 5);
            const mainPhoto = getDirectLink(photoList[0]);
            const extraPhotos = photoList.slice(1);

            return `
            <div class="card" id="card-${id}">
                <div class="card-photo-wrap">
                    ${status === 'Новая' ? `<div class="badge badge-new">НОВАЯ</div>` : ''}
                    <div class="badge badge-rating">★ ${score}</div>
                    <div class="badge badge-status">${status}</div>
                    <img class="card-photo" src="${mainPhoto}" onclick="zoomImg('${mainPhoto}')" onerror="this.src='https://via.placeholder.com/300x400'">
                </div>
                <div class="card-body" ondblclick="showFullResume('${id}')" title="Двойной клик для полного резюме">
                    ${extraPhotos.length > 0 ? `
                        <div style="display:flex; gap:5px; margin-bottom:10px; overflow-x:auto; padding-bottom:5px;">
                            ${extraPhotos.map(p => {
                                const link = getDirectLink(p);
                                return `<img src="${link}" onclick="zoomImg('${link}')" style="width:50px; height:50px; object-fit:cover; border-radius:4px; cursor:pointer; border:1px solid var(--border);">`
                            }).join('')}
                        </div>
                    ` : ''}
                    <div class="actor-name">${name}</div>
                    <div class="actor-main-params">
                        <div class="param-item"><span class="param-val">${a["Рост"]||'?'}</span><span class="param-label">Рост</span></div>
                        <div class="param-item"><span class="param-val">${a["Вес"]||'?'}</span><span class="param-label">Вес</span></div>
                        <div class="param-item"><span class="param-val">${a["Возраст"]||'?'}</span><span class="param-label">Лет</span></div>
                    </div>
                    
                    <div class="actor-details">
                        <div class="detail-row"><span class="detail-label">Пол</span><span class="detail-val">${a["Пол"]}</span></div>
                        <div class="detail-row"><span class="detail-label">Город</span><span class="detail-val">${a["Город проживания"]||'—'}</span></div>
                    </div>

                    <div class="card-actions">
                        <button class="btn btn-tg" onclick="sendFull('${id}')">${isSent ? '✅ В ЧАТЕ' : '✈️ В ЧАТ'}</button>
                        <button class="btn btn-video" onclick="playVideo('${video}')">📺</button>
                        
                        <div class="status-buttons">
                            <div class="rating-picker" id="picker-${id}">
                                ${[...Array(11).keys()].map(n => `<span onclick="updateCloud('${id}', ${n}, 'Interesting')">${n}</span>`).join('')}
                            </div>
                            <button class="btn btn-outline ${status === 'Main' ? 'active-status' : ''}" title="Просмотрен (в общую)" onclick="updateCloud('${id}', ${score}, 'Main')">👀</button>
                            <button class="btn btn-outline ${status === 'Interesting' ? 'active-status' : ''}" title="Рейтинг / Интересно" onclick="toggleRating('${id}')">⭐</button>
                            <button class="btn btn-outline ${status === 'Selected' ? 'active-status' : ''}" title="Отобран" onclick="updateCloud('${id}', ${score}, 'Selected')">🏆</button>
                            <button class="btn btn-outline" title="В архив" onclick="updateCloud('${id}', ${score}, 'Archive')">📂</button>
                            <button class="btn btn-outline" style="color:var(--trash)" title="В трэш" onclick="updateCloud('${id}', ${score}, 'Trash')">🗑️</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function updateCloud(id, score, status) {
        const currentVal = cloudData[id] || "0";
        const isSent = currentVal.includes("_SENT") ? "_SENT" : "";
        const val = score + ":" + status + isSent;
        
        setCloudValue(id, val);
        
        // Визуальный эффект: если статус изменился и мы в специфичной вкладке - убираем карточку
        const card = document.getElementById('card-' + id);
        if (card && currentTab !== "all") {
            card.style.opacity = "0";
            card.style.transform = "scale(0.8)";
            setTimeout(render, 300);
        }
    }

    function playVideo(url) {
        if (!url || url === '#') { alert("Видео не загружено"); return; }
        let id = (url.match(/id=([^&]+)/) || url.match(/\/d\/([^/]+)/) || [])[1];
        if (!id) { window.open(url, '_blank'); return; }
        document.body.insertAdjacentHTML('beforeend', `<div id="vM" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="this.remove()"><div style="width:95%;max-width:900px;position:relative;" onclick="event.stopPropagation()"><button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:-50px;right:0;color:white;background:none;border:none;font-size:40px;cursor:pointer;">&times;</button><iframe src="https://drive.google.com/file/d/${id}/preview" width="100%" height="500" frameborder="0" allowfullscreen></iframe></div></div>`);
    }

    function toggleRating(id) {
        const p = document.getElementById('picker-' + id);
        const isShown = p.style.display === 'grid';
        document.querySelectorAll('.rating-picker').forEach(x => x.style.display = 'none');
        p.style.display = isShown ? 'none' : 'grid';
    }

    function zoomImg(src) {
        if (!src || src.includes('placeholder')) return;
        document.body.insertAdjacentHTML('beforeend', `<div id="vM" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="this.remove()"><div style="width:90%;height:90%;display:flex;justify-content:center;align-items:center;" onclick="event.stopPropagation()"><button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:20px;right:20px;color:white;background:none;border:none;font-size:40px;cursor:pointer;z-index:2001;">&times;</button><img src="${src}" style="max-width:100%; max-height:100%; object-fit:contain; border-radius:8px; box-shadow:0 0 50px rgba(0,0,0,0.8);"></div></div>`);
    }

    function showFullResume(rowId) {
        const a = actors.find(act => act._row == rowId);
        if (!a) return;
        
        let content = `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">`;
        for (let k in a) {
            if (k === "_row" || k.toLowerCase().includes("фото") || k.toLowerCase().includes("видео")) continue;
            if (!a[k]) continue;
            content += `<div style="border-bottom:1px solid #333; padding:8px 0;"><span style="color:var(--muted); font-size:11px; display:block; text-transform:uppercase;">${k}</span><span style="color:white; font-size:15px; font-weight:500;">${a[k]}</span></div>`;
        }
        content += `</div>`;

        document.body.insertAdjacentHTML('beforeend', `
            <div id="vM" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:2000;display:flex;align-items:center;justify-content:center;" onclick="this.remove()">
                <div style="width:90%; max-width:800px; max-height:90vh; background:#111218; border:1px solid var(--border); border-radius:20px; padding:30px; position:relative; overflow-y:auto; cursor:default;" onclick="event.stopPropagation()">
                    <button onclick="this.parentElement.parentElement.remove()" style="position:absolute; top:20px; right:20px; color:var(--muted); background:none; border:none; font-size:30px; cursor:pointer;">&times;</button>
                    <h2 style="color:white; margin-top:0; margin-bottom:20px; border-bottom:2px solid var(--accent); padding-bottom:10px;">📄 Полная анкета: ${a["ФИО (Полностью)"] || a["ФИО"]}</h2>
                    ${content}
                </div>
            </div>
        `);
    }

    async function sendFull(rowId) {
        const a = actors.find(act => act._row == rowId);
        const btn = event.target; btn.disabled = true; btn.innerText = "...";
        const val = cloudData[rowId] || "0";
        const score = parseInt(val) || 0;
        const status = val.includes(":") ? val.split(":")[1] : "Новая";
        
        let p = getDirectLink(a["Фото (Портрет)"] || a["Фото"]);
        let v = a["Видеовизитка (ссылка на диск)"] || a["Видео"];
        
        const cap = `🎭 *GULYWOOD CASTING*\n👤 *${a["ФИО (Полностью)"] || a["ФИО"]}*\n\n⭐ *Рейтинг:* ${score}/10\n📊 *Статус:* ${status}\n\n🚻 *Параметры:* ${a["Пол"]}, ${a["Возраст"]}л, ${a["Рост"]}см / ${a["Вес"]}кг\n📍 *Город:* ${a["Город проживания"]}\n📱 *Тел:* ${a["Контактный телефон"]}\n\n🎬 [ВИДЕОВИЗИТКА](${v || '#'})`;
        
        try {
            const method = (p && p.length > 20) ? 'sendPhoto' : 'sendMessage';
            const body = (p && p.length > 20) ? { chat_id: CHAT_ID, photo: p, caption: cap, parse_mode: 'Markdown' } : { chat_id: CHAT_ID, text: cap, parse_mode: 'Markdown' };
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (res.ok) { 
                updateCloud(rowId, score, status + "_SENT"); 
                btn.innerText = "В ЧАТЕ ✅"; 
            } else { alert("Ошибка ТГ"); btn.disabled = false; btn.innerText = "В ЧАТ"; }
        } catch(e) { alert("Ошибка сети"); btn.disabled = false; }
    }

    // Авто-синхронизация каждые 5 минут
    setInterval(syncAll, 5 * 60 * 1000);
    syncAll();
</script>
</body>
</html>
