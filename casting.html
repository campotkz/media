<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GULYWOOD | CASTING HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ff3b3b;
            --card: #151515;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .header p {
            color: var(--accent);
            font-size: 0.9rem;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .step-card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .step-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .step-title span {
            background: var(--accent);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: #202020;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: #252525;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .project-item {
            background: #202020;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .project-item.selected {
            border-color: var(--accent);
            background: #2a1a1a;
        }

        .project-item input {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .media-box {
            aspect-ratio: 1;
            background: #202020;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px dashed #333;
            position: relative;
            overflow: hidden;
            text-align: center;
            padding: 5px;
        }

        .media-box span {
            font-size: 0.6rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 59, 59, 0.2);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            text-align: center;
        }

        .loader {
            width: 64px;
            height: 64px;
            border: 5px solid #333;
            border-bottom-color: var(--accent);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #progressContainer {
            width: 100%;
            max-width: 300px;
            background: #222;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }

        #progressBar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 15px var(--accent);
        }

        #loadingStatus {
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
        }

        #progressPercent {
            color: var(--accent);
            font-weight: bold;
            margin-top: 5px;
        }

        .success-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>
    <div id="formContainer">
        <div class="header">
            <h1>GULYWOOD</h1>
            <p>CASTING & DRIVE PIPELINE</p>
        </div>

        <div class="container">
            <form id="castingForm">
                <!-- STEP 1 -->
                <div class="step-card">
                    <div class="step-title"><span>1</span> ВЫБЕРИТЕ ПРОЕКТЫ</div>
                    <div id="projectsList">
                        <div style="text-align:center; padding:20px; color:var(--text-dim);">Загрузка активных кастингов...</div>
                    </div>
                </div>

                <!-- STEP 2 -->
                <div class="step-card">
                    <div class="step-title"><span>2</span> ОСНОВНАЯ ИНФОРМАЦИЯ</div>
                    <div class="form-group">
                        <label>ФИО</label>
                        <input type="text" name="full_name" required placeholder="Иванов Иван Иванович">
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>ПОЛ</label>
                            <select name="gender" required>
                                <option value="Мужской">Мужской</option>
                                <option value="Женский">Женский</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>ДАТА РОЖДЕНИЯ</label>
                            <input type="date" name="birth_date" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ГОРОД</label>
                        <input type="text" name="city" required placeholder="Алматы, Астана...">
                    </div>
                </div>

                <!-- STEP 3 -->
                <div class="step-card">
                    <div class="step-title"><span>3</span> ПАРАМЕТРЫ И ВНЕШНОСТЬ</div>
                    <div class="grid">
                        <div class="form-group">
                            <label>РОСТ (СМ)</label>
                            <input type="number" name="height" required placeholder="180">
                        </div>
                        <div class="form-group">
                            <label>ВЕС (КГ)</label>
                            <input type="number" name="weight" required placeholder="75">
                        </div>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>ОДЕЖДА</label>
                            <input type="text" name="cloth_size" required placeholder="M / 48">
                        </div>
                        <div class="form-group">
                            <label>ОБУВЬ</label>
                            <input type="number" name="shoe_size" required placeholder="42">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ТИП ВНЕШНОСТИ</label>
                        <select name="appearance_type" required>
                            <option value="Азиатский">Азиатский</option>
                            <option value="Европейский">Европейский</option>
                            <option value="Метис">Метис</option>
                            <option value="Другой">Другой</option>
                        </select>
                    </div>
                </div>

                <!-- STEP 4 -->
                <div class="step-card">
                    <div class="step-title"><span>4</span> КОНТАКТЫ И ОПЫТ</div>
                    <div class="form-group">
                        <label>ТЕЛЕФОН (WHATSAPP)</label>
                        <input type="tel" name="phone" required placeholder="+7 777 000 00 00">
                    </div>
                    <div class="form-group">
                        <label>SOCIAL / PORTFOLIO</label>
                        <input type="text" name="social_links" placeholder="Instagram, YouTube...">
                    </div>
                    <div class="form-group">
                        <label>ОПЫТ / О СЕБЕ</label>
                        <textarea name="experience" rows="3" placeholder="Опишите ваши проекты..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>ПЕРСОНАЖ / РОЛЬ</label>
                        <input type="text" name="character_name" placeholder="На какую роль претендуете?">
                    </div>
                </div>

                <!-- STEP 5 -->
                <div class="step-card">
                    <div class="step-title"><span>5</span> МЕДИА (GOOGLE DRIVE)</div>
                    <label>ФОТОГРАФИИ (ДО 6 ШТ)</label>
                    <div class="media-grid" id="photoGrid"></div>
                    <input type="file" id="photoInput" multiple accept="image/*" style="display:none;">

                    <div class="form-group" style="margin-top:20px;">
                        <label>ВИДЕОВИЗИТКА (ОБЯЗАТЕЛЬНО)</label>
                        <div class="media-box" style="width:100%; aspect-ratio:16/9; border-style: solid; border-width: 1px;" id="videoDropZone">
                            <div id="videoStatus">🎬 НАЖМИТЕ ДЛЯ ВЫБОРА ВИДЕО</div>
                            <video id="videoPreview" style="display:none; width:100%; height:100%;" controls></video>
                        </div>
                        <input type="file" id="videoInput" accept="video/*" style="display:none;">
                    </div>
                </div>

                <button type="submit" class="submit-btn">ОТПРАВИТЬ В БАЗУ</button>
            </form>
        </div>
    </div>

    <div id="successScreen" class="success-screen">
        <div class="success-icon">✨</div>
        <h2>УСПЕШНО!</h2>
        <p style="color:var(--text-dim); margin-top:10px;">Данные сохранены на Google Drive и отправлены кастинг-директору.</p>
        <button onclick="location.reload()" class="submit-btn" style="width:auto; padding:15px 40px; margin-top:30px;">НОВАЯ АНКЕТА</button>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
        <div id="loadingStatus">ИНИЦИАЛИЗАЦИЯ...</div>
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <div id="progressPercent">0%</div>
    </div>

    <script>
        // CONFIG
        const G_DRIVE_FOLDER_ID = "1hTpIgv5AWAiCETPfqkjUig_yIkjzWTAS";
        const G_API_TOKEN = "AQ.Ab8RN6LGyBRDak2cR0gFijqT0JyQVONKDmKfUWhtxoWDjJqIjQ"; // Your provided token
        const VERCEL_API = "https://media-seven-eta.vercel.app/api/casting/submit_no_sb";
        const TOPICS_API = "https://media-seven-eta.vercel.app/api/casting/topics";

        let photos = [];
        let videoFile = null;

        // UI Handlers
        const photoInput = document.getElementById('photoInput');
        const videoInput = document.getElementById('videoInput');
        const photoGrid = document.getElementById('photoGrid');
        const videoDropZone = document.getElementById('videoDropZone');

        function renderPhotos() {
            photoGrid.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const box = document.createElement('div');
                box.className = 'media-box';
                if (photos[i]) {
                    box.innerHTML = `
                        <img src="${URL.createObjectURL(photos[i])}">
                        <div class="remove-btn" onclick="removePhoto(${i}, event)">×</div>
                    `;
                } else {
                    box.innerHTML = `<span>+</span><span>ФОТО</span>`;
                    box.onclick = () => photoInput.click();
                }
                photoGrid.appendChild(box);
            }
        }

        function removePhoto(idx, e) {
            e.stopPropagation();
            photos.splice(idx, 1);
            renderPhotos();
        }

        photoInput.onchange = (e) => {
            const files = Array.from(e.target.files);
            photos = [...photos, ...files].slice(0, 6);
            renderPhotos();
        };

        videoDropZone.onclick = () => videoInput.click();
        videoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                videoFile = file;
                const preview = document.getElementById('videoPreview');
                const status = document.getElementById('videoStatus');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                status.style.display = 'none';
            }
        };

        async function loadTopics() {
            try {
                const res = await axios.get(TOPICS_API);
                const list = document.getElementById('projectsList');
                list.innerHTML = '';
                res.data.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'project-item';
                    item.innerHTML = `
                        <input type="checkbox" data-cid="${p.chat_id}" data-tid="${p.thread_id || ''}" data-name="${p.name}">
                        <div>
                            <div style="font-weight:bold;">${p.name}</div>
                            <div style="font-size:0.7rem; color:var(--text-dim);">${p.category}</div>
                        </div>
                    `;
                    item.onclick = () => {
                        const cb = item.querySelector('input');
                        cb.checked = !cb.checked;
                        item.classList.toggle('selected', cb.checked);
                    };
                    list.appendChild(item);
                });
            } catch (err) {
                document.getElementById('projectsList').innerHTML = "Ошибка загрузки проектов.";
            }
        }

        // GOOGLE DRIVE UPLOAD LOGIC
        async function uploadToDrive(file, folderId, token) {
            const metadata = {
                name: `${Date.now()}_${file.name}`,
                parents: [folderId]
            };

            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', file);

            const res = await axios.post(
                'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink',
                form,
                {
                    headers: { 'Authorization': `Bearer ${token}` },
                    onUploadProgress: (e) => {
                        const pct = Math.round((e.loaded * 100) / e.total);
                        updateProgress(pct, `ЗАГРУЗКА: ${file.name}`);
                    }
                }
            );
            return res.data.webViewLink;
        }

        function updateProgress(pct, text) {
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressPercent').textContent = pct + '%';
            if (text) document.getElementById('loadingStatus').textContent = text;
        }

        // SUBMISSION
        document.getElementById('castingForm').onsubmit = async function(e) {
            e.preventDefault();
            const selected = Array.from(document.querySelectorAll('#projectsList input:checked')).map(i => ({
                cid: i.dataset.cid,
                tid: i.dataset.tid,
                name: i.dataset.name
            }));

            if (!selected.length) return alert("Выберите кастинг!");
            if (photos.length < 3) return alert("Нужно минимум 3 фото.");
            if (!videoFile) return alert("Нужно видео!");

            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';

            try {
                const fd = new FormData(this);
                const actorName = fd.get('full_name');
                
                // 1. Upload to Drive
                updateProgress(10, "ПОДКЛЮЧЕНИЕ К DRIVE...");
                let driveLinks = [];
                
                // Upload Video
                const videoLink = await uploadToDrive(videoFile, G_DRIVE_FOLDER_ID, G_API_TOKEN);
                driveLinks.push(`🎥 ВИДЕО: ${videoLink}`);

                // Upload Photos (first 3)
                for (let i = 0; i < Math.min(3, photos.length); i++) {
                    const link = await uploadToDrive(photos[i], G_DRIVE_FOLDER_ID, G_API_TOKEN);
                    driveLinks.push(`📸 ФОТО ${i+1}: ${link}`);
                }

                // 2. Send to Telegram via Python
                const details = `
📏 РОСТ/ВЕС: ${fd.get('height')}/${fd.get('weight')}
👤 ТИП: ${fd.get('appearance_type')}
👕 ОДЕЖДА/ОБУВЬ: ${fd.get('cloth_size')}/${fd.get('shoe_size')}
🔗 DRIVE: \n${driveLinks.join('\n')}
                `.trim();

                for (const p of selected) {
                    updateProgress(90, `ОТПРАВКА В ТОПИК: ${p.name}`);
                    const tgData = new FormData();
                    tgData.append('chat_id', p.cid);
                    tgData.append('thread_id', p.tid);
                    tgData.append('full_name', actorName);
                    tgData.append('gender', fd.get('gender'));
                    tgData.append('birth_date', fd.get('birth_date'));
                    tgData.append('city', fd.get('city'));
                    tgData.append('phone', fd.get('phone'));
                    tgData.append('email_tg', fd.get('social_links'));
                    tgData.append('character_name', fd.get('character_name'));
                    tgData.append('experience', fd.get('experience') + "\n\n" + details);
                    tgData.append('casting_target', p.name);
                    
                    // Attach first photo as preview for TG
                    tgData.append('photos', photos[0]);

                    await axios.post(VERCEL_API, tgData);
                }

                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
                window.scrollTo(0,0);

            } catch (err) {
                console.error(err);
                alert("Ошибка: " + (err.response?.data?.error || "Проверьте API токен или доступ к папке"));
            } finally {
                overlay.style.display = 'none';
            }
        };

        window.onload = () => {
            loadTopics();
            renderPhotos();
        };
    </script>
</body>
</html>
