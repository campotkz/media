<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="docTitle"></title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #f45925; --text: rgba(255,255,255,0.92); --muted: rgba(255,255,255,0.6); --radius: 20px; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; backdrop-filter: blur(20px); }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 22px; color: var(--accent); text-transform: uppercase; margin: 0; }
        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; background: #111; border: 1px solid #333; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="mainTitle"></h1>
            <p>Sklad Productions • Casting Management</p>
        </div>

        <div id="welcomeView" class="card">
            <p id="welcomeMsg"></p>
            <button class="btn btn-primary" id="startBtn"></button>
        </div>

        <div id="formView" style="display:none">
            <form id="castForm">
                <div class="card">
                    <label id="lblProjects"></label>
                    <select id="projectSelect" required></select>
                </div>
                <div class="card">
                    <label id="lblName"></label>
                    <input type="text" name="full_name" required>
                    <label id="lblPhone" style="margin-top:10px"></label>
                    <input type="tel" name="phone" required id="phone">
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn"></button>
            </form>
        </div>
    </div>

    <script>
        // Unicode dictionary to prevent encoding errors
        const T = {
            title: "\u0410\u041d\u041a\u0415\u0422\u0410 \u0423\u0427\u0410\u0421\u0422\u041d\u0418\u041a\u0410 \u041a\u0410\u0421\u0422\u0418\u041d\u0413\u0410",
            welcome: "\u0412\u044b \u0437\u0430\u043f\u043e\u043b\u043d\u044f\u0435\u0442\u0435 \u0430\u043d\u043a\u0435\u0442\u0443 \u043d\u0430 \u043a\u0430\u0441\u0442\u0438\u043d\u0433. \u041f\u043e\u0436\u0430\u043b\u0443\u0439\u0441\u0442\u0430, \u0437\u0430\u043f\u043e\u043b\u043d\u0438\u0442\u0435 \u0432\u0441\u0435 \u043f\u043e\u043b\u044f.",
            start: "\u041d\u0410\u0427\u0410\u0422\u042c \u0417\u0410\u041f\u041e\u041b\u041d\u0415\u041d\u0418\u0415",
            submit: "\u041e\u0422\u041f\u0420\u0410\u0412\u0418\u0422\u042c \u0410\u041d\u041a\u0415\u0422\u0423",
            projects: "\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u043a\u0430\u0441\u0442\u0438\u043d\u0433",
            name: "\u0412\u0430\u0448\u0435 \u0418\u043c\u044f (\u0424\u0430\u043c\u0438\u043b\u0438\u044f \u0418\u043c\u044f)",
            phone: "\u041d\u043e\u043c\u0435\u0440 \u0442\u0435\u043b\u0435\u0444\u043e\u043d\u0430 (WhatsApp)"
        };

        document.getElementById('docTitle').textContent = T.title;
        document.getElementById('mainTitle').textContent = T.title;
        document.getElementById('welcomeMsg').textContent = T.welcome;
        document.getElementById('startBtn').textContent = T.start;
        document.getElementById('submitBtn').textContent = T.submit;
        document.getElementById('lblProjects').textContent = T.projects;
        document.getElementById('lblName').textContent = T.name;
        document.getElementById('lblPhone').textContent = T.phone;

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('welcomeView').style.display = 'none';
            document.getElementById('formView').style.display = 'block';
        };

        async function init() {
            try {
                const res = await fetch("https://media-seven-eta.vercel.app/api/casting/topics");
                const projs = await res.json();
                const sel = document.getElementById('projectSelect');
                projs.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.name;
                    opt.textContent = p.name;
                    sel.appendChild(opt);
                });
            } catch(e) { console.error(e); }
        }
        init();

        document.getElementById('castForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = "...";
            
            try {
                const fd = new FormData(e.target);
                fd.append('casting_target', document.getElementById('projectSelect').value);
                // Hardcoded routing for test
                fd.append('chat_id', "-1002442276228"); 
                
                await fetch("https://media.sijic13.workers.dev", { method: 'POST', body: fd });
                alert("\u0423\u0441\u043f\u0435\u0448\u043d\u043e \u043e\u0442\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043e!");
                location.reload();
            } catch(err) {
                alert("\u041e\u0448\u0438\u0431\u043a\u0430");
                btn.disabled = false;
                btn.textContent = T.submit;
            }
        };
    </script>
</body>
</html>
