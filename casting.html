<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АНКЕТА УЧАСТНИКА КАСТИНГА</title>
    <!-- Version: 2.2.5 (Granular Fields & UTF-8 Restore) -->
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --card-bg: rgba(20, 22, 30, 0.6);
            --accent: #7aa2ff;
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.6);
            --stroke: rgba(255, 255, 255, 0.1);
            --error: #ff3b30;
            --success: #4cd964;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --font: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000 70%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 480px;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, #999);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--muted);
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--stroke);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-family: var(--font);
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(122, 162, 255, 0.1);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .photo-upload {
            border: 2px dashed var(--stroke);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
        }

        .photo-upload:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
        }

        .photo-upload i {
            font-size: 24px;
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .photo-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .photo-preview img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--stroke);
        }

        button.submit-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 24px;
            box-shadow: 0 4px 15px rgba(122, 162, 255, 0.3);
        }

        button.submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(122, 162, 255, 0.4);
        }

        button.submit-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--error);
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Success Message */
        #successScreen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        #successScreen i {
            font-size: 64px;
            color: var(--success);
            margin-bottom: 24px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container" id="formContainer">
        <div class="card">
            <div class="header">
                <h1>АНКЕТА УЧАСТНИКА</h1>
                <p>Пожалуйста, заполните данные максимально точно</p>
            </div>

            <form id="castingForm">
                <div class="form-group">
                    <label>Название проекта *</label>
                    <input type="text" id="project_name" list="projects" placeholder="Выберите или впишите проект" required>
                    <datalist id="projects"></datalist>
                </div>

                <div class="form-group">
                    <label>Город проживания *</label>
                    <select id="city" required>
                        <option value="" disabled selected>Выберите город</option>
                        <option value="Алматы">Алматы</option>
                        <option value="Астана">Астана</option>
                        <option value="Шымкент">Шымкент</option>
                        <option value="Другой">Другой</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="full_name" placeholder="Введите имя и фамилию" required>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Возраст *</label>
                        <input type="number" id="age" placeholder="Лет" required>
                    </div>
                    <div class="form-group">
                        <label>Рост (см) *</label>
                        <input type="number" id="height" placeholder="175" required>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Вес (кг) *</label>
                        <input type="number" id="weight" placeholder="70" required>
                    </div>
                    <div class="form-group">
                        <label>Тип внешности *</label>
                        <select id="appearance" required>
                            <option value="" disabled selected>Выберите тип</option>
                            <option value="Азиатский">Азиатский</option>
                            <option value="Европейский">Европейский</option>
                            <option value="Славянский">Славянский</option>
                            <option value="Кавказский">Кавказский</option>
                            <option value="Африканский">Африканский</option>
                            <option value="Смешанный">Смешанный / Другой</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Цвет волос *</label>
                    <select id="hair_color" required>
                        <option value="" disabled selected>Выберите цвет</option>
                        <option value="Шатен">Шатен</option>
                        <option value="Блондин">Блондин</option>
                        <option value="Брюнет">Брюнет</option>
                        <option value="Рыжий">Рыжий</option>
                        <option value="Русый">Русый</option>
                        <option value="Седой">Седой</option>
                        <option value="Лысый">Лысый</option>
                        <option value="Другой">Другой</option>
                    </select>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Размер одежды *</label>
                        <input type="text" id="clothing_size" placeholder="S / 44" required>
                    </div>
                    <div class="form-group">
                        <label>Размер обуви *</label>
                        <input type="number" id="shoe_size" placeholder="42" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required>
                </div>

                <div class="form-group">
                    <label>Instagram / Соцсеть</label>
                    <input type="text" id="instagram" placeholder="@username или ссылка">
                </div>

                <div class="form-group">
                    <label>Email или Telegram *</label>
                    <input type="text" id="contact_method" placeholder="email@example.com или @username" required>
                </div>

                <div class="form-group">
                    <label>Опыт и доп. инфо (усы, тату и т.д.)</label>
                    <textarea id="experience_summary" rows="3" placeholder="Опишите кратко ваш опыт и особенности внешности"></textarea>
                </div>

                <div class="form-group">
                    <label>Фотографии (до 5 шт) *</label>
                    <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
                        <i>📷</i>
                        <span>Нажмите для выбора фото</span>
                    </div>
                    <input type="file" id="photoInput" multiple accept="image/*" style="display:none" onchange="handlePhotos(event)">
                    <div class="photo-preview" id="photoPreview"></div>
                    <p class="error-msg" id="photoError">Пожалуйста, добавьте хотя бы одно фото</p>
                </div>

                <button type="submit" class="submit-btn">ОТПРАВИТЬ АНКЕТУ</button>
            </form>
        </div>
    </div>

    <div id="successScreen">
        <div class="card">
            <i>✅</i>
            <h1>СПАСИБО!</h1>
            <p>Ваша анкета успешно отправлена. Мы свяжемся с вами, если вы подойдете на роль.</p>
            <button class="submit-btn" onclick="location.reload()">ОТПРАВИТЬ ЕЩЕ ОДНУ</button>
        </div>
    </div>

    <div id="loadingOverlay">
        <span class="loader"></span>
    </div>

    <script>
        const S_URL = "https://waekzofajzqcpoeldhkt.supabase.co";
        const S_KEY = "sb_publishable_XVByRUkaKbM-11ChwOd2Aw_y24CSb4V";
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        let uploadedPhotos = [];

        async function loadProjects() {
            try {
                const { data, error } = await supabase.from('projects').select('name').eq('is_active', true);
                if (data) {
                    const list = document.getElementById('projects');
                    data.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.name;
                        list.appendChild(opt);
                    });
                }
            } catch (e) { console.error(e); }
        }
        loadProjects();

        function handlePhotos(event) {
            const files = Array.from(event.target.files);
            const preview = document.getElementById('photoPreview');
            
            files.forEach(file => {
                if (uploadedPhotos.length >= 5) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                    uploadedPhotos.push(file);
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('castingForm').onsubmit = async (e) => {
            e.preventDefault();
            
            if (uploadedPhotos.length === 0) {
                document.getElementById('photoError').style.display = 'block';
                return;
            }

            document.getElementById('loadingOverlay').style.display = 'flex';

            try {
                const formData = {
                    project_name: document.getElementById('project_name').value,
                    city: document.getElementById('city').value,
                    full_name: document.getElementById('full_name').value,
                    age: parseInt(document.getElementById('age').value),
                    height: parseInt(document.getElementById('height').value),
                    weight: parseInt(document.getElementById('weight').value),
                    appearance: document.getElementById('appearance').value,
                    hair_color: document.getElementById('hair_color').value,
                    clothing_size: document.getElementById('clothing_size').value,
                    shoe_size: parseInt(document.getElementById('shoe_size').value),
                    phone: document.getElementById('phone').value,
                    instagram: document.getElementById('instagram').value,
                    contact_method: document.getElementById('contact_method').value,
                    experience_summary: document.getElementById('experience_summary').value,
                    created_at: new Date().toISOString()
                };

                // For simplicity in this restore, we send to a worker or Supabase directly
                // In the real app, we usually upload photos to bucket first.
                const { data, error } = await supabase.from('casting_applications').insert([formData]);
                
                if (error) throw error;

                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';

            } catch (err) {
                alert('Ошибка при отправке: ' + err.message);
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        };
    </script>
</body>

</html>
