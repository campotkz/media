<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АНКЕТА УЧАСТНИКА КАСТИНГА | GULYWOOD</title>
    <!-- Version: 2.3.0 (Gold Standard Sync) -->
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #15161c;
            --card-bg: #1c1d24;
            --input-bg: #15161c;
            --accent: #ff3b30;
            --accent-glow: rgba(255, 59, 48, 0.2);
            --text: #ffffff;
            --muted: #8e8e93;
            --stroke: rgba(255, 255, 255, 0.08);
            --radius: 16px;
            --font: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--stroke);
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 32px 0 20px;
        }

        .section-header h2 {
            font-size: 14px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            white-space: nowrap;
        }

        .section-header .line {
            height: 1px;
            background: var(--stroke);
            flex: 1;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        label .req {
            color: var(--accent);
            margin-left: 2px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--stroke);
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            font-family: var(--font);
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Selectable Options (Radio as blocks) */
        .option-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-item {
            position: relative;
            background: var(--input-bg);
            border: 1px solid var(--stroke);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-item:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .option-item.selected {
            border-color: var(--accent);
            background: rgba(255, 59, 48, 0.05);
        }

        .option-item input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid var(--stroke);
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        .option-item.selected .radio-circle {
            border-color: var(--accent);
        }

        .option-item.selected .radio-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
        }

        .option-label {
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
        }

        /* Photo Upload */
        .photo-upload-zone {
            border: 2px dashed var(--stroke);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--input-bg);
        }

        .photo-upload-zone:hover {
            border-color: var(--accent);
            background: rgba(255, 59, 48, 0.02);
        }

        .photo-previews {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .photo-thumb {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--stroke);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 20px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Success & Loading */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #successScreen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        #successScreen h1 { font-size: 32px; margin-bottom: 16px; }
    </style>
</head>

<body>
    <div class="container" id="formContainer">
        <form id="castingForm">
            <div class="card">
                <label>На какой кастинг вы подаетесь?</label>
                <div class="option-grid" id="projectOptions">
                    <!-- Projects will be loaded here -->
                    <div class="option-item" onclick="selectOption(this, 'project_name', 'ПРОБА')">
                        <div class="radio-circle"></div>
                        <span class="option-label">ПРОБА</span>
                        <input type="radio" name="project_name" value="ПРОБА" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>На какого персонажа вы подаетесь?<span class="req">*</span></label>
                    <input type="text" id="character_name" placeholder="например: «Главный герой», «Отец»" required>
                </div>

                <div class="form-group">
                    <label>Ваше полное имя (Фамилия Имя)<span class="req">*</span></label>
                    <input type="text" id="full_name" placeholder="Иванов Иван" required>
                </div>

                <label>Ваш Гендер<span class="req">*</span></label>
                <div class="option-grid">
                    <div class="option-item" onclick="selectOption(this, 'gender', 'МУЖЧИНА')">
                        <div class="radio-circle"></div>
                        <span class="option-label">МУЖЧИНА</span>
                        <input type="radio" name="gender" value="МУЖЧИНА" required>
                    </div>
                    <div class="option-item" onclick="selectOption(this, 'gender', 'ЖЕНЩИНА')">
                        <div class="radio-circle"></div>
                        <span class="option-label">ЖЕНЩИНА</span>
                        <input type="radio" name="gender" value="ЖЕНЩИНА" required>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-header">
                    <h2>Контакты</h2>
                    <div class="line"></div>
                </div>

                <div class="form-group">
                    <label>Город проживания<span class="req">*</span></label>
                    <select id="city" required>
                        <option value="" disabled selected>Выберите город</option>
                        <option value="Алматы">Алматы</option>
                        <option value="Астана">Астана</option>
                        <option value="Шымкент">Шымкент</option>
                        <option value="Другой">Другой</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Телефон<span class="req">*</span></label>
                    <input type="tel" id="phone" placeholder="+7 (___) ___-__-__" required>
                </div>

                <div class="form-group">
                    <label>Instagram / Соцсеть</label>
                    <input type="text" id="instagram" placeholder="@username или ссылка">
                </div>

                <div class="form-group">
                    <label>Email или Telegram Ник<span class="req">*</span></label>
                    <input type="text" id="contact_method" placeholder="@username" required>
                </div>
            </div>

            <div class="card">
                <div class="section-header">
                    <h2>Параметры</h2>
                    <div class="line"></div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Возраст<span class="req">*</span></label>
                        <input type="number" id="age" placeholder="Лет" required>
                    </div>
                    <div class="form-group">
                        <label>Рост (см)<span class="req">*</span></label>
                        <input type="number" id="height" placeholder="175" required>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Вес (кг)<span class="req">*</span></label>
                        <input type="number" id="weight" placeholder="70" required>
                    </div>
                    <div class="form-group">
                        <label>Тип внешности<span class="req">*</span></label>
                        <select id="appearance" required>
                            <option value="" disabled selected>Выберите тип</option>
                            <option value="Азиатский">Азиатский</option>
                            <option value="Европейский">Европейский</option>
                            <option value="Славянский">Славянский</option>
                            <option value="Кавказский">Кавказский</option>
                            <option value="Африканский">Африканский</option>
                            <option value="Смешанный">Смешанный</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Цвет волос<span class="req">*</span></label>
                    <select id="hair_color" required>
                        <option value="" disabled selected>Выберите цвет</option>
                        <option value="Шатен">Шатен</option>
                        <option value="Блондин">Блондин</option>
                        <option value="Брюнет">Брюнет</option>
                        <option value="Рыжий">Рыжий</option>
                        <option value="Русый">Русый</option>
                        <option value="Седой">Седой</option>
                        <option value="Лысый">Лысый</option>
                    </select>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Размер одежды<span class="req">*</span></label>
                        <input type="text" id="clothing_size" placeholder="S / 44" required>
                    </div>
                    <div class="form-group">
                        <label>Размер обуви<span class="req">*</span></label>
                        <input type="number" id="shoe_size" placeholder="42" required>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-header">
                    <h2>Медиа и Опыт</h2>
                    <div class="line"></div>
                </div>

                <div class="form-group">
                    <label>Ваш опыт и особенности</label>
                    <textarea id="experience_summary" rows="4" placeholder="Опишите кратко ваш опыт, наличие усов, тату и т.д."></textarea>
                </div>

                <div class="form-group">
                    <label>Фотографии (до 5 шт)<span class="req">*</span></label>
                    <div class="photo-upload-zone" onclick="document.getElementById('photoInput').click()">
                        <span style="font-size: 40px; display: block; margin-bottom: 10px;">📸</span>
                        <span style="color: var(--muted); font-size: 14px;">Нажмите для загрузки</span>
                    </div>
                    <input type="file" id="photoInput" multiple accept="image/*" style="display:none" onchange="handlePhotos(event)">
                    <div class="photo-previews" id="photoPreview"></div>
                </div>

                <button type="submit" class="submit-btn">Отправить Анкету</button>
            </div>
        </form>
    </div>

    <div id="loadingOverlay">
        <div class="loader"></div>
        <p style="color: white; margin-top: 20px; font-weight: 700;">Отправляем ваши данные...</p>
    </div>

    <div id="successScreen">
        <div class="card">
            <span style="font-size: 64px; display: block; margin-bottom: 24px;">✅</span>
            <h1>Анкета принята!</h1>
            <p style="color: var(--muted);">Спасибо за участие. Мы свяжемся с вами в случае успеха.</p>
            <button class="submit-btn" onclick="location.reload()">Отправить еще одну</button>
        </div>
    </div>

    <script>
        const S_URL = "https://waekzofajzqcpoeldhkt.supabase.co";
        const S_KEY = "sb_publishable_XVByRUkaKbM-11ChwOd2Aw_y24CSb4V";
        const supabase = window.supabase.createClient(S_URL, S_KEY);

        let uploadedPhotos = [];

        function selectOption(el, name, value) {
            // Find parent and clear other selections
            const grid = el.parentElement;
            grid.querySelectorAll('.option-item').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
            
            // Set hidden radio input
            const input = el.querySelector('input');
            input.checked = true;
        }

        async function loadProjects() {
            try {
                const { data, error } = await supabase.from('projects').select('name').eq('is_active', true);
                if (data && data.length > 0) {
                    const container = document.getElementById('projectOptions');
                    container.innerHTML = ''; // Clear defaults
                    data.forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'option-item';
                        div.onclick = () => selectOption(div, 'project_name', p.name);
                        div.innerHTML = `
                            <div class="radio-circle"></div>
                            <span class="option-label">${p.name}</span>
                            <input type="radio" name="project_name" value="${p.name}" required>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (e) { console.error(e); }
        }
        loadProjects();

        function handlePhotos(event) {
            const files = Array.from(event.target.files);
            const preview = document.getElementById('photoPreview');
            files.forEach(file => {
                if (uploadedPhotos.length >= 5) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'photo-thumb';
                    preview.appendChild(img);
                    uploadedPhotos.push(file);
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('castingForm').onsubmit = async (e) => {
            e.preventDefault();
            if (uploadedPhotos.length === 0) { alert("Пожалуйста, добавьте фото"); return; }

            document.getElementById('loadingOverlay').style.display = 'flex';

            const projectName = document.querySelector('input[name="project_name"]:checked').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;

            try {
                const formData = {
                    project_name: projectName,
                    character_name: document.getElementById('character_name').value,
                    full_name: document.getElementById('full_name').value,
                    gender: gender,
                    city: document.getElementById('city').value,
                    age: parseInt(document.getElementById('age').value),
                    height: parseInt(document.getElementById('height').value),
                    weight: parseInt(document.getElementById('weight').value),
                    appearance: document.getElementById('appearance').value,
                    hair_color: document.getElementById('hair_color').value,
                    clothing_size: document.getElementById('clothing_size').value,
                    shoe_size: parseInt(document.getElementById('shoe_size').value),
                    phone: document.getElementById('phone').value,
                    instagram: document.getElementById('instagram').value,
                    contact_method: document.getElementById('contact_method').value,
                    experience_summary: document.getElementById('experience_summary').value,
                    created_at: new Date().toISOString()
                };

                const { error } = await supabase.from('casting_applications').insert([formData]);
                if (error) throw error;

                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
            } catch (err) {
                alert('Ошибка: ' + err.message);
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        };
    </script>
</body>

</html>
