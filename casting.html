<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GULYWOOD | CASTING</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ff3b3b;
            --card: #151515;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        .header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
        }

        .header h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .header p {
            color: var(--accent);
            font-size: 0.9rem;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .step-card {
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .step-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
        }

        .step-title span {
            background: var(--accent);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: #202020;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: #252525;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .project-item {
            background: #202020;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .project-item.selected {
            border-color: var(--accent);
            background: #2a1a1a;
        }

        .project-item input {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
        }

        .project-name {
            font-weight: 500;
        }

        .project-category {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .media-box {
            aspect-ratio: 1;
            background: #202020;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px dashed #333;
            position: relative;
            overflow: hidden;
        }

        .media-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-box .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 59, 59, 0.2);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #progressContainer {
            width: 100%;
            max-width: 300px;
            background: #333;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        #progressBar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }

        #progressPercent {
            margin-top: 8px;
            font-weight: bold;
            color: var(--accent);
            display: none;
        }

        .success-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div id="formContainer">
        <div class="header">
            <h1>CASTING</h1>
            <p>GULYWOOD TALENT HUB</p>
        </div>

        <div class="container">
            <form id="castingForm">
                <!-- STEP 1: PROJECT -->
                <div class="step-card">
                    <div class="step-title"><span>1</span> ВЫБЕРИТЕ ПРОЕКТ</div>
                    <div id="projectsList">
                        <div style="text-align:center; padding:20px; color:var(--text-dim);">Загрузка проектов...</div>
                    </div>
                </div>

                <!-- STEP 2: PERSONAL -->
                <div class="step-card">
                    <div class="step-title"><span>2</span> ЛИЧНЫЕ ДАННЫЕ</div>
                    <div class="form-group">
                        <label>ФИО</label>
                        <input type="text" name="full_name" required placeholder="Иванов Иван Иванович">
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>ПОЛ</label>
                            <select name="gender" required>
                                <option value="Мужской">Мужской</option>
                                <option value="Женский">Женский</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>ДАТА РОЖДЕНИЯ</label>
                            <input type="date" name="birth_date" required>
                        </div>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>ГОРОД</label>
                            <select name="city_select" id="citySelect" required onchange="toggleOtherCity(this.value)">
                                <option value="Алматы">Алматы</option>
                                <option value="Астана">Астана</option>
                                <option value="Шымкент">Шымкент</option>
                                <option value="Другой">Другой</option>
                            </select>
                        </div>
                        <div class="form-group" id="otherCityGroup" style="display:none;">
                            <label>УКАЖИТЕ ГОРОД</label>
                            <input type="text" name="other_city" placeholder="Ваш город">
                        </div>
                    </div>
                </div>

                <!-- STEP 3: APPEARANCE -->
                <div class="step-card">
                    <div class="step-title"><span>3</span> ВНЕШНОСТЬ</div>
                    <div class="grid">
                        <div class="form-group">
                            <label>РОСТ (СМ)</label>
                            <input type="number" name="height" required placeholder="180">
                        </div>
                        <div class="form-group">
                            <label>ВЕС (КГ)</label>
                            <input type="number" name="weight" required placeholder="75">
                        </div>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>ОДЕЖДА</label>
                            <input type="text" name="cloth_size" required placeholder="M / 48">
                        </div>
                        <div class="form-group">
                            <label>ОБУВЬ</label>
                            <input type="number" name="shoe_size" required placeholder="42">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ТИП ВНЕШНОСТИ</label>
                        <select name="appearance_type" required>
                            <option value="Азиатский">Азиатский</option>
                            <option value="Европейский">Европейский</option>
                            <option value="Метис">Метис</option>
                            <option value="Кавказский">Кавказский</option>
                            <option value="Другой">Другой</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ЦВЕТ ВОЛОС</label>
                        <input type="text" name="hair_color" required placeholder="Брюнет / Русый">
                    </div>
                    <div class="form-group">
                        <label>ОСОБЕННОСТИ (ТАТУ, ШРАМЫ)</label>
                        <input type="text" name="appearance_details" placeholder="Нет / Тату на руке">
                    </div>
                </div>

                <!-- STEP 4: CONTACTS & EXPERIENCE -->
                <div class="step-card">
                    <div class="step-title"><span>4</span> КОНТАКТЫ И ОПЫТ</div>
                    <div class="form-group">
                        <label>ТЕЛЕФОН (WHATSAPP)</label>
                        <input type="tel" name="phone" required placeholder="+7 (___) ___ __ __">
                    </div>
                    <div class="form-group">
                        <label>SOCIAL LINKS (INSTAGRAM / PORTFOLIO)</label>
                        <input type="text" name="social_links" placeholder="https://instagram.com/your_profile">
                    </div>
                    <div class="form-group">
                        <label>ОПЫТ В СЪЕМКАХ</label>
                        <textarea name="experience" rows="3" placeholder="Опишите ваш опыт..."></textarea>
                    </div>
                </form>
            </div>

                <!-- STEP 5: MEDIA -->
                <div class="step-card">
                    <div class="step-title"><span>5</span> ФОТО И ВИДЕО</div>
                    <label>ФОТО (3-6 ШТ, ПОРТРЕТ И ПОЛНЫЙ РОСТ)</label>
                    <div class="media-grid" id="photoGrid">
                        <!-- Boxes added by JS -->
                    </div>
                    <input type="file" id="photoInput" multiple accept="image/*" style="display:none;">

                    <div class="form-group" style="margin-top:20px;">
                        <label>ВИДЕОВИЗИТКА (ОБЯЗАТЕЛЬНО)</label>
                        <div class="media-box" style="width:100%; aspect-ratio:16/9;" onclick="document.getElementById('videoInput').click()">
                            <div id="videoPlaceholder">🎥 НАЖМИТЕ ЧТОБЫ ВЫБРАТЬ ВИДЕО</div>
                            <video id="videoPreview" style="display:none; width:100%; height:100%;" controls></video>
                        </div>
                        <input type="file" id="videoInput" accept="video/*" style="display:none;">
                    </div>
                </div>

                <button type="submit" form="castingForm" class="submit-btn">ОТПРАВИТЬ АНКЕТУ</button>
        </div>
    </div>

    <div id="successScreen" class="success-screen">
        <div class="success-icon">✅</div>
        <h2>АНКЕТА ПРИНЯТА!</h2>
        <p style="color:var(--text-dim); margin-top:10px;">Спасибо за отклик. Если вы подойдете, наш менеджер свяжется с вами.</p>
        <button onclick="location.reload()" class="submit-btn" style="width:auto; padding:15px 40px; margin-top:30px;">ВЕРНУТЬСЯ</button>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <span class="loader"></span>
        <div id="loadingStatus">ОБРАБОТКА ДАННЫХ...</div>
        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>
        <div id="progressPercent">0%</div>
    </div>

    <script>
        const API_BASE = "https://media.sijic13.workers.dev";
        const VERCEL_URL = "https://media-seven-eta.vercel.app";

        let uploadedPhotos = [];
        let uploadedVideoFile = null;

        // Initialize photo grid
        function initPhotoGrid() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const box = document.createElement('div');
                box.className = 'media-box';
                if (uploadedPhotos[i]) {
                    box.innerHTML = `<img src="${URL.createObjectURL(uploadedPhotos[i])}">
                                     <div class="remove-btn" onclick="removePhoto(${i}, event)">×</div>`;
                } else {
                    box.innerHTML = `<span>+</span>`;
                    box.onclick = () => document.getElementById('photoInput').click();
                }
                grid.appendChild(box);
            }
        }

        function removePhoto(index, event) {
            event.stopPropagation();
            uploadedPhotos.splice(index, 1);
            initPhotoGrid();
        }

        document.getElementById('photoInput').onchange = function(e) {
            const files = Array.from(e.target.files);
            uploadedPhotos = [...uploadedPhotos, ...files].slice(0, 6);
            initPhotoGrid();
        };

        document.getElementById('videoInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadedVideoFile = file;
                const preview = document.getElementById('videoPreview');
                const placeholder = document.getElementById('videoPlaceholder');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            }
        };

        function toggleOtherCity(val) {
            document.getElementById('otherCityGroup').style.display = val === 'Другой' ? 'block' : 'none';
        }

        // Load projects from registry
        async function loadProjects() {
            try {
                const res = await axios.get(`${VERCEL_URL}/api/casting/topics`);
                const projects = res.data;
                const list = document.getElementById('projectsList');
                list.innerHTML = '';
                
                projects.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'project-item';
                    item.innerHTML = `
                        <input type="checkbox" data-cid="${p.chat_id}" data-tid="${p.thread_id || ''}" data-name="${p.name}">
                        <div>
                            <div class="project-name">${p.name}</div>
                            <div class="project-category">${p.category || 'CASTING'}</div>
                        </div>
                    `;
                    item.onclick = () => {
                        const cb = item.querySelector('input');
                        cb.checked = !cb.checked;
                        item.classList.toggle('selected', cb.checked);
                    };
                    list.appendChild(item);
                });
            } catch (err) {
                document.getElementById('projectsList').innerHTML = `<div style="color:red">Ошибка загрузки проектов</div>`;
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        document.getElementById('castingForm').onsubmit = async function(e) {
            e.preventDefault();
            const selected = Array.from(document.querySelectorAll('#projectsList input:checked')).map(i => ({
                cid: i.dataset.cid,
                tid: i.dataset.tid,
                name: i.dataset.name
            }));

            if (selected.length === 0) return alert("Выберите хотя бы один проект.");
            if (uploadedPhotos.length < 3) return alert("Загрузите минимум 3 фото.");
            if (!uploadedVideoFile) return alert("Загрузите видеовизитку.");

            document.getElementById('loadingOverlay').style.display = 'flex';
            const status = document.getElementById('loadingStatus');
            const pBar = document.getElementById('progressBar');
            const pCont = document.getElementById('progressContainer');

            try {
                const formData = new FormData(this);
                
                // Prepare details
                const city = formData.get('city_select') === 'Другой' ? formData.get('other_city') : formData.get('city_select');
                const details = `
📏 Рост/Вес: ${formData.get('height')}/${formData.get('weight')}
👤 Тип: ${formData.get('appearance_type')} | Волосы: ${formData.get('hair_color')}
👕 Одежда/Обувь: ${formData.get('cloth_size')}/${formData.get('shoe_size')}
✨ Особенности: ${formData.get('appearance_details') || 'Нет'}
                `.trim();

                // Convert media to base64
                status.textContent = "ПОДГОТОВКА ФОТО...";
                const photoPromises = uploadedPhotos.map(f => toBase64(f));
                const photosB64 = await Promise.all(photoPromises);

                status.textContent = "ПОДГОТОВКА ВИДЕО...";
                const videoB64 = await toBase64(uploadedVideoFile);

                for (let i = 0; i < selected.length; i++) {
                    const p = selected[i];
                    status.textContent = `ОТПРАВКА: ${p.name}...`;
                    pCont.style.display = 'block';
                    pBar.style.width = '50%';

                    const payload = {
                        chat_id: p.cid,
                        thread_id: p.tid,
                        full_name: formData.get('full_name'),
                        gender: formData.get('gender'),
                        birth_date: formData.get('birth_date'),
                        city: city,
                        phone: formData.get('phone'),
                        social_links: formData.get('social_links'),
                        experience: formData.get('experience') + "\n\n" + details,
                        casting_target: p.name,
                        photos: photosB64,
                        video: videoB64
                    };

                    await axios.post(API_BASE, payload);
                    pBar.style.width = '100%';
                }

                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successScreen').style.display = 'block';
            } catch (err) {
                alert("Ошибка: " + (err.response?.data?.error || err.message));
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        };

        window.onload = () => {
            loadProjects();
            initPhotoGrid();
        };
    </script>
</body>
</html>
