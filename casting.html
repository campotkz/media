<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casting Form | GULYWOOD</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #f45925;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.6);
            --stroke: rgba(255, 255, 255, 0.1);
            --radius: 20px;
            --error: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0 0 8px;
            text-transform: uppercase;
        }

        .header p {
            color: var(--muted);
            font-size: 13px;
            margin: 0;
            letter-spacing: 1px;
        }

        .block {
            background: var(--card);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .block-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .block-title::after { content: ""; flex: 1; height: 1px; background: var(--stroke); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
        .form-group label span { color: var(--accent); margin-left: 4px; }

        input[type="text"], input[type="tel"], input[type="number"], input[type="date"], select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--stroke);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(244, 89, 37, 0.1); }

        .radio-group { display: flex; flex-direction: column; gap: 10px; }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--stroke);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .radio-item input { display: none; }
        .radio-mark { width: 18px; height: 18px; border: 2px solid var(--stroke); border-radius: 50%; position: relative; }
        .radio-item input:checked + .radio-mark { border-color: var(--accent); }
        .radio-item input:checked + .radio-mark::after {
            content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
        }

        .upload-area {
            border: 2px dashed var(--stroke);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { border-color: var(--accent); background: rgba(244, 89, 37, 0.05); }
        .upload-area i { font-size: 24px; display: block; margin-bottom: 10px; opacity: 0.5; }
        .upload-area span { font-size: 13px; color: var(--muted); }

        .file-list { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; }
        .file-item { width: 80px; height: 80px; border-radius: 8px; position: relative; background-size: cover; background-position: center; border: 1px solid var(--stroke); }
        .file-remove { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; background: var(--error); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .welcome-screen { text-align: center; animation: fadeIn 1s; }
        .welcome-card { background: var(--card); border: 1px solid var(--stroke); padding: 30px; border-radius: var(--radius); margin-bottom: 20px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--stroke); padding: 20px; border-radius: 16px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; text-align: left; transition: 0.2s; }
        .option-btn:hover { border-color: var(--accent); transform: scale(1.02); }
        .option-btn i { font-size: 24px; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; z-index: 10000; display: none; }
        
        .supplement-mode .block:not(.media-block) { opacity: 0.6; pointer-events: none; }
        .supplement-mode .block-title::after { background: var(--accent); }
    </style>
</head>
<body>
    <div class="container" id="welcomeContainer">
        <div class="header">
            <h1>АНКЕТА GULYWOOD</h1>
            <p>Casting Management System v2.0</p>
        </div>
        <div class="welcome-screen">
            <div class="welcome-card">
                <div class="option-btn" id="startNewBtn"><i>📝</i> <div><b>Новая анкета</b><br><small>Я заполняю первый раз</small></div></div>
                <div class="option-btn" onclick="location.href='index.html'"><i>🏠</i> <div><b>На главную</b><br><small>Вернуться в ERP</small></div></div>
            </div>
        </div>
    </div>

    <div class="container" id="formContainer" style="display:none">
        <div class="header">
            <h1 id="formTitle">АНКЕТА УЧАСТНИКА</h1>
            <p id="formSubtitle">Пожалуйста, заполните все поля</p>
        </div>

        <form id="castingForm">
            <div class="block">
                <div class="block-title">Проект</div>
                <div class="form-group">
                    <label>Выберите проект<span>*</span></label>
                    <select name="project_name" id="projectSelect" required></select>
                </div>
                <div class="form-group">
                    <label>Полное имя<span>*</span></label>
                    <input type="text" name="full_name" id="fullName" required placeholder="Иванов Иван">
                </div>
            </div>

            <div class="block personal-block">
                <div class="block-title">Данные</div>
                <div class="form-group">
                    <label>Возраст</label>
                    <input type="number" name="age">
                </div>
                <div class="form-group">
                    <label>Город</label>
                    <input type="text" name="city">
                </div>
                <div class="form-group">
                    <label>Телефон<span>*</span></label>
                    <input type="tel" name="phone" id="phone" required placeholder="+7 707 ...">
                </div>
            </div>

            <div class="block media-block">
                <div class="block-title">Медиа (Дозагрузка)</div>
                <div class="form-group">
                    <label>Фотографии (До 5 шт)</label>
                    <div class="upload-area" onclick="document.getElementById('photoInput').click()">
                        <i>📸</i>
                        <span>Нажмите для выбора фото</span>
                        <input type="file" id="photoInput" multiple accept="image/*" style="display:none">
                    </div>
                    <div class="file-list" id="photoList"></div>
                </div>
                <div class="form-group">
                    <label>Видео-визитка (Ссылка или файл)</label>
                    <input type="text" name="portfolio_url" placeholder="Ссылка на YouTube/Drive">
                    <p style="font-size:10px; color:var(--muted); margin-top:5px">Или выберите файл (до 50МБ):</p>
                    <div class="upload-area" onclick="document.getElementById('videoInput').click()">
                        <i>🎬</i>
                        <span>Выбрать видео-файл</span>
                        <input type="file" id="videoInput" accept="video/*" style="display:none">
                    </div>
                    <div class="file-list" id="videoList"></div>
                </div>
                <div class="form-group">
                    <label>Дополнительная информация</label>
                    <textarea name="experience_summary" rows="4" placeholder="Напишите здесь то, что просил кастинг-директор..."></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">ОТПРАВИТЬ АНКЕТУ</button>
        </form>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = "https://media.sijic13.workers.dev";
        const form = document.getElementById('castingForm');
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || params.get('id');
        let isSupplementMode = false;
        let photos = [];
        let videoFile = null;

        // Init
        async function init() {
            // Load projects
            const pRes = await fetch(`${API_BASE}/api/projects`);
            const projects = await pRes.json();
            const sel = document.getElementById('projectSelect');
            projects.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p; opt.textContent = p;
                sel.appendChild(opt);
            });

            if (token) {
                isSupplementMode = true;
                document.body.classList.add('supplement-mode');
                document.getElementById('formTitle').textContent = 'ДОЗАГРУЗКА МАТЕРИАЛОВ';
                document.getElementById('formSubtitle').textContent = 'Режим дополнения анкеты';
                document.getElementById('welcomeContainer').style.display = 'none';
                document.getElementById('formContainer').style.display = 'block';

                const aRes = await fetch(`${API_BASE}/api/applications/by-token?token=${token}`);
                const data = await aRes.json();
                if (data.full_name) {
                    document.getElementById('fullName').value = data.full_name;
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('projectSelect').value = data.project_name || '';
                    showToast(`Привет, ${data.full_name}!`);
                }
            }
        }

        document.getElementById('startNewBtn').onclick = () => {
            document.getElementById('welcomeContainer').style.display = 'none';
            document.getElementById('formContainer').style.display = 'block';
        };

        // File handling (Simplified for demonstration - real upload would need S3/TG Bot API)
        // Since we are building a prototype, we'll simulate the "photo_tg_ids" logic
        document.getElementById('photoInput').onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(f => {
                const reader = new FileReader();
                reader.onload = (re) => {
                    const id = Math.random().toString(36).substr(2, 9);
                    photos.push(id); // Simulation
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.style.backgroundImage = `url(${re.target.result})`;
                    div.innerHTML = `<div class="file-remove" onclick="this.parentElement.remove()">✕</div>`;
                    document.getElementById('photoList').appendChild(div);
                };
                reader.readAsDataURL(f);
            });
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = "ОТПРАВКА...";

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.photo_tg_ids = photos;
            data.age_num = parseInt(data.age) || 0;

            const method = isSupplementMode ? 'PUT' : 'POST';
            const endpoint = isSupplementMode ? '/api/applications/additional' : '/api/applications/submit';
            if (isSupplementMode) data.token = token;

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert("Успешно! Ваши данные обновлены.");
                    location.href = "index.html";
                } else { throw new Error(); }
            } catch (err) {
                alert("Ошибка при отправке. Попробуйте позже.");
                btn.disabled = false;
                btn.textContent = "ОТПРАВИТЬ АНКЕТУ";
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        init();
    </script>
</body>
</html>
