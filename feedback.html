<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campot Analytics | Feedback</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000 70%);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Subtle VHS/Glitch Textures */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(0deg,
                    rgba(255, 255, 255, 0.015) 0px,
                    rgba(255, 255, 255, 0.015) 1px,
                    transparent 1px,
                    transparent 2px);
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 0;
        }

        #root {
            position: relative;
            z-index: 10;
        }

        .campot-red {
            color: #f45925;
        }

        .bg-campot-red {
            background-color: #f45925;
        }

        .border-campot-red {
            border-color: #f45925;
        }

        .input-style {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem;
            width: 100%;
            border-radius: 16px;
            /* custom rounded corners */
            outline: none;
            transition: all 0.2s;
            font-size: 16px;
            /* Avoid iOS zoom */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .input-style:focus {
            border-color: #f45925;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(244, 89, 37, 0.1);
        }

        .btn-campot {
            background: rgba(244, 89, 37, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            font-weight: 900;
            text-transform: uppercase;
            padding: 1.25rem;
            width: 100%;
            border-radius: 16px;
            /* custom rounded corners */
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(244, 89, 37, 0.3);
            border: none;
            letter-spacing: 1px;
        }

        .btn-campot:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-campot:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: #666;
            box-shadow: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-weight: 700;
            text-transform: uppercase;
            padding: 1rem;
            width: 100%;
            border-radius: 16px;
            /* custom rounded corners */
            font-size: 0.8rem;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.98);
        }

        .step-anim {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Custom Select Arrow */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: #f45925;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        select.input-style {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Supabase Config
        const S_URL = "https://waekzofajzqcpoeldhkt.supabase.co";
        const S_KEY = "sb_publishable_XVByRUkaKbM-11ChwOd2Aw_y24CSb4V";
        const supabase = window.supabase.createClient(S_URL, S_KEY);
        const tg = window.Telegram.WebApp;

        // --- COMPONENTS DEFINED OUTSIDE APP TO PREVENT RE-RENDERS ---

        const Header = () => (
            <div className="mb-8">
                <h1 className="text-3xl font-black italic tracking-tighter uppercase">CAMPOT <span className="campot-red">ANALYTICS</span></h1>
                <div className="h-1 w-10 bg-campot-red mt-2"></div>
            </div>
        );

        const Step0_Contacts = ({ form, update, setStep }) => (
            <div className="step-anim space-y-6">
                <h2 className="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 border-l-2 border-campot-red pl-3 italic">01. Контакты</h2>
                <input className="input-style" placeholder="Instagram @аккаунт" value={form.instagram} onChange={e => update('instagram', e.target.value)} />
                <input className="input-style" placeholder="Ваше Имя" value={form.client_name} onChange={e => update('client_name', e.target.value)} />
                <input className="input-style" placeholder="Телефон" value={form.phone} onChange={e => update('phone', e.target.value)} />
                <button onClick={() => setStep(1)} disabled={!form.instagram} className="btn-campot">Далее</button>
            </div>
        );

        const Step1_Metrics = ({ form, update, setStep }) => (
            <div className="step-anim space-y-6">
                <h2 className="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 border-l-2 border-campot-red pl-3 italic">02. Метрики</h2>
                <div>
                    <label className="text-[10px] uppercase text-zinc-500 mb-1 block">Новых лидов за месяц</label>
                    <input className="input-style" type="number" placeholder="0" value={form.leads_count} onChange={e => update('leads_count', e.target.value)} />
                </div>
                <div>
                    <label className="text-[10px] uppercase text-zinc-500 mb-1 block">Основной источник</label>
                    <div className="select-wrapper">
                        <select className="input-style" value={form.lead_source} onChange={e => update('lead_source', e.target.value)}>
                            <option value="Direct Instagram">Direct Instagram</option>
                            <option value="WhatsApp / Taplink">WhatsApp / Taplink</option>
                            <option value="Комментарии">Комментарии</option>
                            <option value="Сарафанка">Сарафанка</option>
                            <option value="Другое">Другое</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label className="text-[10px] uppercase text-zinc-500 mb-1 block">Реальных продаж (шт)</label>
                    <input className="input-style" type="number" placeholder="0" value={form.sales_count} onChange={e => update('sales_count', e.target.value)} />
                </div>
                <div>
                    <label className="text-[10px] uppercase text-zinc-500 mb-1 block">Средний чек</label>
                    <input className="input-style" placeholder="Напр: 15 000" value={form.average_check} onChange={e => update('average_check', e.target.value)} />
                </div>
                <div className="flex gap-3 pt-4">
                    <button onClick={() => setStep(0)} className="btn-secondary w-1/3">Назад</button>
                    <button onClick={() => setStep(2)} className="btn-campot flex-1">Далее</button>
                </div>
            </div>
        );

        const Step2_Quality = ({ form, update, setStep }) => (
            <div className="step-anim space-y-6">
                <h2 className="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 border-l-2 border-campot-red pl-3 italic">03. Качество</h2>

                <div className="space-y-4">
                    <label className="text-[10px] uppercase text-zinc-600 block">Качество входящих заявок (Лидов)</label>
                    <div className="flex justify-between gap-1">
                        {[1, 2, 3, 4, 5].map(v => (
                            <button key={v} onClick={() => update('quality_score', v)}
                                className={`flex-1 p-3 font-bold border ${form.quality_score === v ? 'bg-campot-red text-white border-campot-red' : 'border-zinc-800 text-zinc-600'}`}>
                                {v}
                            </button>
                        ))}
                    </div>
                </div>

                <textarea className="input-style h-24" placeholder="Что говорят клиенты? (Цитаты)" value={form.client_source_quotes} onChange={e => update('client_source_quotes', e.target.value)}></textarea>
                <textarea className="input-style h-24" placeholder="Жалобы или частые вопросы" value={form.customer_pain_points} onChange={e => update('customer_pain_points', e.target.value)}></textarea>

                <div className="flex gap-3 pt-4">
                    <button onClick={() => setStep(1)} className="btn-secondary w-1/3">Назад</button>
                    <button onClick={() => setStep(3)} className="btn-campot flex-1">Далее</button>
                </div>
            </div>
        );

        const Step3_Process = ({ form, update, setStep }) => (
            <div className="step-anim space-y-6">
                <h2 className="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 border-l-2 border-campot-red pl-3 italic">04. Процессы</h2>

                <div>
                    <label className="text-[10px] uppercase text-zinc-500 mb-1 block">Как быстро менеджер отвечает на заявки?</label>
                    <div className="select-wrapper">
                        <select className="input-style" value={form.response_speed} onChange={e => update('response_speed', e.target.value)}>
                            <option value="5-15 мин">⚡ 5-15 мин (Супер)</option>
                            <option value="1 час">🕐 В течение часа</option>
                            <option value="День">📅 В течение дня</option>
                            <option value="Долго">🐢 Иногда пропускаем</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label className="text-[10px] uppercase text-zinc-500 mb-1 block">Оценка работы ВАШЕГО отдела продаж</label>
                    <div className="select-wrapper">
                        <select className="input-style" value={form.sales_process_rating || "Не знаю"} onChange={e => update('sales_process_rating', e.target.value)}>
                            <option value="Отлично">🔥 Отлично (Закрываем всех)</option>
                            <option value="Нормально">👍 Нормально</option>
                            <option value="Плохо">👎 Плохо (Теряем лидов)</option>
                            <option value="Нет отдела">🤷‍♂️ Нет отдела продаж</option>
                        </select>
                    </div>
                </div>

                <div className="flex gap-3 pt-4">
                    <button onClick={() => setStep(2)} className="btn-secondary w-1/3">Назад</button>
                    <button onClick={() => setStep(4)} className="btn-campot flex-1">Далее</button>
                </div>
            </div>
        );

        const Step4_Content = ({ form, update, setStep }) => (
            <div className="step-anim space-y-6">
                <h2 className="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 border-l-2 border-campot-red pl-3 italic">05. Контент & Реклама</h2>

                <div className="space-y-4">
                    <label className="text-[10px] uppercase text-zinc-600 block">Качество рекламы / таргета (1-5)</label>
                    <div className="flex justify-between gap-1">
                        {[1, 2, 3, 4, 5].map(v => (
                            <button key={v} onClick={() => update('ad_quality_score', v)}
                                className={`flex-1 p-3 font-bold border ${form.ad_quality_score === v ? 'bg-campot-red text-white border-campot-red' : 'border-zinc-800 text-zinc-600'}`}>
                                {v}
                            </button>
                        ))}
                    </div>
                </div>

                <div className="space-y-4">
                    <label className="text-[10px] uppercase text-zinc-600 block">Качество контента / визуала (1-5)</label>
                    <div className="flex justify-between gap-1">
                        {[1, 2, 3, 4, 5].map(v => (
                            <button key={v} onClick={() => update('content_quality_score', v)}
                                className={`flex-1 p-3 font-bold border ${form.content_quality_score === v ? 'bg-campot-red text-white border-campot-red' : 'border-zinc-800 text-zinc-600'}`}>
                                {v}
                            </button>
                        ))}
                    </div>
                </div>

                <textarea className="input-style h-20 mt-4" placeholder="Что понравилось / не хватило?" value={form.favorite_content} onChange={e => update('favorite_content', e.target.value)}></textarea>

                <div className="flex gap-3 pt-4">
                    <button onClick={() => setStep(3)} className="btn-secondary w-1/3">Назад</button>
                    <button onClick={() => setStep(5)} className="btn-campot flex-1">Далее</button>
                </div>
            </div>
        );

        const Step5_Plan = ({ form, update, setStep }) => (
            <div className="step-anim space-y-6">
                <h2 className="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 border-l-2 border-campot-red pl-3 italic">06. План</h2>

                <textarea className="input-style h-24" placeholder="Новые акции / Продукты?" value={form.new_campaigns} onChange={e => update('new_campaigns', e.target.value)}></textarea>

                <div>
                    <label className="text-[10px] uppercase text-zinc-500 mb-1 block">Главный фокус месяца</label>
                    <div className="select-wrapper">
                        <select className="input-style" value={form.next_month_focus} onChange={e => update('next_month_focus', e.target.value)}>
                            <option value="Лиды">🔥 Лиды (Заявки)</option>
                            <option value="Имидж">💎 Имидж / Визуал</option>
                            <option value="Подписчики">👥 Подписчики</option>
                            <option value="Охваты">📢 Охваты</option>
                        </select>
                    </div>
                </div>

                <textarea className="input-style h-24" placeholder="Пожелания и идеи для нас?" value={form.general_suggestions} onChange={e => update('general_suggestions', e.target.value)}></textarea>

                <div className="flex gap-3 pt-4">
                    <button onClick={() => setStep(4)} className="btn-secondary w-1/3">Назад</button>
                    <button onClick={() => setStep(6)} className="btn-campot flex-1">Далее</button>
                </div>
            </div>
        );

        const Step6_Team = ({ form, update, setStep, submit, loading, errorMsg }) => (
            <div className="step-anim space-y-6">
                <h2 className="text-sm font-bold uppercase tracking-[0.2em] text-zinc-500 border-l-2 border-campot-red pl-3 italic">07. КОМАНДА И СЕРВИС CAMPOT MEDIA</h2>

                <div className="space-y-4">
                    <label className="text-[10px] uppercase text-zinc-600 block">Работа менеджера команды CAMPOT (1-5)</label>
                    <div className="flex justify-between gap-1">
                        {[1, 2, 3, 4, 5].map(v => (
                            <button key={v} onClick={() => update('manager_quality_score', v)}
                                className={`flex-1 p-3 font-bold border ${form.manager_quality_score === v ? 'bg-campot-red text-white border-campot-red' : 'border-zinc-800 text-zinc-600'}`}>
                                {v}
                            </button>
                        ))}
                    </div>
                </div>

                <div className="space-y-4">
                    <label className="text-[10px] uppercase text-zinc-600 block">Общее впечатление от CAMPOT (1-5)</label>
                    <div className="flex justify-between gap-1">
                        {[1, 2, 3, 4, 5].map(v => (
                            <button key={v} onClick={() => update('agency_impression_score', v)}
                                className={`flex-1 p-3 font-bold border ${form.agency_impression_score === v ? 'bg-campot-red text-white border-campot-red' : 'border-zinc-800 text-zinc-600'}`}>
                                {v}
                            </button>
                        ))}
                    </div>
                </div>

                {errorMsg && <div className="p-3 bg-red-900/30 border border-red-500 text-red-200 text-xs">{errorMsg}</div>}

                <div className="flex gap-3 pt-4">
                    <button onClick={() => setStep(5)} className="btn-secondary w-1/3">Назад</button>
                    <button onClick={submit} disabled={loading} className="btn-campot flex-1">
                        {loading ? "Отправка..." : "ОТПРАВИТЬ ОТЧЕТ 🚀"}
                    </button>
                </div>
            </div>
        );

        // --- MAIN APP COMPONENT ---

        const App = () => {
            const [step, setStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");

            // Initial data from URL
            const params = new URLSearchParams(window.location.search);
            const [form, setForm] = useState({
                // Block 0
                instagram: '', client_name: '', phone: '',
                // Block 1
                leads_count: '', lead_source: 'Direct Instagram', sales_count: '', average_check: '',
                // Block 2
                quality_score: 5, client_source_quotes: '', customer_pain_points: '',
                // Block 3
                response_speed: '5-15 мин', sales_process_rating: 'Нормально',
                // Block 4
                ad_quality_score: 4, content_quality_score: 5, favorite_content: '',
                // Block 5 (Team)
                manager_quality_score: 5, agency_impression_score: 5,
                // Block 6 (Plan)
                new_campaigns: '', next_month_focus: 'Лиды', general_suggestions: '',
                // Meta
                chat_id: params.get('cid'), thread_id: params.get('tid')
            });

            // Prevent zoom on focus for iOS
            useEffect(() => {
                const metaViewport = document.querySelector('meta[name=viewport]');
                metaViewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
            }, []);

            useEffect(() => {
                tg.expand();
                tg.MainButton.hide();

                // Auto-fill Client Name if tid exists
                if (params.get('tid')) {
                    const tid = params.get('tid');
                    supabase
                        .from('clients')
                        .select('name')
                        .eq('thread_id', tid)
                        .single()
                        .then(({ data, error }) => {
                            if (data && data.name) {
                                // Remove "Topic " prefix if it's default
                                const cleanName = data.name.replace(/^Topic \d+$/, "");
                                if (cleanName) {
                                    setForm(prev => ({ ...prev, client_name: cleanName }));
                                }
                            }
                        });
                }
            }, []);

            const update = (field, value) => {
                setForm(prev => ({ ...prev, [field]: value }));
            };

            const submit = async () => {
                setLoading(true);
                setErrorMsg("");
                try {
                    // 1. Insert to Supabase
                    const { data: inserted, error } = await supabase
                        .from('client_feedback')
                        .insert(form)
                        .select();

                    if (error) throw new Error(error.message);

                    // 2. Trigger Backend Report (Vercel)
                    const backendUrl = "https://media-seven-eta.vercel.app/api/report";
                    const resp = await fetch(backendUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(inserted[0])
                    });

                    if (!resp.ok) {
                        const txt = await resp.text();
                        console.error("Backend Error:", txt);
                    }

                    setStep(100); // Success screen
                    tg.HapticFeedback.notificationOccurred('success');

                } catch (e) {
                    tg.HapticFeedback.notificationOccurred('error');
                    setErrorMsg("Ошибка: " + e.message);
                }
                setLoading(false);
            };

            if (step === 100) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-black">
                    <div className="text-6xl mb-6 animate-bounce">✅</div>
                    <h2 className="text-2xl font-black italic text-white mb-4 uppercase">Данные приняты</h2>
                    <p className="text-zinc-500 text-sm tracking-widest uppercase">Команда Campot Media уже получила ваш отчет.</p>
                    <div className="mt-10 text-[10px] text-zinc-700 uppercase">Можно закрыть вкладку</div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen p-6 flex flex-col justify-center">
                    <Header />
                    {step === 0 && <Step0_Contacts form={form} update={update} setStep={setStep} />}
                    {step === 1 && <Step1_Metrics form={form} update={update} setStep={setStep} />}
                    {step === 2 && <Step2_Quality form={form} update={update} setStep={setStep} />}
                    {step === 3 && <Step3_Process form={form} update={update} setStep={setStep} />}
                    {step === 4 && <Step4_Content form={form} update={update} setStep={setStep} />}
                    {step === 5 && <Step5_Plan form={form} update={update} setStep={setStep} />}
                    {step === 6 && <Step6_Team form={form} update={update} setStep={setStep} submit={submit} loading={loading} errorMsg={errorMsg} />}

                    <footer className="mt-20 text-center opacity-30">
                        <p className="text-[8px] uppercase tracking-[4px]">Campot Analytics / 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
