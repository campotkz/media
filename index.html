<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GULYWOOD ERP</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <style>
    /* GLOBAL THEME */
    :root {
      --bg: #0a0b10;
      --card-bg: rgba(20, 22, 30, 0.6);
      --accent: #7aa2ff;
      --accent-fill: rgba(122, 162, 255, 0.15);
      --accent-stroke: rgba(122, 162, 255, 0.3);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.6);
      --stroke: rgba(255, 255, 255, 0.08);
      --error: #ff3b30;
      --success: #4cd964;
      --radius: 16px;
      --r-1: 8px;
      --r-2: 12px;
      --r-3: 20px;
      --r-pill: 100px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --font: 'Space Grotesk', sans-serif;
      --s-1: 8px;
      --s-2: 12px;
      --s-3: 16px;
      --s-4: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
      background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000 70%);
      background-attachment: fixed;
    }

    /* GLASSMORPHISM CARD */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--stroke);
      border-radius: var(--r-3);
      padding: var(--s-4);
      margin-bottom: var(--s-4);
      box-shadow: var(--shadow);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--s-3);
    }

    /* HEADERS */
    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--s-4);
      position: relative;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* BUTTONS */
    button {
      font-family: var(--font);
      font-weight: 600;
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 10px 18px;
      border-radius: var(--r-2);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:active {
      transform: scale(0.96);
    }

    button.primary {
      background: var(--accent);
      color: #000;
      border: none;
      box-shadow: 0 4px 15px rgba(122, 162, 255, 0.3);
    }

    button.mini-btn {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: var(--r-1);
    }

    /* CALENDAR GRID */
    .calendar {
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--r-2);
      padding: var(--s-3);
      border: 1px solid var(--stroke);
    }

    .monthBar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--s-3);
    }

    .month {
      font-size: 18px;
      font-weight: 700;
      text-transform: capitalize;
    }

    .hint {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-1);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      position: relative;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.03);
    }

    .day:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--stroke);
    }

    .day.other {
      opacity: 0.2;
    }

    .day.sel {
      background: var(--accent-fill);
      color: var(--accent);
      border-color: var(--accent-stroke);
      box-shadow: 0 0 15px rgba(122, 162, 255, 0.2);
    }

    .day.has-event::after {
      content: '';
      position: absolute;
      bottom: 6px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* FORM STYLES */
    form {
      display: flex;
      flex-direction: column;
      gap: var(--s-3);
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      display: block;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--stroke);
      border-radius: var(--r-2);
      padding: 12px 16px;
      color: white;
      font-family: var(--font);
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
    }

    input:focus,
    textarea:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-stroke);
      box-shadow: 0 0 0 3px rgba(122, 162, 255, 0.1);
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-3);
    }

    /* EVENT LIST */
    .list {
      margin-bottom: var(--s-4);
    }

    .ev-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke);
      border-radius: var(--r-2);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ev-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--accent-stroke);
    }

    .ev-info h4 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .ev-info p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .ev-time {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-fill);
      padding: 4px 10px;
      border-radius: var(--r-pill);
    }

    /* FOOTER ACTIONS */
    .footer {
      display: flex;
      gap: 10px;
      margin-top: var(--s-4);
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .card {
        padding: var(--s-3);
      }

      .row2 {
        grid-template-columns: 1fr;
      }

      input,
      select,
      textarea {
        font-size: 16px;
        /* Prevent zoom on iOS */
      }
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-content {
      background: #1c1d24;
      border: 1px solid var(--stroke);
      border-radius: var(--r-3);
      padding: 24px;
      width: 90%;
      max-width: 360px;
      box-shadow: var(--shadow);
    }

    /* Autocomplete Styles */
    .input-wrap,
    .multi-select-wrap {
      position: relative;
    }

    .dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #15161c;
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: var(--r-2);
      max-height: 250px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      margin-top: 4px;
    }

    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      font-size: 13px;
    }

    .dropdown-item:hover {
      background: rgba(122, 162, 255, .15);
    }

    /* Main Menu Splash Screen */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: black;
      background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #000 70%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #splashScreen h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 60px;
      text-align: center;
      background: linear-gradient(135deg, #fff, #999);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .menu-btn {
      width: 100%;
      max-width: 340px;
      margin-bottom: 24px;
      padding: 32px;
      border-radius: 20px;
      font-size: 22px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: white;
      text-decoration: none;
    }

    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .menu-btn:active {
      transform: scale(0.98);
    }

    .menu-btn i { font-size: 28px; }

    .menu-btn.calendar-btn { color: #7aa2ff; border-color: rgba(122, 162, 255, 0.2); }
    .menu-btn.timer-btn { color: #ffcc00; border-color: rgba(255, 204, 0, 0.2); }
    .menu-btn.casting-btn { color: #ff6b6b; border-color: rgba(255, 107, 107, 0.2); }

  </style>
</head>

<body>

  <!-- MAIN MENU SPLASH SCREEN -->
  <div id="splashScreen">
    <h1>Campot</h1>
    <button class="menu-btn calendar-btn" onclick="openModule('calendar')">
      <span>📅</span> Календарь
    </button>
    <button class="menu-btn timer-btn" onclick="openModule('timer')">
      <span>⏱️</span> Таймер
    </button>
    <button class="menu-btn casting-btn" onclick="window.location.href='casting_dashboard.html'">
      <span>🎭</span> CASTING HUB
    </button>
  </div>

  <div class="wrap">
    <!-- CALENDAR VIEW -->
    <div class="card" id="calendarView" style="display:none;">
      <div class="head">
        <div class="title">
          <button class="mini-btn" onclick="goBackToMenu()">🔙 Меню</button>
          Campot
        </div>
        <div class="seg">
          <button id="prevBtn">◀</button>
          <button id="todayBtn">Сегодня</button>
          <button id="nextBtn">▶</button>
        </div>
      </div>
      <div class="calendar">
        <div class="monthBar">
          <div class="month" id="monthLabel">—</div>
          <div class="hint" id="monthStat">0 съёмок</div>
        </div>
        <div class="dow">
          <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
        </div>
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <!-- TIMER VIEW (Placeholder or Logic) -->
    <div class="card" id="timerView" style="display:none;">
       <div class="head">
        <div class="title">
          <button class="mini-btn" onclick="goBackToMenu()">🔙 Меню</button>
          Таймер
        </div>
      </div>
      <p>Таймер загружается...</p>
    </div>
  </div>

  <script>
    const S_URL = "https://waekzofajzqcpoeldhkt.supabase.co";
    const S_KEY = "sb_publishable_XVByRUkaKbM-11ChwOd2Aw_y24CSb4V";
    const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

    const tg = window?.Telegram?.WebApp;
    if (tg) tg.expand();

    function openModule(mod) {
      document.getElementById('splashScreen').style.display = 'none';
      if (mod === 'calendar') {
        document.getElementById('calendarView').style.display = 'block';
        initCalendar();
      } else if (mod === 'timer') {
         // If timer is a separate file or inline
         window.location.href = 'timer.html'; 
      }
    }

    function goBackToMenu() {
      document.getElementById('splashScreen').style.display = 'flex';
      document.getElementById('calendarView').style.display = 'none';
      document.getElementById('timerView').style.display = 'none';
    }

    // --- CALENDAR LOGIC (Simplified for Restore) ---
    let selectedDate = new Date();
    let currentMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);

    function initCalendar() {
      renderCalendar();
    }

    function renderCalendar() {
      const label = document.getElementById('monthLabel');
      label.textContent = currentMonth.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
      // ... basic grid logic ...
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      
      const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
      const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0);
      
      // Pad days
      let startOffset = firstDay.getDay() - 1;
      if (startOffset < 0) startOffset = 6;
      
      for(let i=0; i<startOffset; i++) {
        const d = document.createElement('div');
        d.className = 'day other';
        grid.appendChild(d);
      }
      
      for(let i=1; i<=lastDay.getDate(); i++) {
        const d = document.createElement('div');
        d.className = 'day';
        d.textContent = i;
        grid.appendChild(d);
      }
    }

    document.getElementById('prevBtn').onclick = () => {
      currentMonth.setMonth(currentMonth.getMonth() - 1);
      renderCalendar();
    };
    document.getElementById('nextBtn').onclick = () => {
      currentMonth.setMonth(currentMonth.getMonth() + 1);
      renderCalendar();
    };
    document.getElementById('todayBtn').onclick = () => {
      currentMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
      renderCalendar();
    };

  </script>
</body>

</html>
